 for the newly switched pre-meds and the established pre-meds, so they can answer questions like the application process, the MCAT, and medical school finances.\n     Second, I realized that many pre-med students in AED fear the MCAT (a rational fear). It is one of the most difficult, if not the most difficult, exams any pre-med student will take during their undergraduate years. Many pre-med students in AED that I have spoken with wished there were more guidance on taking the test, study plans, and strategies for approaching various passages to help them score higher on the exam, beyond the traditional Kaplan and Princeton Review sessions AED has hosted. I am suggesting adding specialized MCAT prep into AED. I promise that if given the opportunity to serve on the cabinet as the Pre-Med Chair, I will send out a weekly recording breaking down a passage from a free online MCAT website (Jack Westin primarily) in which I detail the prior content knowledge required for the question, explain the required content knowledge, and show students how to properly attack each question. Alongside specialized MCAT prep, I plan to host bi-weekly “office hours” where students from any class can come to ask questions about the MCAT, study schedules, application processes, or just to talk. \n     Thirdly, after speaking with many AED pre-med students, they have told me that the resources AED offers, such as written information documents, PowerPoint presentations, and other beneficial material, often feel like finding a needle in a haystack. I want to create a website with all the useful information for pre-meds in AED and integrate this with the interface of an AI website known as AscuelaMD to give students a single link to access all the resources offered by AED for pre-med students and also an AI assistant to allow students to rapidly receive answers for any questions they may have with the documents or with their profile as a pre-med student. While this may seem challenging, I have prior experience building websites with a reactive User Interface and have integrated AIs into them. Given the opportunity to serve on the cabinet as the Pre-Med Chair, I will have this website built by the end of the summer and ready for AED members to use by the beginning of the Fall semester.\n     In addition, conversing with fellow pre-med AED members made me realize that many of them, during the spring semester, frantically fill out applications for various summer internships (especially sophomores and juniors). However, every single one of these programs is highly selective, and many members’ applications get sent to an application pool judged by the directors who do not know the students. I want to change this. After building close relationships with the MUSC summer undergraduate research program coordinators and the coordinators of the UofSC School of Medicine’s summer undergraduate research program, I want to hold an informational session with these program coordinators that will allow students to interact with these organizations, allowing students to further build their research and clinical experiences. I also want to build a database of summer internships our members have participated in during their time and contact these directors to hold informational sessions for AED members. This database will allow members to easily ask peers specific questions about the respective internship and the overall process, ensuring a high match rate into each pre-med’s desired summer internship. Allowing coordinators to attach a face to each AED applicant’s name in their application pool will give our members a higher chance of acceptance into these prestigious summer internships. \n     Lastly, through conversations with pre-meds in AED, I realized that not many AED members understand the logistics of health policy, its role, and its impacts on physicians’ day-to-day interactions. Many pre-meds (including me until junior year) do not take the time to learn about the various policies that govern the healthcare industry. While the primary roles of Pre-Med Chair and MedConnect Director are to help members with their application process and help them with their path to medical school, I believe that health policy workshops, in which medical attorneys from the S.C. statehouse and medical law clerks from the statehouse (many of whom I work with on a day-to-day basis as a medical page) came in and discussed healthcare policy can benefit pre-med students in realizing the work atmosphere that they will face as future physicians, aptly prepping them for their future careers. When deciding to apply for these positions, I preemptively asked the medical attorney I work with if he and his colleagues would be willing to host these workshops, and he said he would be more than happy to help put them on, noting that he would love to help pre-meds understand all areas of medicine before they apply to medical school.  \n     Given the opportunity to serve as either Pre-Med Chair or MedConnect Director, I promise to foster increased collaboration among pre-med students and alumni panels within AED, ensuring students receive intentional and meaningful guidance at every step.", "extra": "Throughout the other essays, I was given the opportunity to expand on my academic and professional sides. I want to take a second here to expand who I am as a person and also my unconventional application. I am a first-generation college student who speaks three languages, and I love solving Rubik’s Cubes and playing the guitar. \n     Throughout college, I was able to understand the importance of the social circle you consider family. As a naive freshman, I was often nervous in social situations. To step outside my comfort zone, I decided to rush AED in the spring of my freshman year, which remains one of the best decisions I made during my time at UofSC. Rushing AED allowed me to step outside of my comfort zone and fully realize the importance of peers who wish nothing but the best for you. \n     My cabinet application is unconventional given AED norms, as I am applying without having served on a committee. Nevertheless, I made it a point to meet with a majority of the executive board and cabinet to fully understand the roles of the positions I am applying for, and also the interplay between executive and cabinet members (especially how VPOs coordinate the cabinet body). \n     Although I have not served on an AED committee, my application offers a new perspective on the current AED Pre-Med Chair and MedConnect Director positions. Throughout my undergraduate studies, I gained different perspectives on the field of medicine and healthcare as a whole. While I am not advocating for remarketing these cabinet positions, I want to offer new perspectives I gained through my undergraduate experiences for the roles of Pre-Med Chair and MedConnect Director.   \n     To end my application, I want to take a second to thank you for taking the time to just read these essays and even considering me for the positions I am applying for. I am excited to potentially work alongside the new executive board and other cabinet members in a collaborative, family-oriented environment.", "transport": true}, {"name": "Sai Nallu", "year": "Senior", "track": "Pre-Med", "positions": "Academics Chair (1 spot)", "fit": "Over the past 3 years of being a college student at the University of South Carolina, I have been beyond grateful for the opportunities that have been presented to me and directly led to my growth into the person I am today. Through these opportunities, I will bring a range of experiences and qualities that make me a strong candidate for the Academics Chair position. I always had an unrealized passion for mentorship, leadership, and teaching that I finally was able to acknowledge when I was accepted into AED in the fall of my freshman year, almost 3 years ago. I want to become one of the guiding voices that builds upon the foundation set by the past cabinet and executive board. My goal is to create an environment that is fully accessible and constantly working for each AED member. Growth often occurs from learning from the peers around you. It is one of my priorities to always maintain an open mindset by continuously inviting ideas for improvement from members, committees, the cabinet, and the executive board. Using that mindset, I want every member of AED to feel heard, valued, and supported, especially during the rigorous journey that the future healthcare professionals in college often go through. To do that, I have adopted the mindset and goal of “Opening Doors and Empowering Futures”.\nAs the Academics Chair, I would be responsible for planning, organizing, and executing academic-focused initiatives that support all pre-health tracks. This includes developing events centered around research/clinical opportunities, résumé building, interview preparation, Interdisciplinary workshops in various areas, academic performance, and gaining experience beyond the classroom. I would be in charge of leading and managing the academics committee, ensuring we are consistently creating and implementing new strategies and events that promote academic success and growth for AED members. Additionally, I would be in charge of the AED academics Google Drive, academic and unacademic newsletter, and keeping all resources organized, accessible, and relevant. Collaboration is also a key part of this role. As the Academics chair, it is important to continue building on Shrihan's foundation for promoting collaborations among cabinet members to provide nuanced and niche events. The final explicit job of the Academics each year is to partner with the Service Chairs to coordinate a yearly Job and Service Fair that connects members with opportunities beyond the classroom experiences. The role requires the ability to foster an environment where every member has the tools and support needed to succeed in the career they wish to pursue.\nI had the opportunity to serve on the Academics committee during the 2024-2025 Academic School year. Though I wasn’t on the Academics committee this year, I was able to gain the experience and skills from my time on the committee and build on them this past year in the various experiences I have pursued in my junior year. In my time on the academics committee, I was able to get a full understanding of what the Academics Chair role consists of and how to go above and beyond, as Shyam did last year and Shrihan continued to do this year. With being able to work under Shyam and with Shrihan on the committee, I was able to directly learn from the past 2 Academics chair and learn exactly what worked and what didn’t work in respect to academics. Last year, as a part of the committee, I was in charge of both the Pre-Med and Pre-PA resource folders within the Academic Resource Drive. I have planned and hosted several events, including the Personal Statement Workshop, an Interview Preparation Workshop, the Getting Started with Research Workshop in collaboration with the Office of Undergraduate Research, and the APSA x AED MD/PhD Admissions and Student Panel. My time at AED has taught me how to organize events and meet the needs of AED’s various members. I’ve taken lead in planning, organizing, and hosting numerous impactful academic events, including: Getting Started with Research Workshop, Grant Funding Workshop, National Fellowship Workshop for Pre-Health Students, Personal Statement Workshop, Graduate School Panel, Interview Preparation Workshop, GLD Workshop, Intro to Getting an MBA, and a Session with Dr. Bethea: Owning and Operating Your Own Healthcare Practice.\nMy leadership roles within TEDx, as the Vice President of CGC, Honors Peer mentor, and OUR ambassador have given me the Professional development and skills needed to really fire on all cylinders with the academics chair position.", "time": "Time management is so important as a college student and beyond. I will say that my first year in college, I struggled with balancing my time with all that was going on in my life. But I can even more confidently say now that even compared to last year, I can confidently say it is one of my greatest strengths. The way I get tasks done is by ordering them from greatest priority to least. Using this method has allowed me to get the emergent important things done and stay on top of all my other work, while also having time to keep my physical and mental health well. I have actually started using a whiteboard calendar in tandem with Google Calendar because I have noticed that I remember events, deadlines, assignments, or any important matters when they are written down and always visible in my apartment. For the list of priorities, I use the check box feature in the notes app and differentiate each task to each priority I have and rank them within that priority. The same would apply to AED, depending on what tasks I have if I had the opportunity to be on cabinet. I used the same system in all my leadership roles and time commitments. I think it’s very important to tend to multiple aspects of life, being a well-rounded individual and an impactful member of society. By slowly adding commitments to my plate, I have improved my endurance to manage multiple responsibilities at once. I have continued to meet all my AED requirements, and as shown last year, when I am actively involved in AED, I go above and beyond. I had the most points in the fall of 2024 and the second most in the Spring of 2025. I know what it means to be an active member of AED, and most importantly, to always show up. Being reliable is something I think is very important; being dependable goes in tandem with the trust that the executive board would put in any potential cabinet member to get the job done and go further. I have stepped away from the majority of my campus organization leadership roles, except for my position as the Vice President for the Cultural Greek Council. My current off-campus commitments include: Undergraduate Research Assistant at the USCSOM, Clinical Undergraduate Research Assistant at Prisma Health, Undergraduate Research Ambassador for the OUR, Outreach Director for PhysiLink, Nurse Tech at Lexington Medical Center, Former Vice President and now Current Treasurer for the non-profit Inspire Columbia, and lastly a Volunteer tutor and mentor for the Department of Juvenile Justice. I have stepped away from leadership roles this past year in preparation to apply and have the opportunity to potentially serve on cabinet as the next Academics Chair. I have been able to fulfill all my responsibilities in any role that I have taken on throughout college. I will continue to work hard and give my 100% to AED, as I have in all the other areas I have had the opportunity to have an impact on. Now, moving on to my schedule for next semester and how I will dedicate each day. I have a very open schedule for next semester. I have no class on 3 days of the week, and those days would be allocated towards any immediate AED concerns, working, research, Rush events, or brainstorming ways to continue to uplift the Academics Chair position. Even on the days I do have class, it is only from 8:30 AM to around 12 PM, which gives me the rest of the day to put focus on my commitments, with AED being one of the top priorities. Any meeting or commitment I would potentially have would likely not interfere with any AED event, rush included. Along with attending chapter every Sunday and being present for the various AED rush events, I will also have time to meet my point requirements. An important aspect of being on cabinet is being able to read applications of future AED members. I have been fortunate to have the experience where I had to review around 200 applications of TEDx speakers interested in being a speaker for this past year's TEDxCongaree Vista event. I am very respectful of other people’s time and needs, and if there is ever a reason I cannot attend an event, I communicate it to the right person as soon as possible, as I do believe that communication is the key to success in any field. I am committed to being a part of the future of AED. If given a chance to serve on the AED cabinet, I will continue to put the needs of our AED members above mine and make sure that I stay steadfast in my role and fulfill my responsibilities to the best of my ability.", "impact": "To break down what new ideas I would want to implement as Academics chair, you would need to figure out what worked and what didn’t. I have been fortunate to learn from the previous 3 Academics Chairs, whom I have spoken directly with at some point, whether it was this year or last, to figure out the best way to continue uplifting the Academics Chair role and AED as a whole. What it often goes back to is making the events more interactive, personal, and memorable. I think it's important to have a speaker now and then talking about a super impactful topic, but what could elevate that is turning that into something tangible that allows each AED member to gain a unique experience they wouldn’t have found outside of AED. This goes back to my purpose of “Opening Doors and Empowering Futures”. Sometimes members need that extra push to experience or learn about something they haven’t had the opportunity to. Or for someone to open that door to an experience that they didn’t know they were waiting for. I want to make sure that every AED member walks away from an event learning or trying something new. When speaking to Shrihan, he gave me the advice to focus on the Quality of the events and not necessarily the quantity. To see an AED member walk away from an event that truly impacted them and led to their growth is far more valuable.\nAED already offers a strong foundation through its engaging events and meaningful opportunities. I want to continue building on the current Shadowing and research database by working with the Vice President to add clinical and volunteer opportunities to it as well. With developing those connections, I plan to also work with the Vice President and future service chairs to plan out the Career and service fair in advance to allow for more professional and service organizations to be there, allowing for a more high-impact event. With the connections I have built through shadowing, volunteering, TEDx, and more, I have gathered a large catalog of impactful connections that I want to give to the entire AED body. I fully intend to continue and expand on that momentum by hosting more interactive and hands-on experiences, such as suture clinics and intubation workshops. The new events I want to continue are a CPR/BLS event to get your certification and the triage workshop. I also want to do mock clinical scenarios to mirror what health care is like in the real world, similar to the OSCE events that Sanju implemented this year, except I would want it to apply to all tracks to where you would coordinate and work with each pre-health rack to come up with a diagnosis and a plan of action to best help the potential patient. I also want to hold a bedside manner workshop. While working at Lexington Medical Center, I have access to a wide variety of Nurses, Physicians, and Instructors who I have spoken with and who have shown a large interest in working with AED. Outside of LMC, I have also been able to work closely with the other 2 local hospital systems, MUSC and Prisma Health. I would want to implement a Grad School entrance exam jeopardy where you would have teams of AED members, where each member is potentially a part of a different track, so that you would work together to answer those questions. One of the biggest barriers to member involvement is scheduling conflicts. To address this, I’d work with the Historian and President to create a platform that allows members to give their availability so that I can plan events during times where there could be optimum attendance and involvement. I also want to hold an event where AED seniors hold a session to talk about their Graduate school application, like Witt and Ahad did when I was a freshman.\nI also want to bring more focus to gap years because a lot more people are considering that route. The immersion of popularity in a gap year is seen throughout all pre-health tracks, and that is one of the gaps we should tackle. To do that, I want to host a workshop where, instead of just hearing from a gap year student, they would be educated on the wide variety of opportunities that can be pursued in their gap year, and right then and there, they could plan out what their gap year could look like and how that could help them within the application cycle and beyond The goal is to highlight that there’s no “one right way” to enter healthcare and to provide comfort, inspiration, and guidance to AED members at all stages. I’d also love to see AED organize more medically-focused service events, such as teaching local communities about medical literacy or helping underserved patients understand their diagnoses and hospital experiences. I’d work with the service chairs to plan these events in a way that’s both meaningful and educational. Also, allowing for AED members to understand how to treat diverse patient populations and develop cultural competency. This would go hand in hand with working with the next DEI chair to implement an MMI workshop and interactive events that could be done with the various cultural organizations on campus. I’d like to work with the future event coordinators and revive the Hot Dog Social and turn it into a Health Professional Cookout.\nFeedback is very important. I have done chapter visits within the Cultural Greek Council to see what members like and don’t like. What Tim and Alina did this past year with the feedback event was very impactful. Potentially putting together a debrief portion after events will allow for direct opinions on the event, how it was run, and how it could be better. For the students who have something after, they could utilize the feedback form and rate the event on its level of impact, 1-4, like what Shrihan spoke about in his speech\nOne of my primary initiatives would be to introduce hands-on and practical workshops, such as a splinting workshop with an athletic trainer and sessions on how to handle common campus emergencies. These types of events give members early clinical exposure and build confidence in real-world situations. I also want to incorporate workshops on Spanish in medicine, public speaking, and poster presentation creation to strengthen communication skills that are essential for both patient care and professional success.", "extra": "I am truly excited for the opportunity to potentially serve as the Academics Chair in the upcoming Academic year. If I were to break down my goal into its simplest form, it would be “Opening Doors and Empowering Futures”. This essentially means to make AED more accessible and impactful for every AED member that is currently a part of the organization and the future members that will be. I want to build on the amazing foundation of work that I have seen since freshman year from Clayton, Shyam, and Shrihan. To say a little bit about myself beyond my application, I would have to start by talking about my roots and how I am where I am today. I was born in Pittsburgh, Pennsylvania, and have moved so often throughout my life. From Pennsylvania, to India, Ohio, Arkansas, and now finally to the place that I call home, which is South Carolina. I came to South Carolina struggling to communicate with my classmates because I couldn’t speak English. As I progressed through my life, I have slowly opened up more. It wasn’t until I reached college and joined AED that I got out of my shell. Anything I involve myself in or apply for is because I am truly passionate about it. Every extracurricular activity I am involved in or have been involved in, every class I have taken, and every opportunity I have seized have prepared me to handle the challenges of any cabinet position. I work well with others and work great under pressure, but I always go above and beyond for myself and the people around me. I am very open-minded and want to continue to grow as a person, leader, teammate, and friend. It is this that I am chasing forever through my journey in AED and my pre-med and hopefully medical career. Bringing comfort and support to others, along with my ambition to be the best I can be, pushes me every single day. AED was an organization I joined to meet people in the healthcare field and make connections, but it also gave me a home.", "transport": true}, {"name": "Jiya Anad", "year": "Junior", "track": "Pre-Med", "positions": "New Member Director (2 spots), Marketing Director (1 spot), Academics Chair (1 spot)", "fit": "Serving on the Academics Committee this past year has given me an understanding of what the Academics Chair position demands and where it can grow. I have hosted over a dozen events like the Emergency Medicine Case Studies, Media and Medicine move night, Entrance Exam Workshop, Public Health Shark Tank, and multiple collaborations with other committees such as Big/Little and DEI. My focus has always been to plan a broad variety of events that reflect the wide scope of academics. I understand how to identify what members actually need, whether that's clinical exposure, professional development, or community, and translate that into events people show up for. Some of my proudest moments this year came from watching members engage with programming I put together like seeing a full room of people asking questions at the Media and Medicine Movie night and getting positive feedback about the cricothyroidectomy demonstration at the emergency medicine case studies. The audience engagement made every hour of planning worth it, and it reinforced why I care so much about getting this right. I built a strong relationship with the other members in my committee and have taken initiative beyond just executing assigned tasks. Throughout the year I have worked extensively to fill gaps where necessary, help other committee members, and come up with creative ideas. Because I have spent a year on this committee, I know what works and what doesn't. I know which strategies increase engagement, how to market an event for attendance, and what needs to change. I'll be coming in with an understanding of this role that is built on real experience. I’m not applying for Academics Chair because it's the next step, I'm applying because I have been preparing for it all year and I have a clear vision for where academics can go. \n\nMy interest in the New Member Director role comes from my collaboration with the Big/Little committee on events like the Forensic Psychiatry Case Studies Night and the Big/Little Roadmap goal-setting workshop. Sitting in on a Big/Little committee meeting gave me a closer look at what goes into planning their events, and it deepened my appreciation for the role. Part of what drew me to AED in the first place was the mentorship and connections it offered. As someone who re-rushed, I had two very different experiences going through the process. During my second rush, the guidance I received from board members, especially the New Member Directors, made a real difference in my professional development. That kind of support is something I don't take for granted, and I'm now in a position to offer it to others the way it was offered to me.\n\nI am also applying for the Marketing Director role, as it aligns with my goal of increasing AED's impact. Part of my responsibilities at the ECHO Lab include maintaining our website and creating graphics to promote research studies, which has given me hands-on experience with Wix and Canva. I also have a lot of experience using social media platforms like Instagram. These are the tools that drive effective marketing, and I would bring that experience directly into this role. A strong social media presence and branding is one of the most powerful ways AED can grow its membership and community outreach, and I'm confident in my ability to build that.", "time": "My time at USC has been greatly beneficial for my professional development, especially my organizational and planning skills. I currently serve on the Academics Committee, where I efficiently planned several meaningful events each semester and helped other committee members plan and host their events as well. I am also a member of MedElem, where I volunteer and serve on the fundraising committee to organize regular fundraisers. I volunteer as a medical assistant at the free medical clinic during school breaks, and I am working on a systematic review in an exercise science research lab. As a rising junior on the pre-med track, my schedule is demanding, and my track record in AED is the clearest evidence I can offer that I handle it well. I currently have the most points of any member this semester, I have never missed a commitment, and I show up consistently. Cabinet will require more of my time, and I'm entering this knowing that. The way I've structured my involvement has always been intentional. AED is a priority for me and I want to make the most of it, which is why I haven’t overcommitted to countless organizations. \n\nServing on the academics committee, we always planned our events during breaks to streamline the process, and if selected as Academics Chair, I would continue that by collaborating with my committee over breaks to ensure our heavy lifting is done before the semester kicks off. I have a light course load planned for the next two semesters, so I will be able to better connect with members, learn from their feedback, and adapt programming as necessary.\n\nAlthough the New Member directors have a busier semester with rush week, with my lighter courseload, I would have the ability to make myself available to Potential New Members and the Rush class as a resource.\n\nMarketing Director has a regular time commitment, and I would allot consistent time  in my schedule and create a consistent posting schedule for optimal engagement and to give members something to look forward to. I currently dedicate my weekends to working on upcoming Academics event outlines and catching up on any related tasks, so I would similarly organize my weekly tasks into my schedule.", "impact": "My impact as academics chair will come from programming, resources, and member engagement.\nI will continue hosting the types of events members have responded well to while expanding into new areas, including more case study nights, guest speakers from graduate and professional programs, and inter-committee collaborations. There have been very high turnouts for events like The Brain Under Stress, Media and Medicine Movie Night, the Pot and Shrooms workshop, etc. I have learned that members are more likely to attend Academics events that include both a speaker with credentials and an interactive component. This past semester we worked to make our events as interactive as possible, which greatly increased turnout. By focusing more on improving the quality of events rather than repeating all the events we have traditionally done, I hope to make Academics events exciting for members.\nFor resources, I want to create one comprehensive member database that highlights every member’s areas of study, track, and any extracurricular information they choose to share. In an organization as large as AED, someone already has the connection or answer you're looking for, and this database will make it easy to find them. This summer, I would also work with my committee and other board members to streamline our existing resources. The tutoring database will be rebuilt with only members who actively want to tutor on a regular basis and an option of small group sessions during study hours. I would also revive the course connections database so members can form study groups in their more challenging courses. Right now our resources exist but most members don't find them accessible, consolidating everything into a resource hub can change that.\nTo improve member engagement, I'm reimagining the Unacademic Newsletter entirely. The \"Unacademic\" concept was my idea, and I want to fully execute the vision: monthly memes, music surveys with results posted, hot take polls with stats, and fun content that reflects the personality of our chapter rather than tips nobody opens. I would also implement an anonymous feedback form and event ratings to track what members enjoy and what needs to adapt. Academics offerings are only as impactful as how members use them, and I want to use everything I've learned this past year to increase that impact.\n\nAs for New Member Director, I have seen firsthand that the revamp of the Big/Little program has greatly increased Big/Little connections. As a new member, my Big was the same age as me and we found ourselves equally lost and facing similar challenges, making it difficult for one of us to help the other. On the other hand, my Little is on the same track as me and a year below me academically, which allows me to actually have past experiences I can share. I want to keep expanding this revamp by ensuring all new members have a Big in a year above them and on the same track as them by making that a hard requirement for Big/Little matching. Though it could be challenging, based on my experiences this system will allow for better mentorship bonds. Databases have been a huge part of the Academics committee, and I think the Big/Little committee will also greatly benefit from the complete member database I am planning to create. This database can serve as a tool to show Potential New Members the diversity and accomplishments within the organization, by showing them who makes up AED.\n\nIn terms of marketing, our branding strategy has greatly improved this past year with a consistent scheme across our website and Instagram, however I think we can take it one step further with more interactive content. Similar to the Unacademic Letter revamp, our Instagram story could benefit from more Q&As, fun polls, etc. Using such features is known to increase outreach on social media platforms. Increasing ways our members are featured on our Instagram would also diversify our feed and encourage more Instagram interactions. One way I plan to do that is interviewing members at every chapter on topics like their AED experience, hot takes, would you rather, etc. Short videos such as reels are also known to increase engagement on Instagram. I would also collaborate with the Board during rush to create reels that promote AED and offer rush advice for potential new members to engage a larger group of Potential New Members.", "extra": "I came into AED as an introverted person who doubted her ability to serve such a motivated and academically ambitious group. I almost didn't apply for the Academics Committee because of it. Fortunately, I took the chance anyway, and this past year has taught me a lot about myself. Showing up consistently, planning events I'm proud of, and building real relationships within AED has grown my confidence in ways I didn't expect. The challenge of programming for this audience has turned out to be one of the most rewarding things I've done in college so far. I'm submitting this application today as someone who is a lot more confident about what she brings to this organization, and is truly excited about what comes next for AED.", "transport": true}, {"name": "Lathika Chaluvadi", "year": "Senior", "track": "Pre-Med", "positions": "Diversity, Equity & Inclusion Chair (1 spot)", "fit": "I believe I would be a strong fit for the DEI Chair position because of my dedication to AED, experience as a current DEI committee member, and passion to fostering meaningful conversations about diversity, equity, and inclusion in healthcare. Over the past year as a DEI committee member, I have been able to expand upon my organizational and leadership skills, planning events while placing diversity in a bigger light within AED.  \n\nSince rushing and being accepted into AED in Fall 2023, I have participated in numerous events to build a strong support system within the organization. AED has been an important source of both professional and personal development, providing a sense of community and family away from home. Throughout my involvement as an active member, I have recognized the power making members feel included, heard, and represented, while noticing moments where conversations around cultural competency and equity could be pushed further or made more accessible within AED. \n\nAs a DEI Committee member, I have played a strong role in the planning and execution of events including journal club discussions and Spanish for Healthcare Professionals trivia. Throughout the semester, these events have helped to engage members, inspiring conversations about sensitive topics such as language barriers and cultural awareness in healthcare. Using journal club events has prompted the introduction of diversity and equity, supporting societal topics with academic and research knowledge. However, in planning these events, I have also become aware of gaps in our collective understanding and involvement in DEI concepts in real-world clinical scenarios. This realization is my main inspiration to take on the position of DEI chair to bridge the gap between discussion and application of diversity and equity in our organization. \n\nIf selected as DEI chair, one of my main priorities would be to strengthen internal structure and connection within the committee. While we have been successful in planning events early to ensure the highest success and participation, limited communication throughout the semester within the committee made planning and interactions within slightly fragmented. Through monthly or bimonthly check-ins, I would focus on fostering stronger relationships to promote engagement, productive discourse, and more successful initiatives. \n\nBeyond internal improvements, I am especially excited about expanding DEI programming to increase interactive, practical, and reflective events that are representative of healthcare challenge. Through events such as interactive case study nights, AED members would be able to work through clinical scenarios that look at the intersection of cultural or socioeconomic considerations and healthcare. Participating in diversity discourse would allow students to actively use their unique experiences in the context of patient care, applying theories to real-world situations. Additionally, I hope to organize events such as refugee health speaker events, featuring healthcare professionals who work with underserved communities. Events featuring community leaders would serve as a powerful bridge between the classroom and real-world, providing valuable insight into health disparities and non-traditional perspectives. \n\nMore broadly, however, my goal as DEI chair is to create a space where DEI is integrated to our learning and enrichment, making it an integral part of what it means to be a successful healthcare professional. I want members to leave AED, not only with strong academic and professional skills, but also cultural humility and awareness that enhance clinical and non-clinical settings beyond their time at USC. \n\nOverall, my experiences in AED and passion for inclusive and equitable healthcare has prepared me for this position, inspiring me to build stronger connections and meaningful events that help fostern an inclusive in our organization. AED, much like the US, is melting pot of cultures, perspectives, and values, and as the DEI chair, I will work to make it represent the diverse and inspirational community we have within AED.", "time": "I understand that serving on Cabinet, especially as DEI chair, requires a significant and consistent time commitment, and I am fully prepared to prioritize this role. While I am involved in other academic and extracurricular commitments including research and leadership positions in organizations on campus, I have learned how to effectively manage my time through prioritization and careful planning and organization. \n\nIn my experience balancing coursework, AED involvement, and other responsibilities as a pre-med student, I have developed strong time management skills including using structured schedule and planning ahead of time to break larger tasks into manageable steps. This has allowed me to remain reliable and carry out tasks in a timely manner while being fully present in the commitments I take on. \n\nExpanding upon my commitment and responsibility as a current DEI Committee member, if selected as DEI chair, AED would be one of my top priorities translating to being consistently available for meetings and proactive communication. Strong communication, through all of my responsibilities, is key to managing time effectively within a team. As a part of my priority of building a strong internal structure within the DEI committee, I will remain in regular contact with committee and Cabinet members to ensure that tasks are distributed appropriately and completed on time.", "impact": "If selected as DEI chair, I hope to positively impact AED by strengthening how diversity, equity, and inclusion are integrated into the organization as a whole. Through focused initiatives and diversity integration, I aim to make DEI an engaging and relevant topic, connecting our human perspectives and experiences to the larger context as future healthcare professionals. \n\nOne of my main goals would be to expand DEI programming to be an interactive and applicable platform. By introducing initiatives such as interactive case study nights, members would be able to work through clinical scenarios encompassing cultural, linguistic, and socioeconomic factors. This would allow members to think critically about how DEI directly impacts patient care and decision-making. Events such as “patient perspective” panels, with indiviuals from diverse backgrounds can share their real experiences, can inspire valuable conversations that help members better understand the importance of empathy and cultural humility. \n\nBeyond individual events, I want to ensure that DEI is more integrated across AED. I would collaborate with other committees to incorporate DEI perspectives into professional development workshops, service opportunities, and social events. Discussions on bias in healthcare careers, services events that support underserved communities, and incorporating DEI topics into broader AED initiatives ensures that DEI is something that members consistently engage with. \n\nBeyond event planning, I am also passionate about strengthening internal structures of the DEI committee, making it a more connected and communicative committee. With thoughoughtful interactions, I would implement regular check-ins and create opportunities for members to connect informally, encouraging collaboration, spontaneous conversations, idea-sharing, and stronger engagement. \n\nMy goal as DEI chair is to make diversity and equity more visible, interactive, and impactful to foster an inclusive chapter environment to become more culturally competent and compassionate healthcare professionals.", "extra": "Diversity, equity, and inclusion are values I actively try to live out through service, cultural engagement, and my aspirations in medicine. Through addressing food insecurity at the Gamecock CommUNITY Shop, sharing my culture through Indian dance workshops and events, and working alongside underserved communities during the AED medical mission trip, I’ve seen the impact of inclusive action.\n\nServing as the DEI chair would allow me to continue that work alongside like-minded peers, creating events that are educational, engaging, and rooted in respect, following in the footsteps of Sanjana. This year, Sanjana has been a role model in the way she led the committee and expanded upon diversity and equity conversation at USC and within AED. I’m excited about the chance to help foster an environment in our chapter where every member feels seen, valued, and inspired to make a difference in their own way.", "transport": true}, {"name": "Talha Islam", "year": "Sophomore", "track": "Pre-Med", "positions": "MedConnect Director (1 spot) -- Pre-Med applicants only, New Member Director (2 spots), Diversity, Equity & Inclusion Chair (1 spot)", "fit": "I am applying for DEI Chair, MedConnect Director, and New Member Director because each of these roles reflects both my experiences and the impact I want to have within AED. This organization has become very meaningful to me, and I genuinely want to give back by taking on a leadership role and contributing to its continued success.\n\nFor MedConnect Director, I believe one of my biggest strengths is my ability to build relationships and connect with people. Through my shadowing experiences and networking, I have developed connections with medical students at the University of South Carolina School of Medicine. I understand how valuable it is for undergraduates to have direct, honest conversations with medical students, especially when navigating the pre-med path. I would use my connections and communication skills to create mentorship opportunities that are more personal and consistent, such as small group discussions and ongoing mentorship rather than one-time events. I want MedConnect to be something that students truly benefit from and remember.\n\nFor DEI Chair, I bring both personal perspective and leadership experience in creating inclusive environments. Through my involvement in the Muslim Student Association, where I help coordinate events and outreach, I have worked to create spaces where people from different backgrounds feel welcomed and represented. I understand how important inclusion is, especially in a field like medicine where diverse perspectives directly impact patient care. In this role, I would focus on organizing events that highlight different paths into medicine, bringing in speakers from diverse backgrounds, and creating opportunities for open discussion about healthcare disparities. My goal is to ensure that every member of AED feels supported, included, and comfortable being themselves.\n\nFor New Member Director, this role is especially important to me because of the impact it has on the future of AED. I have felt a strong connection with Tyler and Andrew this year, and they have been incredibly helpful in making me feel welcomed and guiding me through AED. Seeing how much effort they put into the rush process and new member experience has made me want to be part of that process. I would take this role very seriously by helping select applicants who not only have strong academic and professional potential but also align with the values and community of AED. I want to help build a class of new members who will contribute positively to the organization and continue the strong culture that already exists.", "time": "I currently balance a full academic course load, undergraduate research, and multiple extracurricular commitments, which has required me to develop strong time management skills. As a research assistant studying early indicators of autism, I regularly handle detailed, time-intensive work while staying on top of my academics and other responsibilities. This has taught me how to stay disciplined, organized, and consistent in everything I take on.\n\nMore recently, I have started using Google Calendar to plan out my days in advance and keep track of all of my commitments. This has helped me stay organized and ensure that I am allocating my time effectively. If selected for Cabinet, I will make sure to schedule my days around AED meetings, events, and responsibilities because of how important AED is to me.\n\nI strongly believe that you make time for what matters to you, and AED is something I genuinely care about. I am fully committed to being present, reliable, and available, and I will prioritize my schedule to ensure I can contribute meaningfully to the organization.", "impact": "If selected, I want to build on the strong foundation of AED while introducing ideas that increase awareness, connection, and inclusivity across all members.\n\nAs MedConnect Director, one of my main goals is to increase awareness and accessibility of the program. I feel that many members do not fully understand or take advantage of MedConnect because it is traditionally limited to juniors and above. In my opinion, this is too late. Pre-med students should begin building mentorship relationships as early as sophomore year, since junior year is often heavily focused on MCAT preparation. By opening MedConnect opportunities to motivated sophomores, students can gain earlier exposure to the medical school process and develop long-term relationships with medical student mentors. Additionally, I already have strong connections with both faculty and students at the School of Medicine who are willing to help, and I would use these connections to create more accessible, consistent, and meaningful mentorship opportunities.\n\nAs New Member Director, I want to focus on making the new member experience more comfortable, connected, and supportive. I remember how nerve-wracking the rush process was for me, and I would love to introduce pre-rush informational sessions or mock interviews to help potential new members feel more prepared and confident. This is something that has been successfully implemented at Clemson, and I believe it would greatly improve the experience for applicants entering an unfamiliar and high-pressure environment. Additionally, I want to create more opportunities for each new member class to bond, such as class-specific events, trips, or social gatherings. I have noticed that many members in AED do not know each other well, and I think it is important to strengthen those connections early. I would also implement semester check-ins, pairing members in small groups to meet and talk about how they are doing, whether they need support, and to help them stay on track with points. My goal is to make every new member feel welcomed, supported, and truly part of the AED community.\n\nAs DEI Chair, I would bring both personal perspective and enthusiasm for creating inclusive and engaging experiences. As a Muslim, I have grown up surrounded by different cultures and have always enjoyed learning from and sharing those experiences with others. I want to bring that same mindset to AED by organizing events that highlight different cultures, perspectives, and backgrounds within medicine. This could include cultural events, speaker panels, and collaborative programs with other organizations. I see this role as a space for creativity, and I would work to make DEI initiatives both meaningful and enjoyable so that members are excited to participate while also learning from one another.\n\nOverall, my goal is to make AED more connected, more inclusive, and more engaging for all members. I am willing to put in the time and effort to bring these ideas to life and contribute positively to the organization.", "extra": "AED has had a meaningful impact on my experience at USC. I have truly enjoyed attending events, building relationships, and being part of such a supportive and driven community. My AED family and the connections I have made within the organization have made me feel genuinely invested in its success.\n\nLast semester, I was accepted into the Service Committee, but I was unfortunately not able to participate due to not having access to a car at the time. That experience motivated me even more to find another way to contribute to AED in a meaningful way. Now that I am in a better position, I see this as my opportunity to give back and help the organization continue to grow.\n\nI also have a lot of respect for the current executive board and everything they have accomplished this year. They have created an environment that is both professional and welcoming, and I would be proud to contribute to that same level of excellence.\n\nI am someone who takes responsibility seriously, follows through on commitments, and is willing to put in the time and effort needed to make a difference. More than anything, I want to give back to AED. This organization has already given me a lot, and I would be fully committed to contributing my energy and effort to help it continue to succeed.", "transport": true}, {"name": "Ellie Graham", "year": "Senior", "track": "Pre-Med", "positions": "Event Coordinator (2 spots)", "fit": "During my time in AED, I have taken on leadership roles from committee to cabinet to executive board, which has allowed me a great deal of opportunity to observe the standards of performance for members of leadership in AED. While I served on the DEI committee, as DEI chair, and treasurer for AED, I have had the opportunity to work closely with the event coordinators across the years and feel confident in my ability to take on this role. From coplanning the multicultural potluck, to paying invoices for the healthcare professionals mixers  and semiformals, and even my membership in the #event-coordinators slack channel, I have learned from the past and current event coordinators about what characteristics define a successful event coordinator. I believe it boils down to these three traits: the ability to work well with a partner, a natural comfort in community outreach, and a rooted passion for the position. I have always prided myself on my ability to get along well with others. In my past experience in AED leadership, I have learned about how to build friendships while maintaining standards of professionalism, which I believe is a skill crucial in a partnership position like event coordinator. In a similar sense, I believe I have further developed this skill during my time as DEI chair in learning how to set boundaries and delegate tasks amongst my committee members. If selected for the role of event coordinator, these are skills I would hope to carry with me when balancing friendship and partnership with my potential co-event coordinator. Another skill I believe was honed by my time spent on leadership was my ability to engage in community outreach to source professional speakers and event opportunities for my position. This aligns closely with the work done by the event coordinators to locate healthcare professionals for the healthcare professionals mixer and sponsors for chapter. Finally, I find myself with a unique passion for this position, birthed by the desire for greater inclusivity in the chapter food choices. Being expected to sit front row at chapter as part of leadership, I have smelled wafts of pizza and cookies and subs, and now Dave’s Hot Chicken, and have longed to actually be able to eat the chapter food. If selected for this position, it’s my desire to provide allergen-free alternatives at EACH chapter to ensure that members like myself feel included within the organization. Beyond each of these defining traits for a successful event coordinator, I believe that there is a great deal of financial responsibility tasked upon this position, which I am greatly familiar with. As treasurer, I have worked with the current event coordinators to manage their budget for each semester according to the event schedules. I have learned where to source affordable catering for the healthcare professionals mixer (Aramark Services), who to reach out to to reserve the venues for winter social and semi (Mr. Jay at City Bar Inc.), and how much money should be spent on food for each chapter (roughly $150-200 to stay in budget). I have greatly enjoyed my past time spent on AED leadership, and it is these past experiences that have built not only my passion for the role of event coordinator but also my confidence that I have the skills needed to succeed in this role.", "time": "Talking about time commitment is easy. I could talk about how I plan on taking on a light course load for my senior year, or about how I want to limit my leadership involvement solely to AED. These statements, however, are just words. Instead, I think my commitment to dedicating my time to the event coordinator position for AED is best demonstrated by my history of prioritization of this organization across the past several years. Just a few weeks after joining AED in my first semester of college, I took the initiative to become more involved within the organization and joined the DEI committee. Since then, I have continued to make strides in strengthening my involvement within the organization after transitioning into a cabinet position and eventually an executive board position. In all of these roles, I consistently met the expectations for each individual role as well as the broader commitments expected for leadership, such as rush and chapter attendance. Though this was no small feat, I believe it is my involvement in AED beyond these existing expectations that sets me apart as a team player and truly proves my commitment to the organization. During my time on cabinet, I made it a priority to support my fellow cabinet members by achieving my personal goal of attending an event hosted by each cabinet member to show appreciation for the hard work they put into planning all of their events for the semester. This was a tradition I continued on exec, even attending Allied Health Friendsgiving and being proudly named an “allied health member” for the second year in a row. I’ve solo-hosted the Career and Service Fair and the Professional Headshot events for cabinet members who were unable to attend their own events. And I have even had the opportunity to represent AED at PACES and the organization fair, taking the time to encourage other students to get involved in AED just as I have. My track record demonstrates a consistent prioritization of AED regardless of my other involvements, and I am confident in my ability to maintain the same level of dedication to the organization if given the opportunity with the event coordinator position.", "impact": "Over the past year, I have watched Matthew, Maarya, and Ame revamp the role of event coordinator by expanding the types of events hosted and introducing sponsors to AED chapters. I want to continue to build on their efforts to amplify the event coordinator position. My first priority in this role will be to ensure that there are allergy-friendly food options made available at each chapter. Instead of changing the well-loved pre-existing chapter food options, which have proven to have high satisfaction rates as well as cost effectiveness, I instead want to create an allergy friendly snack box containing non-perishable foods that do not contain common allergens, allowing these snacks to be recycled and constantly available to members of AED who are unable to eat the food offered at different chapter meetings. I recognize there is an additional cost associated with this action, and I believe it is feasible given AED’s new approximately additional 7k in revenue after I raised the dues as AED’s treasurer this past year. Another initiative I would introduce in order  to maximize the chapter budget is to incorporate a potluck chapter each semester, where members are encouraged to bring food for a social point. I think this idea would work best near the end of the semester, when members might be more inclined to squeeze in last-minute points. This would allow for double the budget to be used on the final chapter to order a special option, much like the Dave’s Hot Chicken chapter we just had this afternoon, which encourages a greater attendance for election chapter even after most members have fulfilled their chapter point requirements. Another idea I have for the role of event coordinator is to take on the planning of the career and service fair. Though this event is typically split between the academic and service chair, I think the interdisciplinary planning it takes often leads the planning of this event to get lost in the shuffle. I know there is a lot of overlap with skills like community outreach between planning the healthcare professionals mixer and the planning of this event and I think assigning this event to a single cabinet position could lead to a more successful outcome. I have had experience in hosting this event in my sophomore year, and believe that taking on this event would lighten the load of the academic and service chairs and allow for more detail to go into planning this event so that students are able to take away more from it. Finally, I want to make an effort to incorporate more events like the Sesquicentennial Park event. As I mentioned earlier, I believe that AED’s current finances will allow for an increase in cabinet budgets. If priority is placed on allocating these funds to the event coordinator position, I think group events like the Riverbanks Botanical Garden and the Columbia Museum of Art, a past DEI event, are both similar in cost per person and would allow AED members to become more immersed in the Columbia community. If selected for this position, I am also making it my mission to work with the new DEI chair to reinstate AED’s Book Club that I founded in 2024. Though attendance was low, I believe these meetings opened the door for valuable conversations about different perspectives in healthcare that some students may otherwise feel uncomfortable having without the structure that a book club meeting provides. These events were also planned cost-free, meaning that they were solely a time investment, which I am more than happy to make.", "extra": "I have spoken a lot about friendships formed and the family found during my time on AED leadership, and I want to emphasize that those relationships are independent of the decision made regarding cabinet selection. I remember being in your position a year ago and being tasked with deciding the next year’s cabinet and selecting from a pool of both extremely qualified and extremely familiar faces. As an emotionally driven person, I definitely understand the struggle of balancing feelings while prioritizing the success of the organization, and just want to reiterate my desire for you all to make the decision that best serves AED,  and that I will love y’all regardless and always (yes, you too, Ali)! Congratulations on your election, and I am very excited to see what the future of AED exec will achieve.", "transport": true}, {"name": "Ranya Reed", "year": "Sophmore", "track": "Pre-PA", "positions": "Event Coordinator (2 spots)", "fit": "I have been fortunate to be a member of AED for the past year, and in such a short amount of time, I have learned so much about myself and the communities that surround me. Before my time at AED, I had a general idea of the type of person I wanted to be both professionally and holistically. I knew I wanted to gain beneficial experience in the medical field to eventually pursue a career in it, while also building lasting relationships with like-minded students. I am able to whole-heartedly claim that it is due to the immersive and well-executed events that AED has been able to offer that I have been able to make transformative changes in my life. Hearing guest speakers talk about their professions at chapter meetings and other AED events has helped me gain a deeper understanding of the various healthcare paths. This exposure has given me the confidence to pursue my goal of becoming a Physician Assistant.  Through these events, I had the opportunity to meet and reach out to Sarah Jones, whom I found in the AED shadowing database, and is also a PA who works throughout the Prisma Midlands hospital system. This will allow me to have first-hand experience in the career I am so excited to learn more about each day and pursue. Most importantly, these events have allowed me to build formidable connections with so many people around me and gain insight into their own aspirations. Being surrounded by such passionate and driven members of our own community has brought positive changes to my personal life and other organizations I am regularly a part of. I currently serve as the Public Relations Officer of USC's Muslim Student Association. Though my job only entails me to interact with the community and students who come to our events and detail the events at the end of the day for people to see, I have also collaborated with our own event coordinator and vice president to secure opportunities such as a sponsorship from Dave’s Hot Chicken for our Ramadan Iftar. I have also been regularly involved with gathering supplies and the general logistics of multiple events that we had over the course of the year. \n\n\nThese past experiences that I have had the opportunity to be a part of are the reasons I believe I would be a great fit for the Event Coordinator Position for AED. I have been able to witness first hand how these events have transformed my own life, and I want to cultivate the same sense of community, togetherness, and opportunities for others to provide a positive and lasting impact on their lives as well.", "time": "As the Public Relations Officer for the Muslim Students Association, my tasks include promoting events, creating recap content, and editing media. Aside from these scheduled responsibilities, my schedule remains flexible. I serve as a Medical Assistant over the weekends with a schedule that I am able to create to match my own needs and availability. I have always scheduled my time around AED events, whether it be events that we have over the weekend or the activities we have regularly during the week. I am aware that as event coordinator it will require me to plan, organize, and reach out to different vendors and organizations weeks prior to the date. I have had some foundational experience through my time in MSA and high school organizations I was previously a part of, and now I have the capability to enhance my skills for the same organization that allowed me to grow and excel beyond my imagination during my first year here at the University of South Carolina.", "impact": "The events at AED have proven to be so well executed and well thought of, which can be exemplified through the attendance and commitment shown consistently week to week. There are some changes and new ideas that I have thought of implementing to the events if I am given the opportunity to attain the role. I would like to offer a large variety of foods for chapter and other events we have throughout the week. This will allow for different options and another thing to be “exciting” and new to look forward to. This includes, but is not limited to, vegetarian, halal, and local food vendors that we have in our own Columbia area. Through my role as Public Relations at MSA I am already used to actively engaging and gaining insight through board members and non-members that attend our events. I plan on continuing and elaborating on this as event coordinator by regularly engaging and seeking opinions from those that attend the events to know different ways I could possibly do better and make it enjoyable for the organization as a whole.I want to continue to expand our popular social events through a variety of physical, creative, and more interactive activities throughout the week such as: continuing the paddleboarding and picnic at Sesquicentennial State Park, art and creative activities to do around campus, casual hangouts through events like movie nights on Russell House or Williams Brice, and continue collaborating with other committees on events like the Multi-cultural potluck etc. My hope with these new event ideas is to ensure I am able to meet and exceed the needs and expectations of all members.", "extra": "", "transport": true}, {"name": "Peter Braun", "year": "Senior", "track": "Pre-Med", "positions": "Event Coordinator (2 spots)", "fit": "The most important and relevant experience that I have had that would cause me to be a good fit for this role has been serving as the AED Secretary this year. The two primary skills I have developed as secretary are that of scheduling and securing rooms, and communicating with professionals. Firstly, over the course of my role, I have secured rooms for events for almost every single member of Cabinet. Securing locations after deciding on a date and time is one of the primary tasks of the Event Coordinators. And my experience is not restricted to just the university. I have also been tasked with securing rooms for induction, which involves communicating with an outside agency in order to book the rooms. This experience  will be beneficial to the tasks associated with the job of Event Coordinator, primarily in the location securing that is involved with planning the Christmas Social and Spring Semi-Formal. In addition to this, I am also 21 years old. This will make the task of scheduling these events, which have traditionally been at bars or restaurants, easier. The second skill that being Secretary has helped me to develop is communicating with professionals. As previously mentioned, a duty of the Secretary this year was the planning and organization of New Member Induction. A task associated with this role was locating a speaker. Over the course of this last year, I have had to communicate with multiple doctors and other health professionals in order to find someone who was free on our Induction Sunday. This role has prepared me for the much greater task of coordinating many different health professionals at the Health Professionals Mixer. This is a monumental task, but my previous experience has prepared me for what it takes to communicate with these professionals, and I am up to the task. \n\nThe other main relevant experience that I have had that has prepared me for the role of Event Coordinator is serving on the DEI committee during the 2024-2025 school year. The main limitation of my role as Secretary was the fact that the Secretary does not host any events. This is obviously a very important aspect of the role for the Event Coordinator. However, I have had some experience hosting events within AED. When I served as a DEI committee member, I had the opportunity to host an event each semester under the direction of my Cabinet Chair, Ellie Graham. This allowed me to learn how to host an event under the supervision of a person who had hosted her own events in the past. I planned a movie event in the fall, and then a DEI Jeopardy game in the spring. This helped prepare me to better understand the process of planning events, when to start the plan, how to decide on a date and time, how to secure all of the supplies to put on the event, and how to write the email blurb to ensure people understand what the event is and how to attend. While I understand that the Event Coordinator positing involves more important events on a much larger scale, my experience with planning full events from start to finish will be an advantage in the role of Event Coordinator. \n\nOverall, I believe that my past experiences have adequately prepared me for the tasks associated with the Event Coordinator position. While I will definitely have a lot to learn during the course of the job, the roles I have served in the past have prepared me to excel in this position.", "time": "Over the past year, AED has been my primary commitment. Serving on the executive board, I have had to make it my main focus when it comes to student organizations. I am involved in a few other clubs, mainly Gamecocks Club Swim and Model United Nations. Gamecocks Club Swim primarily serves as a fun side organization that I am a part of in order to keep my sanity, but does not take up a large portion of my time. Model United Nations is a larger time commitment, and I do serve as one of the Head Chairs of our high school conference, ChickMUN. However, I have proven over the last year that I am able to make AED my primary commitment, and I plan on acting in the same manner next year if given the opportunity. My other main commitments are my research lab and the physics classes that I TA for. These, while very important to me, primarily occur during the regular school day and will not effect my ability to serve as Event Coordinator. Overall, I do have other commitments in my life, but I am resolved to make AED a priority and I have proven that I am able to do that over the last year.", "impact": "Event Coordinator is a unique position. It has a limited number of events and roles that have been in place for many years that are incredibly important to AED and its members. The primary goal of an Event Coordinator should be to maintain these events in a similar manner to how they are now. I will start by outlining one new idea that I have, followed by ways to improve upon and maintain the quality of the other duties of the Event Coordinator. \n\nEvent Coordinators are in charge of running the larger, more formal events that AED puts on every year. Going off of this theme, a new formal event that I believe would be beneficial for AED is an Acceptance Dinner. AED spends the majority of its time ensuring that everyone has the best possible chance to get into their chosen professional schools by providing them with every resource that they can. This is the one of primary reasons many people join AED. However, AED should not only be focused on getting students into professional school, we should also take the time to appreciate the successes of our members. The Acceptance Dinner would serve to address this issue. Towards the end of the second semester, in March or April, a dinner would be organized for all seniors in AED who have been accepted to a graduate school starting in the fall. This would be a way to celebrate the members of AED who have accomplished the goal we are all striving for. Everyone who attends would be asked to wear the merchandise of the school they plan to attend, and a fun, celebratory time would be had by all. The specifics of where this event would take place would need to be worked out with the new Treasurer in order to ensure costs are kept to a reasonable amount, but places like the Dragon Room or Backstreets both offer party rooms with large capacities that would fit the number of members likely to attend for around 15-30 dollars a person. The attendees could also be charged a small fee to offset some of the costs if it was deemed necessary. This would be a great way to give back to and congratulate the members of AED who have spent their time and effort making it the best organization possible, and who have achieved the ultimate goal of their undergrad experience. This would help to solidify the mission of AED as an organization that supports students all the way through their undergraduate experience, not just up until they get into graduate school. \n\nHowever, as I previously stated, the most important aspect of the Event Coordinator position are the already established events. While I do have ideas for improvement in them, the primary goal will be to continue to run them as smoothly and efficiently as they have been run in the past. That being said, I will now go through the various events and my plans to make them the best they can be. \n\nThe Christmas Social and Spring Semi-Formal have both been great events in the past. One problem facing them in the future is the fact that Biergarten is shutting down and will no longer be an option for either event. I know this has been used multiple times in the past, and finding a suitable replacement is going to be a challenge. A location that I have had other formals at that I do not believe AED has ever utilized is a restaurant called Ambrosia Tavern. It is a Greek Restaurant that has an upstairs bar room which would be perfect for our purposes. It contains a game room with pool tables and a big buck hunter game, a nice fireplace area good for thoes who would like to take pictures, and a dance floor. They also have the option to include food in the reservation, making it a viable option for either spring or fall. From my research, it is similarly priced to the other locations we have hosted in the past. I believe this would be a good location to substitute for these events. The Christmas Social and the Spring Semi-Formal are all about providing a situation in which our members can have a good time. I believe this venue would be a great option to facilitate this great event.  \n\t\nThe next important task of Event Coordinators is deciding on food for chapter. An important point that has been brought up before is the inclusivity of the food for chapter. We have a large number of members who cannot eat gluten, or eggs, or dairy products and often cannot eat the chapter food. I know this has been discussed in the past, so I would like to provide concrete examples of places that can provide affordable inclusive options. A Columbia based company called Deliciously Unique provides a wide variety of affordable gluten-free, vegan, dairy-free, nut-free, or any combination of thoes options for affordable prices. They sell a wide variety of deserts, including brownies, cookies, cupcakes, and others. This would be an easy addition to the days where party platters of deserts are the selected chapter foods. Publix also offers wrap versions of their sandwiches that are gluten free and cost a very similar amount. There are a number of other simple substitutions that can be made on some of the traditional chapter foods that would allow them to be more inclusive of everyone in AED. Importantly, these decisions should not be made arbitrarily. It is difficult to guess the number of gluten free or dairy free or vegan options that would need to be provided. Instead, a QR code with a survey asking about dietary restrictions and allowing for an opportunity to request specific chapter foods should be put up at the first chapter of the year. This will give an opportunity to ensure everyone fills it out and that we have accurate data for what foods should be bought. Chapter food is a wonderful part of the AED experience that I definitely enjoy. I would aim to this tradition while ensuring everyone is able to participate. \n\nAnother important event that the Event Coordinators are responsible for is the semesterly potluck. Another advantage that I bring to the table is that I will be living in a house next year with a large yard where I would be more than willing to host. This is a super cool event that I really think helps to promote community within AED. There are two main things that I believe could improve this event. The first would be to reduce the level of intimidation that I believe some people feel about the event. I believe that many people are too scared to come if they are not cooking something for the event. I would try and emphasize at chapter and on the slides that the event is not overly serious. Bringing storebought cookies or pizza bites that you heated up before you got there is more than ok. I would emphasize to people that they do not need to make a five star dish to feel comfortable bringing something, and I think this could help to increase attendance. As a part of this effort to keep people from being intimidated, I would also emphasize that coming without food is completely welcome. While the social point will still need to depend on bringing food in order to ensure enough food is brought, encouraging members to just stop by and hang out if would be a priority of mine. This would also be mentioned in the slides during chapter. The second thing I believe could improve the event would be to give the event a big little spin as well. Allowing the opportunity to earn a big/little point by submitting a photo of you and your big cooking for the event could help to encourage more natural, causal hang outs between bigs and littles. It would help to fost
