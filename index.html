<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AED Cabinet Application Reviewer 2026-2027</title>
<style>
  :root {
    --bg: #fafaf8; --card: #ffffff; --border: #e8e5df; --border2: #d0ccc2;
    --text: #1a1916; --muted: #6b6760; --faint: #9c9890;
    --accent: #8b3a2a; --accent-bg: #fdf0ed; --accent-border: #e8b5a8;
    --yes-bg: #eef7ee; --yes-text: #2d6e2d; --yes-border: #a8d4a8;
    --no-bg: #fdf0ef; --no-text: #882020; --no-border: #f0b0b0;
    --maybe-bg: #fdf8ec; --maybe-text: #7a5a10; --maybe-border: #e8d090;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Georgia', serif; color: var(--text); min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .masthead { margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; }
  .masthead h1 { font-size: 22px; font-weight: normal; letter-spacing: -0.3px; }
  .masthead p { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'Helvetica Neue', sans-serif; }

  .identity-bar { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .identity-actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  .toolbar input[type=text] { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; padding: 7px 11px; border: 1px solid var(--border2); border-radius: 6px; background: white; color: var(--text); outline: none; flex: 1; min-width: 160px; }
  .toolbar input[type=text]:focus { border-color: #a09890; }
  .toolbar select { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; padding: 7px 11px; border: 1px solid var(--border2); border-radius: 6px; background: white; color: var(--text); outline: none; cursor: pointer; }
  .count { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--faint); margin-left: auto; white-space: nowrap; }

  .summary-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .summary-chip { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 1px solid; }
  .chip-yes { background: var(--yes-bg); color: var(--yes-text); border-color: var(--yes-border); }
  .chip-no { background: var(--no-bg); color: var(--no-text); border-color: var(--no-border); }
  .chip-maybe { background: var(--maybe-bg); color: var(--maybe-text); border-color: var(--maybe-border); }
  .chip-pending { background: #f5f5f3; color: var(--faint); border-color: var(--border); }

  .cards { display: flex; flex-direction: column; gap: 1px; }
  .card { background: white; border: 1px solid var(--border); }
  .card:first-child { border-radius: 8px 8px 0 0; }
  .card:last-child { border-radius: 0 0 8px 8px; }
  .card:only-child { border-radius: 8px; }
  .card:hover { z-index: 1; position: relative; border-color: var(--border2); }
  .card.decided-yes { border-left: 3px solid #5a9e5a; }
  .card.decided-no { border-left: 3px solid #c06060; }
  .card.decided-maybe { border-left: 3px solid #c8a840; }

  .card-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; font-family: 'Helvetica Neue', sans-serif; flex-shrink: 0; }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: normal; }
  .card-sub { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .badge { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; padding: 2px 7px; border-radius: 3px; font-weight: 500; }
  .chevron { font-size: 14px; color: var(--faint); transition: transform 0.2s; flex-shrink: 0; font-family: sans-serif; }
  .chevron.open { transform: rotate(90deg); }
  .decision-mini { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; padding: 3px 8px; border-radius: 3px; font-weight: 500; flex-shrink: 0; }
  .dm-yes { background: var(--yes-bg); color: var(--yes-text); }
  .dm-no { background: var(--no-bg); color: var(--no-text); }
  .dm-maybe { background: var(--maybe-bg); color: var(--maybe-text); }

  .card-body { display: none; border-top: 1px solid var(--border); padding: 18px; }
  .card-body.open { display: block; }

  .section-label { font-family: 'Helvetica Neue', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; margin-top: 16px; }
  .section-label:first-child { margin-top: 0; }
  .section-text { font-size: 13.5px; color: #3a3830; line-height: 1.7; white-space: pre-wrap; }

  .section-wrap.collapsed .section-text { max-height: 220px; overflow: hidden; }
  .section-wrap { position: relative; }
  .section-wrap.collapsed::after {
    content: ''; position: absolute; bottom: 28px; left: 0; right: 0; height: 70px;
    background: linear-gradient(transparent, white); pointer-events: none;
  }
  .expand-btn { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 4px 0; margin-top: 2px; display: block; }
  .expand-btn:hover { text-decoration: underline; }

  .transport { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--faint); margin-top: 12px; }

  .review-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 16px; }
  .review-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
  .review-label { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--muted); flex-shrink: 0; padding-top: 8px; width: 70px; }

  .decision-btns { display: flex; gap: 6px; }
  .dec-btn { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border2); background: white; cursor: pointer; transition: all 0.12s; color: var(--muted); }
  .dec-btn:hover { background: #f8f7f5; }
  .dec-btn.active-yes { background: var(--yes-bg); color: var(--yes-text); border-color: var(--yes-border); font-weight: 500; }
  .dec-btn.active-no { background: var(--no-bg); color: var(--no-text); border-color: var(--no-border); font-weight: 500; }
  .dec-btn.active-maybe { background: var(--maybe-bg); color: var(--maybe-text); border-color: var(--maybe-border); font-weight: 500; }

  .notes-area { width: 100%; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border2); border-radius: 6px; background: #fafaf8; color: var(--text); resize: vertical; min-height: 60px; line-height: 1.5; outline: none; }
  .notes-area:focus { border-color: #a09890; background: white; }
  .notes-meta { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--faint); margin-top: 4px; }

  .save-btn { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; padding: 5px 14px; border-radius: 5px; border: 1px solid var(--border2); background: white; cursor: pointer; color: var(--muted); transition: all 0.12s; }
  .save-btn:hover { background: #f5f3f0; }
  .save-btn.saved { background: var(--yes-bg); color: var(--yes-text); border-color: var(--yes-border); }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--faint); font-family: 'Helvetica Neue', sans-serif; font-size: 14px; }

  .action-btn { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; padding: 6px 13px; border-radius: 5px; border: 1px solid var(--border2); background: white; cursor: pointer; color: var(--muted); transition: all 0.12s; white-space: nowrap; }
  .action-btn:hover { background: #f5f3f0; }
  .action-btn.primary { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .action-btn.primary:hover { background: #f8e5e0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1a1916; color: white; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; padding: 10px 18px; border-radius: 6px; opacity: 0; transition: all 0.22s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #importInput { display: none; }
</style>
</head>
<body>
<div class="page">
  <div class="masthead">
    <h1>AED Cabinet Application Review &mdash; 2026&#8211;2027</h1>
    <p id="mastheadSub">47 applicants</p>
  </div>

  <div class="identity-bar">
    <div class="identity-actions">
      <button class="action-btn primary" onclick="exportNotes()">&#11015; Export notes</button>
      <button class="action-btn" onclick="document.getElementById('importInput').click()">&#11014; Import notes</button>
      <button class="action-btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <input type="file" id="importInput" accept=".json" onchange="importNotes(event)" />
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search name, position, track, keyword..." oninput="render()" />
    <select id="posFilter" onchange="render()"><option value="">All positions</option></select>
    <select id="yearFilter" onchange="render()"><option value="">All years</option></select>
    <select id="decFilter" onchange="render()">
      <option value="">All decisions</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
      <option value="maybe">Maybe</option>
      <option value="pending">Pending</option>
    </select>
    <span class="count" id="countLabel"></span>
  </div>

  <div class="summary-bar" id="summaryBar"></div>
  <div class="cards" id="cards"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALL = [{"name": "Jackson Scala", "year": "Junior", "track": "Pre-Med", "positions": "Event Coordinator (2 spots)", "fit": "I believe I am well suited for the Event Coordinator position because of my leadership experience within AED, specifically my time serving on the New Member Committee, and my desire to become more involved in the planning and behind-the-scenes work that helps make AED events successful. One of the most valuable experiences I had during my first full semester in AED was serving on New Member Committee, where Tyler and Andrew gave the new member mentors significant freedom when it came to planning big/little events and other activities during the new member education process. We were given a budget and were responsible for planning our three events from start to finish and then pitching our ideas to them. This required me to think beyond simply choosing a fun activity, as I had to consider logistics, acquire necessary materials, stay within budget, and ensure the events ran smoothly. I also planned and led a small group meeting with my assigned new members, where I reviewed important information about AED, organized an activity for the group, and created an environment where new members felt comfortable asking questions. My time as a new member mentor strengthened my organizational skills, time management, and ability to collaborate with others. Tyler, Andrew, and the rest of the New Member Committee emphasized the importance of planning events well in advance of the semester in order to reduce stress during busy academic periods. Planning events months ahead of time and following through with execution required me to stay organized and manage my responsibilities effectively. These responsibilities directly relate to the expectations of the Event Coordinator position. \n\nThe Event Coordinator role is particularly appealing to me because of how the structure of the position aligns with how I manage my commitments. As a pre-med student involved in multiple extracurricular activities, I understand the importance of planning ahead and allocating time strategically. The Event Coordinator role requires consistent communication and preparation throughout the semester, with increased responsibility in the days leading up to major events. Because many of these events can be planned in advance, I am confident in my ability to stay organized and ensure everything is prepared ahead of time so execution is smooth when the events take place. I have already demonstrated my ability to work with other leadership members and follow through on planned events, and I am excited about the opportunity to contribute more to AED in this capacity.", "time": "I am involved in other organizations that require time commitments, however based on the structure of the Event Coordinator position, I believe this is a role in which I can perform well. The responsibilities of the Event Coordinator are spread out throughout the semester, with a larger time commitment during the weeks leading up to major events. This type of schedule works well for me because I am able to plan my other responsibilities around those busier periods and ensure that I am fully prepared when the time comes to execute each event. I am someone who plans ahead and stays organized, which allows me to manage multiple commitments while still meeting deadlines and expectations. Being able to prepare events in advance and then focus on ensuring each event runs smoothly during critical weeks is a structure that fits well with how I manage my time. I am confident in my ability to stay organized, communicate consistently, and follow through on responsibilities when it matters most.", "impact": "If selected, my goal would be to build on the strong foundation that AED already has and continue creating events that are both enjoyable and valuable for members. I contacted Matthew Braddick, one of the event coordinators and asked him for some feedback about the position. The Main concern I received was centered around chapter food, the food tends to be redundant and picking up the food for chapter can be a hassle. I drive an SUV so picking up and lugging food should not be an issue. Pertaining to keeping chapter food ideas fresh, I plan on bringing seasonal or themed things to the chapter meal on top of the regular main food and the drinks. For example during chapter around the holidays bringing hot chocolate or sweets to keep everyone in the spirit. I am also open to asking members for feedback on the current food we have been bringing to chapter recently. Small adjustments such as rotating food options or occasionally gathering feedback can help maintain excitement and ensure meetings remain engaging. \n\nFor larger events such as the multicultural potluck and the Health Professionals Mixer, I have not yet had the opportunity to attend these events myself, so my first priority would be to gather feedback from executive board members, current cabinet members, and general members who have attended in the past. I would want to understand what aspects of these events worked well and what areas could be improved in order to maintain what members already enjoy while also making thoughtful adjustments where possible. Sending out short feedback forms or speaking directly with members could help identify ways to improve participation, organization, and overall experience. Taking the time to understand what has been successful in the past will allow me to build on those strengths while making sure these events continue to run smoothly and successfully.  \n\nFor the end of semester social event, I believe my involvement in a social fraternity could be beneficial when planning the event. Through this experience, I have become familiar with communicating with venues, coordinating event logistics, and understanding what makes events well attended and enjoyable. I have contacts with venues for the rental, as well as connections with DJs and bands that could provide additional options when planning the social.   \n\nOverall, I would aim to contribute ideas that help maintain consistency and improve upon the foundations already built while also ensuring the events remain organized, enjoyable, and beneficial for members.", "extra": "Something else that is important to know about me is that I am very open to feedback and committed to continuous improvement. During my first time rushing AED, I was not accepted due to feedback regarding my level of professionalism. Rather than becoming discouraged, I took that feedback seriously and used it as motivation to improve. Over the summer, I intentionally sought out opportunities to develop myself by interacting with physicians, executives, and other medical professionals, which helped me better understand professional expectations in healthcare environments. When I rushed again, I was able to demonstrate that growth, and being accepted into AED reinforced my commitment to the organization. This experience showed me the importance of learning from mistakes, being receptive to constructive criticism, and consistently striving to improve. I plan bring that same mindset to this role by remaining open to feedback and continuously working alongside others to ensure the best overall experience for everyone involved.", "transport": true}, {"name": "Bianca Rowland", "year": "Senior", "track": "Pre PA", "positions": "PA-CT Director (1 spot) -- Pre-PA applicants only, Wellness Chair (1 spot)", "fit": "I believe that I would be a great fit for the PACT Director and Wellness Chair as I’m extremely committed to the Pre-PA pathway. As a member of AED, PACT, and APPAS, I have continuously pursued opportunities that allow me to fully understand what the PA profession is, as well as better understand the application cycle and PA program expectations. In addition to my campus involvement, I have developed strong leadership experience as serving Team USA synchronized figure skating captain. In this role I had to lead a team of 20 girls in high stress environments, maintain communication between athletes and coaches, and support my team both personally and athletically. During the Spring of 2023, I experienced a high pressure situation during an international competition when a teammate was injured on the ice just moments before our performance that was critical for our World Championship qualification. As captain, I had to remain calm and focused while supporting my team through an unexpected and stressful situation. I helped maintain composure among my teammates, ensured clear communication, and mentally prepared everyone to continue the performance without our injured teammate. This experience reinforced the importance of mental resilience and the impact that high pressure environments can have on one's well being. I have seen firsthand how stress can affect individuals, which directly relates to the demands of any and all pre health tracks. Because of this, I am passionate about serving as Wellness Chair and creating a supportive environment where students feel encouraged and have opportunities for members to decompress and connect with fellow members. \nFurthermore, I’ve been employed as a medical assistant for GI Alliance of Illinois, where I worked alongside two Physician Assistants and five Doctors. I gained over 500 hours through this position where I lead initial patient interactions by obtaining vitals and assisting with patient care. This experience strengthened my communication skills, professionalism, and ability to work in a fast paced health care environment, while further confirming my passion for the PA profession. I have developed a strong understanding of both the clinical and application side of this path. As a first generation student from Sweden, I understand what it feels like to navigate an unfamiliar system and experience uncertainty, especially within the pre-PA track which can be overwhelming. I want to help navigate other pre-PA students' journeys by being someone they can rely on for guidance and encouragement as the PACT Director. Overall, I am dedicated, organized, and proactive in supporting other members and helping to foster a community within AED.", "time": "Serving on cabinet is a large time commitment that I am fully aware of. As an incoming senior, I am especially motivated to make an ever lasting impact on AED in my final year, by giving back to an organization that has given me so much. While my academic schedule is lighter next year, I have already demonstrated my ability to successfully manage multiple commitments. I currently balance commitment in AED, APPAS, and my sorority, along with my academic and personal health goals, including training for a half marathon which I successfully completed this weekend. This time management and balance has all come from my experience as team captain for Team USA synchronized figure skating. I had to balance my rigorous training schedule with academics, competitions, and leadership responsibilities. I am very intentional about only committing myself to roles that I know I can fully dedicate myself to. I also stay organized by planning ahead and writing out my responsibilities so I can clearly see deadlines and manage well for them, allowing me to stay consistent. If selected, I will ensure that I am consistently present, reliable, and fully engaged with my responsibilities on cabinet.", "impact": "If selected, I would focus on positively impacting AED by further building on the organization's strong sense of teamwork, as this is what I believe helps our organization grow and create a lasting impact. Through my own experiences, I have developed skills and perspectives that I am eager to contribute, and I hope to support and collaborate with others to give back to what AED has given me. \nAs PACT Director, I would continue prioritizing communication with the PA students and APPAS PACT director to come up with engaging and interactive events, for both AED members and the PA students. I also value the strong foundation already established within the PACT program, including the application and acceptance process, points requirements, and mentor - mentee matching system. My goal is to continue this foundation while implementing new ways to enhance overall engagement. After meeting with Nishi about the position, I want to continue her efforts in the PACT events by continuing to strengthen mentorship connections. However, I would like to develop a shadowing opportunity for the pre-PA students. This would allow the mentees to spend time with their mentors in a more immersive setting, giving them a clearer understanding of the day to day demands of PA school. Furthermore, I would like to implement more events outside of the PACT program including having PAs, current PA students, faculty, and program directors come talk to members of PACT. These events could take the form of panels or Q&A sessions, allowing members to gain a ground perspective on the PA profession, understanding the application process, and receive meaningful advice. My main mission as PACT Director is to form an environment where pre-PA students feel supported, informed, and empowered as they navigate the application cycle and career path. \n\tAs Wellness Chair, I would focus on creating a supportive and approachable environment that prioritizes both mental and physical health. I would introduce low pressure initiatives like a run/walk club encouraging members to step away from academics and reconnect in a relaxed setting. I would also collaborate with the Student Health and Wellbeing here on campus to host workshops and events addressing burnout, stress, and comparison, while incorporating short guided meditation sessions before/after chapter. To further foster a sense of community I would love to incorporate an idea I had called the “AED Anonymous Appreciation”. This is where members can anonymously recognize and support peers that may be struggling. The Wellness Committee can then provide a small gesture of support like a gift card, snack bag, or handwritten note, to remind those individuals that they are seen, heard, and supported by AED. Additionally, I would organize wellness reset kits during finals to help members manage stress during high pressure times. \nOverall, my goal is to foster a culture within AED where members feel supported, connected, and confident, while recognizing that their well-being is just as important as their success.", "extra": "Something else I would like for you to know about me is that I am always looking for ways to grow and challenge myself. I am someone who is dependable, open to feedback, and willing to put in the effort to improve as I believe no one is perfect. One of my biggest strengths is adaptability, as this is something I've had to do from a very early age. Thank you for the opportunity and taking the time to read my application!", "transport": true}, {"name": "Landon Schultz", "year": "Junior", "track": "Pre-PT", "positions": "DPTMP Director (1 spot) -- Pre-PT applicants only", "fit": "I am applying for the Director of the Doctorate of Physical Therapy Mentorship Program (DPTMP) because I believe my experiences and connections make me a strong fit for this role. Through my involvement in AED, the Pre-PT Organization, and other activities, I have built meaningful relationships with physical therapists both within and outside of the Columbia area, as well as with current students in our DPT program.\n     These connections have given me valuable insight into the mentorship process and what students need to succeed when preparing for PT school. They have also allowed me to develop strong communication and networking skills, which are essential for connecting members with mentors and maintaining those relationships.\n     In addition, my involvement in various organizations and the walk-on process has helped me develop leadership, time management, and accountability. I have been an active member of AED, consistently participating in events and exceeding expectations, which reflects my commitment to the organization.\n     Because of my experience, initiative, and passion for helping others succeed in their path to physical therapy, I am confident in my ability to effectively lead and grow the DPTMP.", "time": "I am currently involved in the Exercise Science Club, the Pre-PT Organization, the walk-on process for the football team, and I am also applying for a position as a PT aide. While these are meaningful commitments, I have consistently demonstrated my ability to prioritize AED and remain actively involved in its events and initiatives. I regularly try to go over the minimum point requirements and I try to attend PT-focused events whenever possible.\n     Looking ahead, this is my final year in the walk-on process, which will free up my schedule to focus more time to AED, academics, and work. The PT aide position also offers flexibility, allowing me to effectively balance my responsibilities. After speaking with previous AED members who have had this job, I am confident in my ability to manage it alongside the responsibilities of a Cabinet position.\n     I am intentional about managing my time and ensuring that my commitments do not conflict with AED meetings or responsibilities. Because of this, I am confident in my ability to be fully present, reliable, and actively engaged as a Cabinet member.", "impact": "If selected, I would positively impact AED by strengthening connections between our members and students in the DPT program, while also improving the accessibility, engagement, and value of our events. One of my main goals would be to build stronger relationships between AED members and current PT students by increasing opportunities for direct interaction, such as mentorship events and Q&A panels.  This would help members gain meaningful insight into the PT school experience and feel more supported in their own application process.\n     In addition, I want to ensure that AED events are both accessible and highly valuable. I would prioritize scheduling events at times that accommodate the majority of members, and for those who are unable to attend, I would work to offer recurring or highly sought after events throughout both semesters so that everyone has the opportunity to participate.\n     I also believe member input should play a central role in planning. I would use polls and feedback forms to better understand what events members are most interested in and actively incorporate that feedback into future programming.\n     Another idea I would like to implement is a shared informational page where members can post insights about the PT schools they are interested in or plan to attend. This would allow members to learn directly from one another’s experiences, compare programs, and gain a better understanding of different schools.", "extra": "One additional thing I would like to share is my interest in physical therapy. I have always been fascinated by the field, and that interest has grown stronger through both personal experiences with injuries and seeing friends and mentors in the profession. These experiences have given me a deeper appreciation for the impact physical therapists have on recovery, mobility, and overall quality of life.\n     Additionally, growing up in this area has allowed me to become familiar with many of the physical therapy facilities and professionals in the community. This has helped me develop a stronger understanding of the field locally and has given me early exposure to the environments I hope to be a part of in the future.\n     Overall, these experiences have played a major role in shaping my passion for physical therapy and have motivated me to stay actively involved in opportunities that will help me grow both personally and professionally in this field.", "transport": true}, {"name": "Desi Koumoustiotis", "year": "Junior", "track": "Pre-Med", "positions": "Event Coordinator (2 spots)", "fit": "Being initiated into AED my freshman fall semester has been one of my biggest blessings coming into college. As a new member, I knew that I wanted to get more involved in this amazing organization, build connections, and have a support system. That being said, during my first year, I served as a new member mentor, which allowed me to help ensure a smooth transition for new members by answering their questions, ensuring they met their point requirements, and even meeting with my little. Furthermore, this year I have had the amazing opportunity to serve on the service committee, through which I have formed meaningful partnerships with various service organizations, including Ronald McDonald House, Homeless NoMore, and Palmetto Place. Through this position, I have not only strengthened my communication skills, whether it be planning events or emailing the event coordinators at each organization, but also deepened my passion for planning social and meaningful events that bring communities closer together and foster a safe, inclusive environment. For example, this semester I planned the Ronald McDonald Easter Egg Hunt, during which I painted a banner, baked cookies, filled plenty of eggs with candy, prepared eggs for dyeing, and decorated the Ronald McDonald House. Despite being stressed about making this event come to life while also managing a week with various exams, I remember leaving the event feeling fulfilled as I saw the vibrant smiles on the children’s faces, received gratitude from the parents, and was honored to be asked to put the event together for the years to come. As a result, I believe I am well-suited for the event coordinator position, as I’m passionate about bringing ideas to life, fine-tuning the small details to ensure events run smoothly, and managing logistics, including coordinating with venues and external organizations. In addition, while serving on a service committee, I prepared meals for the shelters, which helped me understand how to manage, order, and organize meals, preparing me to ensure there’s an ample amount and variety of food for all members at the bi-weekly chapter meeting. Lastly, I believe my personable personality and attention to detail will enhance my ability to serve as one of AED’s event coordinators.", "time": "Ever since high school, I have been heavily involved in extracurricular activities beyond the classroom, whether through sports or volunteering. So, over the years, I have come to understand the importance of balance and of having both a digital and physical paper copy of my schedule, outlining not only my week ahead but also the whole month. As of now, I am a research assistant at the Arnold School of Public Health, where I devote about 8-10 hours a week; I am involved in intramural sports through my sorority, Orthodox Christian Fellowship, and I currently serve on the AED service committee. As an active member of other organizations, I have continued to meet and exceed the AED point requirements and have invested time and dedication to become more involved and get the most out of this organization. AED has given me leadership and community connections through service committee work, guidance from past alums, healthcare professionals, and fellow members, and has spurred not only my personal growth but also my professional growth. Although serving on the Cabinet requires a significant time commitment, I am confident that I will be present to ensure that I serve as an active representative of AED's excellence, academically, socially, and within the school and the Columbia community.", "impact": "I believe I will positively impact AED if selected through my personable, creative, and sharp personality, all of which will help me effectively communicate with venues to plan events, keep AED members actively updated on when and where events will take place, and ensure there is a plentiful amount of food at chapter meetings. One change I would like to bring to the organization is an alum event/mixer in addition to the health professional mixer. This event came to mind as I was using the resources folder and saw that the alum database spreadsheet only had alum who graduate in 2023. I believe this event would be a meaningful resource for AED members as they seek advice and guidance, especially for entrance exams for various healthcare tracks, the application process, or when they want to talk to someone who has already been through their own personal healthcare journey. I believe implementing an alum event would encourage members to seek advice in a low-pressure, more relaxed environment that facilitates open, authentic, and meaningful conversations. Furthermore, another change for the event coordinator position is to send frequent reminders in advance about planned events to ensure members are aware and that we achieve the best possible turnout for each event.", "extra": "Outside of the classroom, two of my biggest passions are painting and baking. I love trying new things and putting my creativity to the test. I am definitely not the best at either by any means, but I love continuing to make new recipes or paint different things, as I am only improving and growing in these skills. Similar to the unknown of the event coordinator position, despite not being on cabinet before, I would love the opportunity to grow in leadership, craft meaningful events to help AED members grow closer, and work closely with the AED executive and cabinet members.", "transport": true}, {"name": "Zoey Dellinger", "year": "Junior", "track": "Pre- PA", "positions": "Marketing Director (1 spot)", "fit": "I not only have experience, but also a passion for communications and marketing, making me a great candidate for the Marketing Director position. I have always enjoyed expressing myself through art, whether that was dance, drawing, or painting. In high school, I found out my district paid for each student to have a Canva Pro account, and the rest is history. From creating fun PowerPoints for class presentations, flyers, resumes, or mock-ups for banners, I enjoyed every second of it.\nIn high school, I ran the HOSA, Student Council, Student Section, and Senior Class Instagram pages. I was the Chief News Anchor, and I soon found out that my fellow upperclassmen students were not on campus during first period and did not read their weekly emails. There was a need for effective communication, and the best way to address that was through social media.\nWhen I came to college, I continued with this passion by joining the Student Government Communications Team my sophomore year. I learned a lot of practical skills, such as the importance of themes, color schemes, and post timing, that helped me refine my passion. I took over the position as Graphic Design Captain and led a group of three in creating graphics for all four branches of Student Government.\nLastly, the most influential experience I have had was serving as the Graphic Design Captain for the Rotondo Harris Campaign. I was selected to lead a group of five other members in creating graphics and other materials for social media posts. I created a posting schedule, assigned roles to each member, and served as a delegate between the Communications Team and the Director of Communications. My favorite part of this role was helping create a Canva Brand Kit and theme, which included choosing colors, fonts, and the overall vibe for my committee members to use when creating graphics. This allowed for a consistent theme and marketing presence and gave an overall sense of unity. I was also assigned other tasks, such as designing T-shirts and pins for members and the campaign banner that hung on Greene Street. I was able to work alongside the other two captains and director to brainstorm ideas for both the TikTok and Instagram accounts. I enjoyed bouncing ideas off others who differed from me and working together to create a positive social media platform.", "time": "I have been involved in a wide range of activities throughout college, and I manage my time effectively to meet all of my commitments. I have previously served on Student Government’s Freshman Council, the Student Government Communications Team, held several positions within my sorority, and worked as a Resident Assistant for the 2025–2026 school year. Throughout these experiences, I have maintained a 3.9 GPA while remaining actively engaged in each organization.\nHowever, I have made the intentional decision to step back from some of these commitments, including my RA position and Student Government, in order to focus more on my academics and long-term career goals in the medical field.\nFor the 2026–2027 school year, my commitments will include serving as an Arnold Ambassador, which involves approximately 3–4 meetings or events per semester, attending weekly chapter meetings for my sorority, and hopefully working a Medical Assisting position for 10–15 hours per week, in addition to AED responsibilities.\nWhile I will remain involved on campus, my overall time commitments will be significantly reduced compared to previous semesters, allowing me to dedicate more focused time and energy to AED.\nI stay organized by using a color-coded Google Calendar to manage all of my responsibilities and ensure I am fully present and prepared for each commitment. I am highly motivated to become more involved in AED and am confident in my ability to balance my responsibilities while being an active and reliable member of the organization.", "impact": "The past Marketing Directors have done an amazing job maintaining frequent Instagram posts, creating merchandise for members, and building a positive social media presence. I would continue initiatives such as Takeover Tuesdays, member shoutouts highlighting involvement across campus, and maintaining a balance of fun and professionalism through the garnet, black, and cream color scheme.\nWhile this strong foundation is important to maintain, I would also introduce new ideas. . First, I would establish a more uniform Instagram brand by incorporating consistent cover photos featuring members, which would help increase Instagram engagement and promote our organization. I would also post a balanced mix of graphics and photos from our events throughout the feed. Additionally, I would create pinned posts highlighting our three core values—Service, Leadership, and Scholarship. This would clearly communicate what AED stands for to both current and prospective members. To asure there is consistent and frequent posting, I would create a social media posting schedule, using Loop. \nAnother key goal of mine is to involve more members in the marketing and communications process. I would create a Marketing Committee to provide feedback, generate new ideas, and assist with creating graphics and other forms of media. I also plan to introduce a TikTok account focused on more laid-back and social content, with committee members helping manage and create posts for that platform along with graphics. \nI would organize my committee into three groups, a Graphics Team, a Media Team, and a Merchandise Team. The Graphics Team would be responsible for creating content based on our established brand kit and ensuring consistency across all platforms. The Media Team would focus on capturing photos and videos, as well as creating content for platforms like TikTok. The Merchandise Team would assist in designing merchandise of all members of the organization. We would meet monthly to discuss new ideas and collaborate on upcoming initiatives. After these meetings, I would communicate our decisions during the chapter and gather feedback from the chapter by using Google Forms feedback form. This approach ensures that all members feel included in the process and that our marketing efforts reflect the organization as a whole.\nTo further increase member involvement, I would implement “Why AED Wednesday?”  This would be a flyer me or my team would create that allows active members to add a picture  and post for their “Why?” on their Instagram stories. It might be from a fun social event, or a professional event, or even just pictures of them and their friends they made through AED. These would be sent out in the GroupMe monthy, giving members the opportunity to share their experiences and why they love being a part of this amazing organization. I would also continue posting over the summer to highlight what members are doing, whether that be vacations, internships, or clinical experiences, in order to keep engagement consistent year-round.\nOverall, my goal is to build on the strong foundation already in place while creating more opportunities for member involvement and expanding AED’s presence across multiple platforms.", "extra": "As discussed in my previous responses, I have experience in communications and many ideas to further strengthen our social media presence. However, graphic design and art are more than just skills to me, they are one of my many passions. Alongside my interest in medicine, design serves as a creative outlet that allows me to express myself, especially during stressful times.\nThis role would not simply be another leadership position for me, but something I genuinely enjoy and look forward to. Being able to contribute creatively while supporting AED would help me manage academic pressures. I am excited about the possible  opportunity to bring both my passion and experience to this position.", "transport": true}, {"name": "Lauren Vallabhaneni", "year": "Junior", "track": "Pre-Med", "positions": "New Member Director (2 spots), Diversity, Equity & Inclusion Chair (1 spot)", "fit": "I believe I would be a good fit for the New Member Director position because I have a genuine passion for helping others feel welcomed, supported, and connected as they begin their journey not only in AED, but as a student navigating a pre-health track. My own experience with AED has played a major role in shaping that passion. I rushed AED three times before being accepted, and each time I was encouraged to come back by members who were kind, supportive, and made me feel comfortable. That persistence was driven by the environment AED created, and it showed me how impactful a positive and encouraging community can be.\nOnce I became a member, the most meaningful part of my experience was the new member events organized by the New Member Directors. Those events were what truly helped me acclimate, as they gave me the opportunity to meet people, form friendships, and find a smaller community within a larger organization. I still remember one of my first new member events, where I won a gift card during trivia and genuinely had so much fun. It was the moment I realized the sense of community I had just gained. Because of those experiences, I was able to build relationships that have continued outside of AED, which has made my involvement feel more personal and lasting. Looking back, I often wish I knew then what I know now, and that perspective motivates me to be an accessible, supportive resource for new members who may feel unsure or overwhelmed at the beginning of their journey. That is something I would love to create for future new members.\nWhile I may not have as many points as some other members, I want to be transparent about that. This past semester, I balanced a busy schedule that included significant time commitments outside of AED, including traveling most weeks. While that limited my ability to attend as many events as I would have liked to, it also strengthened my time management and prioritization skills. Most importantly, it has motivated me to become more involved moving forward and take on a more active role within this wonderful organization. The relationships I built through new member events have been meaningful and long-lasting, and they have strengthened my commitment to the organization.\nAdditionally, my role as a U101 Peer Leader has given me valuable experience in mentoring and supporting students as they adjust to a completely new, and sometimes scary, environment. I work closely with freshmen to help them feel comfortable, find resources, and build confidence, which directly aligns with this role. I have developed strong communication, leadership, and organizational skills that would allow me to effectively plan events and support new members in any way they may need throughout their transition into AED.\nOverall, my persistence, personal connection to the new member experience, and passion for building community make me well suited for this role. I am committed to creating an environment where every new member feels welcomed, supported, and able to find their place within AED, just as I did.", "time": "I understand that serving on Cabinet is a significant time commitment, and I am truly committed to making AED a priority. I am involved in other things, including dance and my role as a U101 Peer Leader, which both require a lot of time and consistency. Because of that, I’ve had to learn how to be very intentional with how I manage my schedule.\nThis past semester, especially with traveling most weekends for dance, I had to become much more aware of how I was spending my time. It wasn’t always perfect, but it pushed me to grow and develop better habits when it comes to planning ahead, staying organized, and following through on my commitments. I’ve learned how important it is to not overextend myself and to be fully present in the things I choose to take on.\nMoving forward, I want to be more involved in AED, and I am making a conscious effort to prioritize it in my schedule. That means planning ahead, setting aside time for events and meetings, and being someone that others can rely on. I also understand that being on Cabinet isn’t just about showing up—it’s about being engaged, supportive, and consistent for the people you are serving.\nThis position is especially important to me because of the impact new member events had on my own experience. The AED community has supported me in ways that helped me feel welcomed and connected, and because of that, I want to become more involved and help create that same experience for others. I am committed to being present and giving this role the time and energy it deserves. I truly care about contributing to AED in a meaningful way, and I am confident in my ability to balance my commitments while being a dependable member of Cabinet.", "impact": "I would positively impact AED by building on the strong foundation that already exists, while making the new member experience more intentional, supportive, and meaningful. Having gone through the process recently, I know how important those first few interactions and events are in shaping how connected someone feels to the organization.\nOne way I would do this is by being more intentional with new member events. While these events are already a very strong and wonderful part of AED, I would focus on creating an environment where members not only attend, but leave feeling like they truly know the people around them. I would incorporate more opportunities for everyone to learn each other’s names and interact in smaller, more comfortable settings, so no one ever feels overlooked. I would also prioritize hosting pledge class–specific events, giving new members the chance to build closer relationships within their own class and develop a stronger sense of community early on.\nI would also love to build on the idea of sharing advice from current members by incorporating a “what I wish I knew” perspective into new member programming. Whether through a casual panel or informal discussions with other members, this would give new members insight into navigating AED, academics, and pre-health experiences in a way that feels comfortable, approachable, and honest. In addition, I would make myself available through informal “drop-in” times where new members could come with questions, concerns, or just to talk. I want to be someone who is accessible and supportive, so that new members feel comfortable reaching out and know they have someone they can rely on.\nFinally, I would place a strong emphasis on retention and continued engagement after the initial new member period. It is easy for members to feel connected during the first few events, but maintaining that sense of belonging is just as important. I want to create opportunities for continued interaction and check-ins so that new members feel supported beyond their first introduction to AED, and build a strong sense of connection and community for their experience going forward.\nOverall, my goal would be to ensure that every new member not only feels welcomed at the beginning, but continues to feel connected and valued throughout their experience in AED.", "extra": "I want you to know how much I genuinely value personal connection. I am someone who naturally gravitates toward people. I enjoy starting conversations, getting to know others, and making sure no one feels left out or uncomfortable in a new environment. I try to be someone who is open and easy to talk to, because I know how much of a difference that can make, especially when someone is new and nervous.\nThis is a big part of why I am drawn to this position. I care about creating spaces where people feel comfortable and like they belong, and where they can form real connections rather than just feeling like another member of a large organization. The moments that meant the most to me in AED came from those personal interactions, and I would love to be someone who helps create that same experience for others. I was intentional in applying for this position because I feel strongly that it aligns with my strengths and what I hope to contribute to AED. This role reflects the part of AED that impacted me most, and I am genuinely excited about the opportunity to give back in this unique way.", "transport": true}, {"name": "Beatrice Maulfair", "year": "Senior", "track": "Pre-Med", "positions": "MedConnect Director (1 spot) -- Pre-Med applicants only, New Member Director (2 spots)", "fit": "I believe I would be a strong fit for a cabinet position within AED because of my demonstrated leadership, commitment to member development, and ability to successfully execute large-scale initiatives that foster both community and professional growth. I am also an enthusiastic and driven person who naturally inspires those around me, and I am deeply motivated by contributing to something bigger than myself.\n\nAs an involved member of AED, I have served as a New Member Mentor, where I supported new members throughout their transition into the organization. I worked closely with the New Member Directors during rush and the new member process, helping facilitate events and ensure that new members felt welcomed and engaged as well as creating environments for current members to connect with their AED family. One of my most impactful contributions was creating a quiz-style game used during the new member process, which has become a highly successful and well-received activity this past year. This experience directly aligns with positions focused on membership engagement, education, and new member development, as it reflects my ability to create meaningful, interactive programming while bringing energy and enthusiasm to every event.\n\nMy experience in Tri Delta has further prepared me for leadership within AED on a larger scale. As Director of Recruitment Events, I coordinated the logistics of formal recruitment for over 2,900 potential new members while managing a chapter of more than 500 active members. I delegated responsibilities across committees of 50 members and helped recruit a pledge class of 176 new members, all while managing a $85,000 budget. This role required strong organizational, communication, and leadership skills, as well as the ability to collaborate effectively with a recruitment team and advisors, skills that are directly transferable to cabinet positions involving event planning, operations, or member coordination.\n\nAdditionally, through founding the Membership Experience Committee for my chapter, I led initiatives to foster inclusivity by organizing one-on-one meetings with every member of our 176-person pledge class. This experience strengthened my ability to build personal connections at scale and prioritize member wellbeing, ensuring each individual felt valued and supported within a larger organization. I also communicated the feedback we gathered from the pledge class to chapter leadership, collaborating to implement improvements that benefited the entire chapter. I also served on Tri Delta’s Conduct Committee, where I learned the importance of accountability, upholding standards, and supporting members in meeting expectations, skills that are valuable in maintaining the integrity and professionalism of AED.\n\nOutside of Greek life, I have served as a U101 Peer Leader, mentoring a group of 20 first-year students as they transitioned to college. I was honored to be named an Outstanding Peer Leader of the Year Top 10 finalist, nominated by my students, which speaks to my dedication to mentorship and my ability to create a supportive and impactful environment.\n\nIn addition to these roles, I am also well suited to help lead and strengthen AED’s MedConnect program, which connects undergraduate members with medical students at the University of South Carolina School of Medicine. As a pre-med student, I understand how impactful mentorship and real insight into the medical field can be at this stage. I have loved being a part of the MedConnect program this past year, and my mentor, Lauren, has been invaluable in offering advice on everything related to the pre-med path. That experience has shown me just how powerful strong mentor relationships can be.\n\nI would work to make these connections more consistent and meaningful by facilitating communication, organizing intentional events, and creating an environment where members feel comfortable building relationships with medical students. I want to ensure these relationships start strong by prioritizing thoughtful mentor-mentee pairings and creating events that genuinely foster connection, guidance, and academic success. My experience in mentorship, event coordination, and community-building uniquely positions me to help expand this program into an even more valuable resource for our chapter.\n\nOverall, my experience in AED, along with my other leadership roles, have prepared me to excel in new member education, member experience, and event coordination, and I am excited to bring my enthusiasm and genuine passion for uplifting others to help strengthen community and support members’ personal and professional growth.", "time": "I understand that serving on Cabinet requires a significant and consistent time commitment, and being selected for this role would be such an honor that I would be excited to prioritize AED in my schedule. As a rising senior, I will have a lighter course load than in previous semesters, which allows me to be intentional with how I allocate my time and energy.\n\nI am an extremely organized person—almost to a fault—and rely heavily on structured planning systems such as detailed calendars, to-do lists, and internal deadlines set well ahead of actual due dates. I make it a priority to complete tasks early and thoroughly rather than waiting until the last minute, which allows me to manage multiple commitments without sacrificing quality. This approach has consistently helped me balance demanding roles, including managing large-scale recruitment logistics in Tri Delta, mentoring students as a U101 Peer Leader, working as an Undergraduate Research Assistant, and staying actively involved in AED and campus life.\n\nWhile I am involved in other organizations, I have proven that I can be fully present and reliable in each of my commitments. In leadership roles, I have been accountable not only for my own responsibilities but also for others depending on me, and I take that responsibility very seriously. I am very specific about the standards I set for my work and take pride in producing outcomes that I am genuinely proud of; however, in my role as Director of Recruitment, I recognized that the scope of the position was too large to take on alone. Because of this, I took the time to thoughtfully select and train my committees, fully utilizing them and leaning into the power of delegation while being realistic about what I could handle. By trusting and empowering others, I ensured everything was executed effectively while maintaining a high standard across all aspects of recruitment.\n\nYou can trust that I will be available, responsive, and engaged because I hold myself to a high standard of follow-through and accountability. When I commit to something, I show up fully. I am confident in my ability to balance my responsibilities while giving AED the time, energy, and dedication it deserves.", "impact": "New Member Director:\n\nIf selected, I would focus on intentionally strengthening the new member experience from the moment someone first hears about AED through their full integration into the organization. My goal is to create a process that is structured, engaging, and memorable, one that excites members and encourages strong long-term involvement.\n\nOn the front end, I want to build more excitement and accessibility leading up to rush. I would work with the marketing director to implement consistent, intentional marketing through AED’s social media, including promotional content that balances professionalism with approachability, like, a short promotional video to give prospective members a clear sense of what AED offers. \n\nI also want to introduce a pre-rush open house event while the interest form is live. This would be a more casual setting where students can learn about AED, hear from leadership, and ask questions. This approach helps us connect with potential members earlier and more meaningfully, while reducing the post-rush event workload for executive board and cabinet members. Additionally, I would introduce a member recommendation form to increase chapter-wide engagement in recruitment. The goal of this form is not to introduce bias, as recommendations would never guarantee admission, but to encourage current members to feel invested in the incoming class and foster greater chapter wide engagement. It would also serve as an additional data point alongside meet-and-greet evaluations, particularly for decisions that are on a tight margin.\n\nDuring rush and the new member process, I would prioritize both organization and experience. I would work to streamline logistics in all areas, paying special attention to small details, such as check-in, name tags, and crowd control, by leveraging the Mentor Committee more intentionally. By putting meticulous effort and thought into these details, we can build a strong foundation for a smooth and memorable rush and new member process. Mentors could take on these responsibilities, allowing the New Member Directors to be more present and focused on evaluating candidates and guiding the overall vision. \n\nHaving served as a new member mentor for the past two semesters, I have genuinely loved being in that role and seeing the direct impact mentors can have on new members’ experiences. Because of this, I am especially motivated to make the Mentor Committee a truly meaningful and worthwhile position—one where members feel valued, prepared, and excited about the role they play in shaping the next class.\n\nFor new member education, I want to create a clear, structured, and engaging progression. This would begin with the classic opening education presentation followed by a contract signing that sets strong expectations for professionalism, attendance, and involvement. I believe establishing these standards early is essential for maintaining the integrity of AED. I would then incorporate interactive elements, like the quiz game I previously developed, as well as pledge class-wide activities that reinforce learning while building connections. I also plan to include both a service event, in collaboration with service chairs, and a fun social event, like a laser tag outing, to create a balanced experience that reflects both AED’s professional and social values.\n\nA major focus of mine is fostering genuine connection within the new member class. I would incorporate structured bonding opportunities that encourage members to step slightly outside of their comfort zones, ensuring that everyone is on an equal playing field and has the opportunity to form meaningful relationships. One of my most exciting ideas is implementing a New Member Retreat shortly after acceptance, scheduled for an away football weekend for a full Saturday. The retreat could take place at a location like Camp Long in Aiken, which I have already contacted for a quote—they are currently preparing one. The day would include team-building exercises, waterfront activities, group meals (provided by Camp Long), and free time, all designed to create strong connections immediately and help new members feel integrated into AED alongside executive and cabinet members. With the nice Columbia fall weather and our typical rush schedule, the retreat would be a timely opportunity to foster community after acceptance.\n\nTransportation would be organized through carpool groups led by cabinet and executive members, as well as the New Member Directors, mentors, and any pledge class members with cars. Camp Long is only a 35-minute drive from campus, making it logistically manageable. I have carefully considered both logistics and cost, and after discussing past budgeting with Andrew and Tyler, I believe this retreat is entirely feasible with thoughtful planning and execution.\n\nAdditionally, I would collaborate with Marketing to create a pledge class T-shirt for the retreat, giving members a tangible keepsake that promotes unity and pride within the class.\n\nI also want to improve the Big/Little pairing process by enhancing the mingle experience. This would include securing a more suitable location, implementing table assignments and a rotation system to ensure meaningful interactions, and maintaining a level of organization that allows the process to feel both intentional and enjoyable. At the same time, I believe in not fixing what isn’t broken, so I would build upon the current strengths of the system in regards to big little date requirements rather than completely overhauling it.\n\nI would plan to continue and further develop the Big/Little point system that has been successfully established this past year, ensuring it remains consistent, fair, and easy to track. I would work with the Mentor Committee to continue and expand the execution of their events, with a focus on prioritizing a wide variety of large-scale events to maximize attendance and engagement across the chapter. To ensure these events are intentional and well-executed, I would prioritize planning them ahead of the semester in collaboration with the committee so that logistics, themes, and scheduling are already in place before the semester begins.\n\nAccountability is another area I would focus on strengthening. I would implement a clear structure of expectations through the new member contract, which serves as a tangible way of holding members accountable to their commitment and fostering a culture of professionalism. Additionally, I would establish a tiered system of accountability in collaboration with the executive board and in accordance of the national guidelines. This could include an initial meeting with New Member Directors, followed by probation with additional requirements if necessary, and ultimately removal from the process in more serious cases. My goal is not to be punitive, but to uphold the standards of AED and ensure all members are contributing positively to the organization.\n\nTo ensure continuous improvement, I would introduce short, anonymous feedback forms sent to the most recent pledge class after key events. This allows members to feel heard and provides valuable insight into what is working and what can be improved for future semesters.\n\nOverall, I want to create a new member process that is thoughtful, organized, and impactful, one that builds excitement, fosters genuine connection, and sets members up for long-term success within AED. By combining strong structure with intentional community-building, I believe I can help elevate AED’s membership experience and continue to grow the organization in a meaningful way.\n\nMed Connect: \n\nI would bring new ideas to strengthen AED’s MedConnect program in collaboration with the University of South Carolina School of Medicine. I would introduce a more structured and intentional application process, similar to programs like PACT, to increase both the selectivity and commitment of participants, ultimately strengthening engagement and buy-in. I would implement a structured “speed dating” style meet-and-greet prior to mentor-mentee pairings, allowing participants to have multiple short, meaningful conversations before matches are made. This would help ensure more intentional and compatible pairings, while also making the process more engaging and interactive. Additionally, I would also work to host more events at the medical school itself, creating a more immersive and professional environment for undergraduate members while fostering stronger relationships with medical students. These events could include small-group mentorship sessions, Q&As, and panels that provide honest insight into the medical school experience. By adding structure, consistency, and a higher level of intentionality to MedConnect, I believe it can become one of AED’s most impactful professional development opportunities for members pursuing careers in medicine.", "extra": "I am passionate about membership development and creating environments where people feel seen, valued, and inspired to be involved. I want to take the experience and success I’ve had in membership-focused roles and translate that into AED, an organization that I believe has so much momentum and potential.\n\nAED is already on a strong upward trajectory, and I would be excited to help take it to the next level in recruitment and the new member process. I am driven by the idea of building something that lasts beyond my time here, and I believe that starts with investing in new members. By lifting them up, setting strong expectations, and creating meaningful connections early on, we can build a stronger, more engaged chapter for years to come. I am confident that I can be the person who takes the New Member Director role to the next level, elevating the experience for both new members and the chapter as a whole.\n\nI also fully recognize that the New Member Director position is a collaborative, co-led role, and I would be genuinely excited to work alongside someone who is equally motivated and invested in the success of the process. In my previous recruitment experience, I worked closely in a co-director structure with the Director of Membership Selection, who managed the internal logistics of recruitment, and I learned how important communication, trust, and division of responsibilities are to a successful outcome. That experience taught me how to operate effectively as part of a team, where both roles are distinct but equally essential, and where the strongest results come from consistent collaboration and shared vision.\n\nI bring energy, organization, and a genuine passion for helping others feel connected and excited about what they are part of. More than anything, I care about creating an experience where members are not just involved, but truly invested in AED and in each other.", "transport": true}, {"name": "Abhinav Cheedipudi", "year": "Senior", "track": "Pre-Med", "positions": "MedConnect Director (1 spot) -- Pre-Med applicants only, Pre-Med Chair (1 spot) -- Pre-Med applicants only", "fit": "Throughout my time at UofSC, AED has provided me with the guidance I need to be confident in my pre-med journey. With multiple events all geared to showing the beauty behind healthcare, AED has provided me the necessary foundation to answer the infamous “why medicine” question with passion and understanding. As an active member, I found the events to be holistic, offering comparisons of various healthcare careers. The least I can do for this organization is to pour all my experiences, contacts, and effort back into the organization for future pre-med members. My decision to apply for the cabinet rests on my guarantee to firmly ground other pre-meds in their decision for “why medicine.” \n     I am writing this application to apply for the Pre-Med Chair and MedConnect Director. One of the primary reasons I believe that I am a good candidate for these roles is that I am applying to medical school in this cycle, and by the time I am active in this role, I will have gone through the AMCAS application process, allowing me to plan events to showcase my experience behind this application process.\n     Alongside offering insight into the AMCAS application cycle to future pre-meds, during my time as an undergraduate, I shadowed many specialties, ranging from neurosurgery to orthopedics and cardiothoracic surgery, all through connections I built with MUSC Charleston’s and PRISMA's HR departments. Given the opportunity to step into the role of Pre-Med Chair, I will work diligently to build a streamlined shadowing process through the HR connections I have at these two hospital systems for AED pre-med students to further their shadowing experience. As a pre-med who loves to talk to medical school students, I promise to deliver new and exciting panels required for the role of MedConnect Director to the members of AED.  \n     Working as a medical page for the S.C. House of Representatives Medical, Municipal, and Military Committee has taught me to work efficiently in a group environment and to meet deadlines promptly. After meeting with the Fall 2025 to Spring 2026 executive and cabinet members, I realized the extensive interplay between the cabinet and the executive board. I promise that stepping into these roles as either Pre-Med Chair or MedConnect Director, I will deliver the required objectives with the utmost professionalism, as evident in my time as head committee page in the S.C. House of Representatives Medical, Municipal, and Military Committee.\n     As a pre-med student who, by next semester, will have completed the application cycle, I plan to deliver meaningful and impactful events for the greater pre-med community in AED so that everyone in this organization is firmly grounded in why they chose this field. I look forward to working alongside members of the executive board and other cabinet positions to host collaborative events that provide each student who attends with a new understanding of themselves, strengthening their reason for pursuing healthcare– after all, it is the least I can do.", "time": "“Stop being an Icarus.” These were the words my roommate told me during the first week of our MUSC research internship last summer. You see, Icarus wanted all that the world had to offer, but foolishly pursued it. Greek mythology tells us the story of Icarus to remind us to be grounded in our actions and pursue our goals with vigor, but most importantly, with the proper intent. \n     As a naive pre-med during my freshman and sophomore years, before hearing these wise words, I believed the best way to become the doctor that my 6th-grade self would be proud of was to pursue everything all at once- every work opportunity, every research opportunity, and every shadowing opportunity. I foolishly believed that taking 18 credit hours a semester while working 65 hours a week was the best way to make it out of undergraduate.\n While I am grateful for the professional contacts that I built during these naive years,  I never stopped to truly ask myself what I got out of every experience. As my roommate said those words to me last summer, I realized I was Icarus, and that I was close to falling from the sky. \n     As I went into my junior year, these words truly resonated with me. I decided to re-evaluate my commitments and drop the opportunities that did not align with my future goals or make me into a better person. I decided to show up for myself in ways that helped me grow and become a better pre-med student.\n     I am writing this application as a person applying for both the Pre-Med Chair and the MedConnect director. I realize that both of these cabinet positions require a large time commitment to plan and orchestrate meaningful events for AED members. With that in mind, I have intentionally scheduled my fall semester to have a reduced workload, with no late-night labs on any school days and multiple asynchronous online classes. To give my full attention to the time commitment demanded by these positions, I plan on resigning from all but one of the research labs I worked in at the start of the upcoming Fall semester. \n     During my senior year at UofSC, I will primarily be involved in AED, continue research in one of the research labs at the UofSC School of Medicine as part of my honors thesis, and work as a part-time medical page for the S.C. House of Representatives Medical, Municipal, and Military Committee. While these events outside of AED may seem like extensive time commitments, combined this will only account for 20 hours of my week. I am committed to the time commitment required for these cabinet positions, as it goes to my newfound goals as a pre-med student– pursuing opportunities with intent and purpose.", "impact": "AED has been one of the most meaningful organizations I have ever been a part of. As a first-generation college student whose family is not in medicine, starting the pre-med journey as a freshman felt nearly impossible. I sit here 3 years later with a well-defined plan for how to execute the remaining year of this journey before going to medical school, all thanks to the guidance from my peers in AED. The events hosted by AED have grounded me in the doctor I want to become. \n     As I apply for the positions of Pre-Med Chair and MedConnect Director, I want to add the promise of continuing the excellence each position has offered countless pre-meds in their journey to medical school. Respective events such as personal statement workshops, intubation clinics, triage simulations, IV clinic, suture clinic, and social connections with medical students have allowed pre-meds to firmly ground themselves in truly understanding the medical field and the doctors they want to become. While still hosting the famous events characteristic of each cabinet position, I want to expand on the type of events that each role could offer AED pre-med students. When I decided to apply for these positions, I started asking pre-meds in AED what they wanted added to or changed in AED.\n     First, I realized that many students on the pre-med path in AED did not always start on the pre-med path. This becomes a problem with the flow of information to the respective member who switched, as their assigned big and little are most likely not on the pre-med pathway. While I am not suggesting overstepping into the big/little match process hosted by the new member directors, I am suggesting having events in which underclassmen in the pre-med path can interact with upperclassmen in either professional or social environments to allow the newly switched AED member to gain the best information on how to become a successful pre-med student at UofSC. I am also suggesting bringing in alumni medical students from the UofSC School of Medicine and MUSC to serve as a panel
