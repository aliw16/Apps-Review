 events to connect with other pre-dental members in AED. We are such a tight knit community with a shared interest, and I think it would be great to have mingles or more social events to bring everyone together. I also am very aware of how costs factor into the types of events that can be held by the Dental Chair. I want to explore possible fundraising or budget-friendly events to exceed the expectations of pre-dental members. I want to make a meaningful difference in this role by expanding the variety of activities and events put on by the Dental Chair, being an outlet and resource for the members, and ultimately bring each member closer to their goal of becoming a dentist.", "extra": "Beyond my clinical experience and academic performance, I want the committee to know that I thrive on being well rounded and having a work-life balance. Outside of class I love hanging out with close friends and family, being outside in nature, and leaning into my creative side through art. I know how overwhelming the pre-health path can feel, especially when balancing shadowing, volunteering, and high-level STEM courses. My goal is to be the person who makes that path feel a little less daunting for others. I am the type of person who will be just as happy to see my friends succeed as I am to succeed. I understand that holding a leadership position cannot be done just through how I look on paper but more on how I approach problems and understand others. I want to lift others up, and I would love to have the opportunity to do this through AED.", "transport": true}, {"name": "Stuti Patel", "year": "Junior", "track": "Pre-Dental", "positions": "Pre-Dental Chair (1 spot) -- Pre-Dental applicants only", "fit": "I would be a strong fit for Pre-Dental Chair because I genuinely want to give back to AED’s pre-dental community in the same way it has supported me. When I first started my pre-dental journey, I felt completely lost as a first-generation college student, and AED provided me with a sense of belonging, guidance, and opportunities that helped shape my path. Because of that, I view leadership as a form of service and hope to continue strengthening and supporting AED’s pre-dental community.\n\nAs the first in my family to pursue dentistry, I understand how confusing and overwhelming the pre-dental path can feel, especially without guidance and community. My experiences have taught me the importance of resilience and how to lead with empathy and intention. Having once been in the position of many confused pre-dental students, I believe meaningful leadership comes from using personal experience to guide and support others. I would use my experiences to help break down the undergraduate journey into a clearer, more structured path so that students feel seen, supported, and confident as they navigate their own.\n\nIn addition, I bring hands-on experience through interning with a general dentist, shadowing multiple specialties in Columbia, and assisting on a dental mission trip to Puerto Peñasco. Through these experiences, I have developed a strong and well-rounded understanding of the field of dentistry, allowing me to effectively guide pre-dental students and serve as someone they can turn to for advice. Combined with my involvement in AED and my role on the DDS service and events committee, I have developed strong organizational and event-planning skills that I would use to create more engaging and meaningful opportunities for our community. Furthermore, as Hospitality Chair for the Indian Cultural Organization, I have developed experience in event planning and logistics through designing merchandise, obtaining quotes, and managing orders. I also coordinated food logistics for multiple events, including Aag Ki Raat, an annual dance competition with over 500 attendees, which strengthened my ability to manage large-scale operations and execute events smoothly under pressure.\n\nI also work as a tutor in the Student Success Center, where I have received consistent feedback that I am able to break down difficult topics in a clear and approachable way. This has helped me develop the ability to explain complex material in a relatable way that is easier to understand, which I believe is especially important when supporting pre-dental students who may feel overwhelmed by the path ahead. I also strive to be someone who is approachable and easy to talk to, and I genuinely care about the people in this community and where they are in their journey.\n\nI have attended several AED pre-dental events and have found them very helpful in my own development, which motivates me to continue strengthening and expanding these opportunities for other students. I am also currently studying for the DAT, which gives me firsthand insight into the academic and mental challenges pre-dental students face and allows me to better understand what kind of support is most needed.\nWhat originally drew me to AED was its identity as a pre-health organization and its emphasis on the intersection between different healthcare fields. I admire how AED brings students from different tracks together to learn from one another and understand how their roles connect. I am especially passionate about the connection between oral health and overall health, and as Pre-Dental Chair, I would love to expand on this by organizing workshops, speaker events, and initiatives that highlight dentistry’s broader impact and increase awareness of the field.\n\nNot always having guidance myself has shown me how important mentorship is, which is why I want to be someone pre-dental students can rely on for support and honest advice. At the same time, I aim to go beyond encouragement by helping prepare students for dental school and a career in dentistry so they feel confident, capable, and ready for what lies ahead. I also aim to connect students to a wide range of opportunities, including conferences, shadowing experiences, free dental clinics, dental assisting roles, internships, and exposure to dental labs, so they can gain a more well-rounded understanding of the field.", "time": "I understand that serving on Cabinet requires a significant time commitment, and I have been intentional about structuring my schedule so I can fully commit to AED if selected. I will also be taking a lighter course load over the next two years since I have enough credits to graduate a year and a half early, which gives me the flexibility to dedicate more time to this role.\n\nI have also demonstrated my ability to manage a demanding schedule by balancing 17–18 credit hours during my first two years of college while staying actively involved in Alpha Epsilon Delta, Delta Delta Sigma, the Indian Cultural Organization, and the Pre-Dental Club, as well as working as a tutor in the Student Success Center. As an AED member, I use Google Calendar to plan ahead and stay on top of my AED points, as well as my other commitments. Additionally, growing up as a student-athlete has strengthened my discipline, time management skills, and ability to balance multiple priorities. These experiences have taught me how to use my time intentionally, stay consistent, and follow through on my commitments.\n\nI place a strong emphasis on setting goals and maintaining consistency. If selected, I would apply this mindset to ensure reliable and well-structured programming within AED, including consistent pre-dental events throughout the semester to keep members engaged and supported.\n\nThis is a role I genuinely care about, and I have carefully considered the responsibilities and logistics involved. If selected, I am committed to being reliable, communicative, and fully present. I am also confident in my ability to coordinate with speakers and professionals and contribute meaningfully to AED’s programming and outreach. Overall, I am confident in my ability to manage my time effectively while remaining fully committed to AED and fulfilling this role to a high standard.", "impact": "If selected, I want to make a meaningful impact in AED by building on the strong community it already has while introducing new opportunities that support pre-dental students at every stage of their journey. In addition, I am committed to creating a consistent and balanced structure of events by organizing 5–6 pre-dental events each month.\n\nOne of my main goals is to increase access to professional experiences that many pre-dental students struggle to find on their own. I hope to connect members with dental conferences, internships, shadowing opportunities, and clinical opportunities. I also want to organize experiences such as visiting a dental lab so members can gain a deeper understanding of the behind-the-scenes aspects of dentistry that are often overlooked. For professional development, I want to introduce DAT preparation through group study sessions, mock tests, resource sharing, and guidance from students who have already taken the exam. I also plan to organize panels with admissions officers, bring in speakers from different dental specialties, and host sessions that explore dentistry as a career, including and focusing on niche topics such as the evolving technology in the field and the connection between oral health and overall health. I also believe it would be valuable to open certain events to members of all pre-health tracks, especially those focused on the connection between oral health and overall health. This is an area where interdisciplinary learning can strengthen patient care and help future providers better understand the body as a whole.\nAdditionally, AED’s pre-dental recource folder has been very beneficial to me, and I hope to further improve it to reflect recent changes in the application process, including DAT scoring and letters of recommendation.\n\nFor service, I plan to organize opportunities such as volunteering at free dental clinics and partnering with other clubs where members educate children on oral hygiene. These experiences allow members to give back while also developing essential communication skills in the dental field. \n\nFor social events, I want to focus on manual dexterity through activities like mini magnet making, soap carving, rainbow loom bracelet making, and themed cookie decorating. These events help members build relationships with other members, as well as provide an opportunity to relax and focus on their hand-eye coordination. I could also partner with the future wellness chair in order to carry these events out for other members, as it would be beneficial for other pre-health tracks to work on manual dexterity for future surgical specialties.\n\nFinally, I want to ensure that members feel recognized and supported throughout their journey. I would love to implement something to celebrate graduating pre-dental seniors in order to highlight their accomplishments. Overall, my goal is to create a more connected, opportunity-rich, and supportive pre-dental community within AED.", "extra": "What I would like to add is that my passion for dentistry is rooted in both personal experience and a strong interest in the connection between oral health and overall health. Through shadowing and conversations with dentists, I have seen how dentistry impacts not only a patient’s smile, but also their confidence, systemic health, and quality of life. This has strengthened my commitment to the field and my desire to help others understand its broader impact.\n\nAs a first-generation college student, I did not always have clear guidance on the pre-dental path and have had to independently seek out opportunities, build connections, and navigate the process on my own. Because of this, I deeply value organizations like AED for providing mentorship, structure, and community. I also value being approachable and collaborative as a leader, and I want members to feel comfortable sharing ideas, questions, and concerns.\n\nI prioritize consistency, accountability, and following through in all areas of my life. I have balanced a rigorous course load with leadership roles and pre-dental experiences, and I plan to continue maintaining that balance while contributing meaningfully to AED. Overall, I hope to not only participate in AED, but to help shape it into a more supportive and opportunity-rich community for pre-dental students. Dentistry is a field I feel deeply connected to through both purpose and experience, and I am excited for the opportunity to give back to a community that has already given so much to me.", "transport": true}, {"name": "Mohin Amin", "year": "Senior", "track": "Pre-Med", "positions": "Pre-Med Chair (1 spot) -- Pre-Med applicants only", "fit": "The Pre-Med Chair is one of the most crucial positions in AED! The Pre-Med chair serves the largest pre-professional population in AED, with the primary goal of getting members into medical school. However, the job does not stop there. I want to serve as a mentor myself to the remainder of the AED Pre-Med community. I believe I would be a strong fit for the Pre-Med Chair position because of my leadership experience, my prior involvement in AED as both the Philanthropy Director and as a member, and my genuine commitment to helping others navigate the pre-med path. \n\nAs an involved member and the prior Philanthropy Director of AED, I have consistently participated in events and led both my own AED events and helped coordinate the events of other members on cabinet. These experiences have given me a clear understanding of what we do well and where there is room to grow. I am especially interested in expanding more interactive, mentorship-driven opportunities, like structured MCAT study sessions, research guidance, and one-on-one support through office hours to make resources more accessible and impactful for all members. But more importantly, as a pre-med myself, I understand what it feels like to come into college with little to no knowledge of how to effectively prepare for medical school, especially when it comes to standing out and being a competitive applicant. There are so many moving parts, from clinical experience and research to building a strong narrative and preparing for the MCAT to leadership; it can feel overwhelming without the right guidance. Because of this, I am especially passionate about making sure members have access to clear, structured, and honest advice early on, so they can make those informed decisions and avoid feeling lost in the process like I myself once did.\n\nThrough my roles as President and Executive Vice President of Delta Epsilon Psi Fraternity, Inc., I have gained extensive experience in planning events, managing teams, and maintaining engagement across a large organization. These responsibilities have strengthened my ability to organize both programming of all scales, delegate tasks effectively, and ensure that initiatives run smoothly. These are all skills that directly apply to coordinating pre-med events, workshops, professional opportunities, and being an available, high-quality resource for our members. \n\nIn addition to that, my role as President of the LIFE Internship program at McLeod Health has given me hands-on experience mentoring students interested in healthcare, coordinating shadowing opportunities, and building professional relationships with healthcare providers. In addition to these roles, I also plan my own summer health academies with McLeod Health where I serve as a lead instructor for vitals workshops, anatomy and physiology lectures, and case studies. I also provide resources on test-prep and how to effectively prepare for entrance exams and gain clinical exposure through a variety of certifications and healthcare roles. This experience aligns closely with the goals of the Pre-Med Chair, as I have already worked to connect students with meaningful opportunities and guide them through important steps in their pre-health journeys.\n\nIf elected as Pre-Med Chair, I am confident that I can build on AED’s existing foundation while introducing thoughtful improvements that better support members in becoming strong, well-rounded applicants.", "time": "When it comes to on-campus organizations, I am a part of Delta Epsilon Psi Fraternity, Inc., the National Marrow Donor Program, Indian Cultural Organization, McCausland College of Arts and Sciences Ambassador, undergraduate research assistant at the USCSOM, ScanTime, and the Cultural Greek Council. These organizations consist of a professional and social fraternity, student organizations, honors societies, and service organizations. Within these organizations, I currently serve as the President of Delta Epsilon Psi Fraternity, Inc., the Vice President of Outreach for the National Marrow Donor Program, and Mixer Chair for the Indian Cultural Organization. Additionally, for off-campus commitments, I serve as the President of the LIFE Internship program at McLeod Health and I work part-time as a patient-care technician at McLeod Regional Medical Center in Florence. \n\nAs President, I serve as the primary representative of the chapter, overseeing daily operations, executive board performance, and overall member engagement. I maintain relationships with national leadership, university administration, and governing councils while leading strategic planning through regular meetings with officers. I also support recruitment, new member education, and philanthropic initiatives, ensuring the chapter’s continued growth and success.\n\nAs President of the LIFE internship program, I help facilitate educational programming and oversee student engagement while mentoring high school students interested in healthcare careers across the greater Florence area. I guide and support students during clinical and educational experiences throughout the McLeod Health system. In addition, I coordinate student observation opportunities, conduct interviews, and build professional relationships that support both my own career development and the advancement of other aspiring healthcare students.\n\nAdditionally, in my other positions as VP of Outreach for NMDP and Mixer Chair for the Indian Cultural Organization, I have developed strong skills in event planning, community engagement, and outreach. I have organized and promoted events that require collaboration across different groups, effective communication, and high levels of participation. \nServing in leadership roles in these organizations over the past few years, I have become efficient with my time management. I always ensure that none of my commitments interfere with each other, negatively impact the quality of my work, or prompt me to forget my responsibilities. A key character trait about myself is that I always honor my commitments and my word; when I say I will do something, it will be done with precision and will be of high quality. My ability to honor the responsibility of being on cabinet for AED – including leadership, dedication, and consistency – will be no different. \n\nDespite my current involvement in these organizations, I plan to take a step back from nearly all of my leadership roles to focus on my Cardiovascular Technology externship and to make the Pre-Med Chair position my primary focus. If selected to serve on cabinet for AED, I will prioritize that opportunity by establishing a clear schedule where there is no interference in my responsibilities or negative impact on the quality of work I do, and I am more than willing to make AED a priority. Furthermore, I deeply value effective and transparent communication and vow to uphold the same principles with the remainder of the cabinet and executive board in times of struggle and emergencies. Nonetheless, I am fully confident and determined in committing to AED and taking on such an immense responsibility. I am capable of balancing several responsibilities and roles, while remaining organized, reliable, and driven, which is highlighted through my current leadership roles. I am determined to bring the same level of dedication to AED!", "impact": "If selected to be the Pre-Med Chair for AED, I have several ideas and changes planned and ready to implement. I want to make AED’s pre-med programming more interactive and accessible than before, tailored to the evolving needs of our members and current pre-med trends. While AED already offers strong foundational events such as triage simulations, case studies, vitals workshops, MMIs and Medical Ethics, and more, I plan on expanding those by introducing more structured and personalized opportunities that better support students at every stage of their pre-med journey.\n\nFirst and foremost, one of my primary goals is to increase accessibility of professional resources for our pre-med members. To do this, I’d like to implement weekly office hours with the Pre-Med Chair position, where members may drop by and ask any questions they may have regarding developing an MCAT study schedule and plan, ask for help with internship or job applications, or even chat about next steps leading to medical school and setting oneself up for success. As I mentioned earlier, one of the primary duties of the Pre-Med chair is to offer personalized guidance and mentorship, and through set office hours, I would be able to accomplish just that. Furthermore, I would like to incorporate a weekly or bi-weekly MCAT study session event, where I would rotate between each of the four sections every week or every other week. In these events, I would go over a passage or two pertaining to Chem/Phys, CARS, Bio/Biochem, or Psych/Soc, and work through the reasoning behind the answers. This will promote an engaging and collaborative environment for members to consistently attempt to practice MCAT problems while being able to discuss amongst themselves, learn from one another, and actively prepare for their MCAT. In addition, I plan to introduce a Panel Event with OUR and their ambassadors to discuss research involvement with our Pre-Med community, alongside a Research Application Crashcourse to help students understand how to find and apply to research labs. This includes finding contact information, how to cold email professors, and even providing them with an effective cold-email template. I also plan to work with the Academics Chair to develop a research database that accounts for several open lab positions each semester, providing a simple, streamlined method for the AED Pre-Med community to find research they are interested in and can quickly get involved in. Finally, in terms of these professional resources, I plan to host a more effective and intentional AMCAS/AACOMAS workshop, potentially with the MedConnect Director. Instead of solely covering what the applications entail, I plan on making it more interactive by having current medical students help our Pre-Med students craft their most meaningful extracurriculars, regular extracurriculars, and personal statements during the event itself. This would be similar to the idea of a Writing Workshop for the AMCAS and AACOMAS. \n\nIn addition, I would like to plan other essential events for our Pre-Med community such as Realities of a Gap Year Event or How to Make Your Gap Year Productive. With the increasing competitiveness of medical school application cycles and the overall increase in quality of applicants, taking a gap year has become very common, but those gap years need to be productive. I’d like to plan several of these events, each focused on a niche gap year opportunities such as pursuing a post-baccalaureate in research, working in a clinical setting, volunteering, pursuing a Masters, etc. This event will ensure we set our members up for success after college and leading up to medical school. Also, I plan on hosting events related to the financial aspects of medical school, focusing on topics such as loans, scholarships, managing debt, opportunities to seat yourself up for financial success, etc. As medical school continues to increase in expense and so does society, it becomes crucially more important for Pre-Med students to be aware of and be intentional about their financial situations. Moreover, I also plan on implementing Trivia Thursday, partnering with the Pre-Dental Chair, PA-CT Director, Allied Health Chair, Academics Chair, and the Marketing Director, where we post mock MCAT, GRE, DAT, case study, or medical trivia questions via a poll for members to answer. This serves as an engaging way for our members to continue their intellectual curiosities and a fun way for everyone to interact. After all, we all love daily games such as “Wordle” and more. Finally, I plan to continue the idea of Jeremy’s shadowing database by adding in clinical volunteering opportunities, internships, opening job positions, and research opportunities for our Pre-Med members. I will do this by including this in the Pre-Med Resource folder and continuously updating it throughout the semester.", "extra": "During my time as Philanthropy Director, one of the most meaningful parts of the experience was the people I got to work with. Collaborating with both cabinet and executive board members taught me a lot about teamwork, communication, and how much can be accomplished when everyone is working toward a shared goal. What stood out to me most, though, was the dedication and passion of AED’s general members. Seeing their willingness to show up, contribute, and support our initiatives consistently pushed me to strive for more every day.\n\nOne thing I would want you to know about me is that I approach leadership with a strong focus on accessibility, consistency, and follow-through. I am someone who doesn’t just generate ideas, but actively works to implement them in a way that is organized, realistic, and sustainable over time. Additionally, I make sure to always honor my commitments and my word. In my previous roles, I have made it a priority to create systems that ensure initiatives don’t just start strong but continue to improve.\n\nMost importantly, I genuinely enjoy helping others succeed. Whether it’s mentoring students through the LIFE program or supporting members within my fraternity, I find a lot of fulfillment in being someone others can rely on for guidance and support. I want to continue to bring that same mindset to AED by being approachable and available, especially for members who may feel unsure or overwhelmed navigating the pre-med path.\n\nLastly, I value collaboration and am always open to feedback and new ideas. I believe the most successful organizations are those that listen to their members, adapt, and continue to evolve. If selected, I would make it a priority to ensure that members feel heard and supported, while continuously working to improve the impact and reach of pre-med programming within AED.", "transport": true}, {"name": "Shivangi Nayak", "year": "Junior", "track": "Pre-Med", "positions": "Pre-Med Chair (1 spot) -- Pre-Med applicants only", "fit": "As a current member of the Pre-Med Committee and previous member of the Academic Committee, I’ve had the opportunity to work closely with Sanjana, the current Pre-Med Chair, and Shyam, the previous Academic Chair, and observe how they connect with professionals, organize impactful events, and lead a dedicated committee. This experience has allowed me to become familiar with the process of reaching out to speakers, planning logistics, and collaborating as a team to plan events. As a member of the Pre-Med committee, I have created various events for Pre-Med members through networking with professionals for events like the Suture Clinic and MCAT prep workshops, collaborating with other committees to host events such as Anatomy Pictionary and Charades and Healthcare Taboo, and working with other organizations to host events such as Physilink Webinars. As a part of the Academic Committee, I have also contributed to the academic newsletters, academic resource folder, study hours, and planning the job/service fair. This year, I have been fairly involved in AED, with a majority of my involvement being through professional, academic, and Pre-Med events. This has given me resources, connections, and ideas for events I can put on as the Pre-Med chair. This year, along with being on the Pre-Med committee, I have served as the Pre-Med Chair for APSMI, fundraising committee member for the new chapter of Remote Area Medical, and Outreach Chair for the Caroliniana Undergraduate Research Journal. In addition to this I am a member of the SC Board of Education Pediatric Obesity project for UAEM, and a member of TriBeta Biological Honors Society, No Periods Left Behind, and USC Akshara. I also conduct research in the Azhar Lab at USC-SOM and FLEX lab at the PHRC, and tutor a science class at Heyward Gibbes Middle School. These roles, combined with my previous leadership roles in Gamecock Bhangra and the Indian Cultural Organization have helped me strengthen my communication, organization, and event planning skills. I believe I would be a strong fit for this position because of my direct experience with AED's Pre-Med and academic initiatives, my proven leadership in other student organizations, and my deep commitment to supporting fellow pre-health students. I’m passionate about helping members access valuable resources and feel confident in their academic and pre-health paths. I’ve made it a priority to stay involved in AED, and I’m excited by the opportunity to take on a greater leadership role, contribute meaningfully, and create a lasting impact. Listed below are specific skills I have developed through AED and other leadership roles, and detailed explanations of how they would translate to my role as the Pre-Med chair of AED.\n\nEvent Planning – I developed this skill through my various leadership roles in the past two years as a member of AED’s Academic and Pre-Med committees, Pre-Med Chair for APSMI, and the logistics director of the Gamecock Bhangra dance team. As a member of AED’s committees, I organized various social and professional events. I reached out to student organizations, faculty members, and professionals in order to coordinate and oversee these events. This skill will be very useful as the Pre-Med Chair because I have preexisting professional connections from the Pre-Med and Academic Committee and have developed my professional communication skills to help me efficiently plan and execute events. My familiarity and experiences with the process of planning and hosting AED events has allowed me to engage in different types of events and see what is successful and what is not. For example, I have seen that interactive events such as the IV/Suture Clinics or interactive presentations and speakers such as the MedEx personal statement workshop are more engaging and beneficial to members compared to lecture style events. Additionally, through my roles in APSMI and GCB, I have had experience planning school events, social events, and large-scale events, such as the GCB showcase, which has given me a variety of experience in collaborating with different vendors, professionals, and organizations, and has improved my communication, organization, and overall logistical skills.\n\nProject Management – I developed this skill through my role as a research assistant in the FLEX lab, UAEM committee member, RAM fundraising team member, and as the logistics director GCB last year. As the director of GCB, I had to plan and oversee our Spring 2025 Shaan Showcase, and worked with our team, other teams, and vendors to facilitate the event. I booked rooms, applied for funding, fundraised, and attended to various members and guest needs before and during the event. Additionally, as a member of the RAM fundraising committee, I have experience planning fundraising events, keeping a budget, and fundraising for long-term projects. RAM is a recent startup with a goal of hosting a clinic in Columbia in 8 months; this experience has solidified my event planning and project management skills for large-scale, long-term projects. Lastly, my role in the UAEM committee creating a case on Pediatric Obesity for the SC Board of Education and my role as a research assistant have enhanced my project planning and research skills. These roles are all beneficial to the Pre-Med Chair role because they allow me to plan and facilitate long term projects such as the Pre-Med Mentorship program or the Medical School Prep Series that I plan to integrate.\n\nCommunication – My skills with professional communication developed significantly through my involvement in AED’s Pre-Med and academic committees. Through my roles, I learned a lot about how to reach out to professionals and organizations, follow up respectfully, and facilitate events with them. These skills will all be useful as the Pre-Med Chair when developing relationships with professionals and organizations and working with them to facilitate events for our members. Communication is a skill that I initially struggled with and have improved the most upon since joining AED. Freshman year on the Academic committee, I struggled to communicate proactively to the Academic Chair about task completion or deadline extensions when needed. This year, I used the feedback I got from Shyam to improve as a member of the Pre-Med committee. I made it a priority to respond to all messages in a timely manner and communicate ahead of time if something was going on that required me to miss an event or need a deadline extension. Through working on this skill, I have noticed a much smoother relationship with my committee and much more ease in task completion and organization. Overall, working on my communication skills has allowed me to become a much stronger, effective, and accountable team member, which is a skill that will carry over to being a part of AED’s cabinet.\n\nTime Management – As a part of various organizations and being on multiple executive boards and committees, I learned how to prioritize tasks and manage my extracurricular involvements alongside my classes. Initially, this skill was also a learning curve. At first, I found myself taking on too many tasks at once and therefore was not able to put my best foot forward in my work. This year, I have significantly improved this skill by prioritizing the clubs, events, and activities that are of most importance to me. My focus has shifted from pursuing a large quantity of activities to instead pursuing a smaller quantity but putting in my best effort and quality work into each thing I choose to do. I plan to continue this next year by prioritizing AED and managing my time and workload to reflect quality work and effort. Time management and prioritization will be extremely useful as the Pre-Med Chair because being a member of AED cabinet requires a significant time commitment and learning how to prioritize tasks and effectively manage time will help me reduce stress, meet deadlines efficiently, and ensure that I can contribute meaningfully to the team's goals without compromising the quality of my work.\n\nTeamwork/Collaboration - Through my various extracurricular leadership involvements, I have learned how to work in a team to organize and execute various social and professional events. I learned how to plan ahead effectively, consult team members for ideas and help, and communicate efficiently with a team to facilitate our goals. This skill has shown up in various ways, such as collaborating with different committees across AED to plan events, reaching out to and planning events with different student organizations, and working in a committee to successfully execute events and reach our goals. By working with various committees and executive boards, I have seen firsthand the importance of teamwork, collaboration, and diverse opinions in successfully achieving goals and growing as an organization. As the Pre-Med chair, I hope to continue this by creating a diverse Pre-Med committee that can contribute to new ideas and new ways of approaching AED events to enhance the experience of our members. I also hope to collaborate regularly with other cabinet members and student organizations to put on diverse and collaborative events, giving AED members the chance to meet new people and encounter new ideas. Overall, teamwork and collaboration are the two most important skills when considering a role as large as AED cabinet; coordination within the cabinet ensures a smooth and successful experience for all members.\n\nIn addition to these soft skills, I have participated in several experiences which make me a qualified candidate for the Pre-Med Chair position. Along with my involvements in USC organizations and research, I am also working to start my program for health education called HEAL. I aim to create a one-week health education, navigation, and access curriculum for high school students and implement it in schools within the next two years. My goal is to educate the future patient population on health navigation and facilitate pathways that create greater access to health. Additionally, I have spent over 250 hours in the last three years volunteering at AnMed Hospital in various departments such as Med/Surg., Pulmonary Rehab, Emergency Department, Women’s Diagnostics, and Perioperative Services. I have observed various medical procedures and surgeries and assisted in non-clinal duties. I have also spent 55 hours independently shadowing various specialties, such as Pulmonology, Endocrinology, Oncology, Allergy Medicine, and Cardiothoracic surgery, and plan to expand on these experiences. Additionally, I have spent over 250 hours in the last five years volunteering at the Cancer Association of Anderson, a local nonprofit that advocates for and provides monetary and other aid to cancer patients in the county. I keep track of inventory and finances, manage patient data, coordinate with businesses and other organizations to organize events, maintain prosthetics, donations, and resources, among many other duties. This past summer, I completed a surgical research internship at Prisma Health – Greenville where I collaborated with an MD, residents, and medical students to conduct surgical research and deliver a presentation on “The Impact of Duramesh on Ventral Hernia Tissue Repairs.” I also gained 75 hours of experience shadowing various surgical specialties in the OR. I believe that my various clinical, research, volunteering, and leadership experiences have enhanced my skillset to help me find opportunities and facilitate events through which AED Pre-Meds can further engage with the community and prepare for medical school. I am passionate about supporting fellow pre-med students, building strong professional connections, and creating impactful events that help our members grow personally, academically, and professionally.", "time": "Being a cabinet member for AED is a significant responsibility and requires a strong time commitment, something I fully understand and have prepared for. Currently, I am involved in various student organizations as a member of NPLB, TriBeta, APSMI, USC Akshara, UAEM, RAM, and CURJ, along with being on AED’s Pre-Med committee. I am also currently a research assistant in two labs. This semester, I have planned and hosted events for Pre-Med committee along with committing to the various leadership roles described above, which has given me experience in event planning and time management. I understand that being a cabinet member will require a significantly greater amount of time than being a committee member, so I have intentionally catered my schedule and made necessary adjustments to ensure that I can fully commit to AED. First, this includes being extremely selective in my extracurricular involvements to make sure that I have time to be as present and involved in AED as possible. I plan to reduce the number of student organizations I am involved in and not take on any new leadership roles if I am accepted as a member of AED cabinet. I have also planned my classes and research hours to ensure that I am available in the afternoons, which is time that I can dedicate to planning events and accomplishing other tasks pertaining to my role on cabinet. I hope to plan a large number of Pre-Med events and to devote my afternoons to participating in and being present at as many events as possible. Additionally, I hope to collaborate with and be a mentor to my Pre-Med committee and aid them in their event planning and task completion. I am highly organized, manage my time well using a detailed schedule, and am passionate about serving our members to the best of my ability. I am determined to be present, engaged, and dependable throughout my role in cabinet; I have made AED a priority and will dedicate the necessary time and energy to serve my role effectively. I’m excited by the opportunity to give back to an organization that’s shaped my undergraduate journey so far, and I look forward to helping support our members and develop our organization further.", "impact": "As Pre-Med Chair, I hope to make the Pre-Med space more personal and accessible through a variety of new programs, events, and resources, which are detailed below.\n\nOne new idea that I would like to implement as the Pre-Med Chair is to create an (optional) mentorship program for AED's Pre-Medical students, similar to the one that the DPTMP and PA-CT program use. I think it would be beneficial to connect younger Pre-Meds with juniors and seniors who are currently taking the MCAT and applying to medical school and encouraging one on one meetings and mentorship. Mentors could work with mentees and the Pre-Med committee to create individualized timelines for each Pre-Med student. This could include required classes for the MCAT, medical school requirements, MCAT prep and testing timelines, application timelines, etc. This would help each student stay on top of their requirements and get a better visualization of the timing of each step in their journey. Additionally, this program could host member workshops (as mentioned in Aleena’s speech) that go over specific skills and knowledge from a student perspective; examples are Anki workshops, MCAT testing strategies, etc. Overall, this program would foster a greater bond within the Pre-Med community in AED and create more opportunities for students to learn about the application process. Having a structured Pre-Med mentorship program would help students learn what their peers are doing and get more information about the ins and outs of the application process from a student perspective. This program would help in providing extra guidance and leadership on top of AED's existing big/little program. \n\nIn addition to this, if elected pre-med chair, I would like to increase the involvement that AED has with USC-SOM and its medical students and faculty. AED members would greatly benefit from long-term meaningful connections with the medical school, and it is a resource that should be utilized more frequently. The Pre-Med committee has worked to put on several events this year with the medical school such as tours, OSCE workshops, etc. This involvement can be furthered through many ways. First, medical students and faculty at USC-SOM can be called as guest lecturers frequently; this gives AED Pre-Meds an opportunity to network with USC-SOM students, professors, advisors, or any other faculty that would be willing to be involved. Faculty, advisors, and admissions representatives can be called to do workshops on personal statement writing, medical school admissions, MCAT preparation, secondary applications, letters of intent, good recommendation letters, etc.; this can be a series of lectures/workshops, creating a program similar in concept to Prisma MedEx, helping Pre-Medical students to write successful applications that are informed by those who know what readers are looking for. By networking with USC-SOM faculty, students can build meaningful relationships and connections; it creates a pathway for AED students to be well-known, show interest, and get their foot in the door for medical school admissions. In addition to this, the Pre-Med committee can work to create workshops taught by medical students that focus on specific skills needed in medical school or to apply to medical school. If allowed by the medical school, the Pre-Med Chair and committee can host a shadowing program, similar to the Academics Research Shadowing program, where AED members can shadow a USC-SOM student and learn the ins and outs of the daily life of a medical student. Engaging with the medical school provides AED members with meaningful connections with students and faculty members, which can be helpful for applications, recommendation letters, and overall furthering their knowledge of what it means to be a medical student and future physician.\n\nAnother idea I have is for the Pre-Med Committee to create a database of programs where students can complete clinical certifications such as EMT, CNA, MA, scribe, etc. This can be created using information from upperclassmen who have obtained these certifications in person in Columbia, online, or elsewhere and through other sources found by the Pre-Med chair and committee. The database would include links and information on how to sign up, program length, price, necessary materials, any necessary national/state level testing and test prep (such as for NREMT), etc. Many students are looking for certifications in order to get clinical hours and/or jobs and having access to a database that compares different certifications, programs, and their benefits, along with reviews of people who have completed them would help members make the most of the network and resources provided by AED. This could also extend into a job database; many members work in these roles through on-the-job training, and the database could also include a list of companies that offer clinical roles with/without certifications. We could also implement a structured system that connects seniors who are leaving their positions with younger members, ensuring a smooth transition, continued involvement, and opportunities for mentorship and recommendations. Another idea I have is for the Pre-Med Committee to host a BLS/CPR certification workshop once a semester by collaborating with student organizations on campus such as GEMS or Gamecock Red Cross. These are basic certifications which are required for any clinical role and would be beneficial to Pre-Meds looking for clinical experiences. \n\nI would also like the Pre-Med committee to compile a database of medical schools (at least those in South Carolina and surrounding states), their application requirements, average MCAT scores, what classes are required, specific things schools are looking for (i.e. some schools are research focused vs. some are service focused), etc. This gives AED Pre-Meds an opportunity to see what coursework they still need to complete to apply, compare their MCAT score to the school averages, and get a better idea of where they should apply based on their stats, the schools’ values, etc.\n\nAdditionally, as medical school admissions get more competitive, more and more students are opting to take gap years. As Pre-Med chair I would like to create workshops that explain possible options students have during their gap year/s and why taking them may be beneficial. The committee can compile a list of resources, such as possible fellowships, research, clinical opportunities, etc. and can also reach out to AED alumni who are currently taking or have taken a gap year before their medical school applications. In addition to this, I would like to bring a greater focus on DO school and DO events if elected as Pre-Med Chair. Many of our current events focus on the MD pathway, and many of our speakers are primarily MDs. It would be helpful to have workshops on the DO pathway and AACOMAS application, and to have DO speakers for our events as well. Lastly, I would like to implement finance workshops that cover important topics such as the cost of medical school, application fees, budgeting, etc.; these are often overlooked when discussing the Pre-Med journey, however they are important factors in decision making for all pre-medical students. Overall, these events aim to expand the knowledge pre-med students have on the different paths they can take to becoming a physician.\n\nOutside of these events, workshops, connections, and databases, I would like to bring a more personalized aspect to AED’s Pre-Med community. Pre-Meds make up the largest portion of AED members, which can sometimes lead to a less personalized experience with AED and AED events. As the Pre-Med chair, I would like to get to know as many members as possible and learn about their individual journeys as a Pre-Med student. I want to make myself an accessible resource to all members that they can consult for all things Pre-Med, AED, and other. I want to put great emphasis on social events along with professional events to make sure that members feel included and experience community within the Pre-Med group. My goal is to provide as many resources as possible so members can be informed and make the best decisions for themselves. I would like to continue events we had this year such as collaborations with organizations like NPLB, Physilink, etc., interactive workshops such as the OSCE simulations, Triage Workshop, Scrubbing Workshop, Suture/IV clinics, etc., and other MCAT and medical related events. Through the addition of elements like the mentorship program, collaboration with the medical school, a greater database, and wider range of events, I hope to make AED’s Pre-Med experience more personal, accessible, and beneficial to each Pre-Med student, no matter what their individual goals are.", "extra": "AED has played a meaningful role in my undergraduate experience by giving me opportunities to grow both professionally and personally. Through my involvement, I have not only developed skills such as communication and event planning, but also found a supportive community that has motivated me to stay committed to my goals.\n\nThe people within AED are a large part of why this organization is so important to me. Being surrounded by driven, supportive, and collaborative individuals has pushed me to grow while also making the experience genuinely enjoyable. I value the sense of community within AED, where members are willing to support one another, share advice, and create an environment that fosters both personal and professional development. This is something I deeply appreciate and would be excited to help continue building as a member of Cabinet.\n\nOne of the most important qualities I would bring to Cabinet is my willingness to grow and improve. I am someone who actively seeks feedback and works to apply it, as seen in my development in communication and accountability over time. I value being a dependable and consistent team member, and I take pride in following through on my commitments.\n\nMore than anything, I am genuinely invested in AED and its members; giving back to them is the reason why I am invested in this role. I am excited by the opportunity to contribute in a larger capacity, support others in their premedical journeys, and help continue building a strong and engaged community.", "transport": true}, {"name": "Lucy Shive", "year": "Senior", "track": "Pre-Med", "positions": "Service Chair (2 spots)", "fit": "I would be well-suited to be one of AED’s service chairs because I am passionate about and committed to service, because I believe in the power of service as an entity that is inextricably linked to medicine, and because I have demonstrated my commitment to service while on AED’s service committee. \n\nCollege has been essential in developing my love for volunteering and for the city of Columbia, largely thanks to organizations such as Young Life and AED. Young Life was my earliest introduction to giving my time, my resources, and my love away through service. Through Young Life, I have been placed as a volunteer at a local high school. Young Life is Christian ministry focused on relationships and mentorship. As a Young Life volunteer, I lead camp trips, weekly Bible Studies, and club meetings alongside a team of other college-aged volunteers. Young Life is my most relational service and it is special. My volunteering through Young Life is teaching me organizational skills, sacrifice, communication, courage, and empathy. As a leader, I see students from various backgrounds, and I have the privilege of hearing their stories and loving them well. I am learning what it looks like to be a listening ear, a safe space, a mentor, and a friend. Young Life reminds me of the beautiful commonality across humanity and allows me to see Columbia in new ways. \n\nAs a member of AED, my experience of and appreciation for service has only grown. Through AED, I have had the joy of serving with Special Olympics, Salvation Army, Midlands Orphan Relief, Mano a Mano, and MIRCI, each of which are beautiful opportunities to connect with and bring light to the city of Columbia. Of all my service through AED, service with the Activity Center, the Department of Mental Health, and Transitions Homeless Shelter has been most transformative. The Activity Center was the first service opportunity I could not get enough of, and it is one of the organizations I desire to lead, in the place of Brynne, if I become service chair. The organization works with students who are in the foster system but have not been permanently placed. An organization that similarly draws me in week after week, teaching me invaluable lessons and strengthening my desire for a career in medicine, is the Department of Mental Health (DOMH). At the DOMH, I have the privilege of spending quality time with adolescents and young children receiving psychiatric care. At both the Activity Center and the DOMH, the youth are smart, creative, joyful, and hopeful, and there is so much I can learn from them. Conversing with these students is special because it pushes me to step beyond myself and be adaptable. This service work is a healthy kind of uncomfortable. In these conversations, the only goal is to make the youth feel seen, heard, loved, and valued, which looks different for everyone. Sometimes, the conversations are about listening, while other times I must ask many questions. Sometimes, it is not about talking at all, but rather about just being near and participating in a shared activity—UNO, coloring, Hedbanz, or basketball. The group of adolescents changes week to week, so I am building short relationships. Beyond these service experiences, I have also developed a heart for Transitions Homeless shelter, where I aid in the distribution of dinners and in the execution of job application workshops. At Transitions, I hear people’s stories and go out of my way to be kind to them, speaking encouragement about their job searches and their futures. I am tremendously grateful for the opportunity to engage with my community and to uniquely encounter the powerful, life-giving, humble nature of service through the Activity Center, the DOMH, and Transitions.\n\nWhat has been the greatest gift of being a member of AED, therefore, has been the way my heart has grown to love service. The University of South Carolina’s seal says, “learning humanizes character and does not permit it to be cruel.” I believe the service is a way to learn about people and therefore to humanize character and prohibit cruelty. As I learn my community through service, I am increasingly confident that every single person is uniquely beautiful, valuable, and worth getting to know, so it is a tremendous blessing that service gives me an opportunity know wonderful people. These service experiences, and the joy of taking ownership of them as a member of the service committee, has only strengthened my desire to practice humble, community-oriented medicine which prioritizes members of society who are otherwise overlooked, discounted, or misunderstood. Medicine is service, as both share a powerful, life-giving, and humble nature, so I believe it is imperative that future healthcare practitioners (AED members) experience rich, plentiful service experiences. With my history of leadership and intentionality while on AED’s service committee, where I have independently hosted more than 30 events over the past 2 semesters and nurtured AED's relationship with various service organizations, I believe that I can honor the role of AED’s service chair with excellence, commitment, and care.", "time": "I am involved in organizations beyond AED including Young Life and the Top Scholar Community. However, these responsibilities do not overwhelm me but excite me. I enjoy having a sense of purpose, organizing a schedule, and being deeply involved in organizations. I look forward to additional responsibility and a new, intentional outlet for my enthusiasm. \n\nAED is special to me and is already a significant part of my involvement, particularly because I have been on the Service Committee this year. I have developed a routine of coordinating and hosting at least 1 service event per week, so the commitment of being Service Chair will not be entirely foreign to me. I am confident that I would be able to give the necessary time to AED and serve well. I also have a lighter class load next semester and am excited to fill that new time with the commitment to AED. I am increasingly learning what it looks like to manage time well and what it looks like to prioritize what is important. To me, AED is important. I understand that a cabinet position would mean a significant commitment, but the commitment is one I am eager and willing to make. I commit to giving back to AED with my attention, time, and energy because that is what AED has graciously given me.", "impact": "I am eager to leave anywhere I go better than I found it, including AED, through my kindness, intentionality, warmth, and commitment to excellence. I desire to be a cabinet member who is approachable, gracious, and a good role model for members of AED, all of which are qualities that I have watched past AED cabinet members exhibit. \n\nAlthough the position of service chair has been historically strong, I am excited by the potential to bring a new touch. As service chair, I would be eager to increase AED members’ awareness of the various service opportunities, potentially through collaboration with AED’s marketing director. I even think it could be beneficial to have mini speakers at chapter from the various service organizations so that members of AED can better understand the service opportunities available to them and find ones that spark their interest. I believe that other members of AED can find hearts for service if they discover service opportunities that suit their values, interests, and enjoyment. Further, I would love to see collaboration between AED’s members and Remote Area Medical volunteering, potentially even through the School of Medicine Greenville’s free medical pop-up clinics.", "extra": "I would like AED to know that I am grateful for this organization and eager to serve it well. I have loved being a part of AED for the past 6 semesters and I look forward to the opportunity to deepen my involvement in this diverse, prestigious, collaborative, passionate, curious, and welcoming community.", "transport": true}, {"name": "Dharmik Namineni", "year": "Senior", "track": "Pre-Med", "positions": "Service Chair (2 spots)", "fit": "I joined the Service Committee for AED the fall of my sophomore year, and every day since then I’ve gotten to see why service is so important to AED. Beyond just being a way to give back to our community, service in AED is a way for our members to bond while being exposed to a new environment and doing work that makes an impact on others. Creating these bonds of service with each other and the community as a whole lets AED as an organization stand out in its impact, gives our members experiences that they can expand on as they pursue their careers, and allows us to spend time with each other while growing as healthcare professionals. Having been on the service committee for two years and having learned from the previous Service Chairs, my committee members, and the members who I talk to throughout AED, I can execute the role of Service Chair while furthering the impact service can have in AED. \n     One of the biggest things I’ve learned from Ridha, Sachi, Brynne, and Sarah is that being Service Chair is more than just putting on events but being a conductor for the committee. To achieve an organized and efficient committee, I’ve seen that setting clear expectations and roles for what we want to accomplish in a semester and year is what leads to the greatest success. Like the previous Service Chairs, I’d like to aim high for the number of service opportunities we provide for our members and what has let them achieve that is being upfront about their goals and clear with the direction they want us to go in. Being Vice President of the Hands on Prosthetic Engineering Club has helped me strengthen this skill, as each of our projects can become complex as we attempt to create limbs and assistive devices with accessible materials while teaching our members essential engineering techniques for their careers. What has helped me manage both our design and outreach teams is starting each semester, and weekly meeting with what we want to achieve in that week, that semester, and the year. While this means we have to put the time in to dissect our projects to make achievable goals, it has also helped our teams be less stressed and create more projects than ever before because they know what they are expected to do and can plan around their semesters to achieve it. I would apply this to leading the Service Committee as well, being clear about the number of events and organizations we expect each member to have at the minimum in a semester and how many we want to have in a semester. Breaking this down into monthly goals and having regular service committee meetings or check-ins to keep the committee updated on what we are achieving and if we are achieving what we set out to can help committee members plan out into the future to hit their goals, relieving stress of needing last minute events and keeping the committee an organized and efficient team. \n     Of course, balancing direction with flexibility is important as well. Being open to listening to the concerns of both committee members and every AED member is important as well. As a Student Health and Wellbeing Ambasssador, I’ve learned how to draw out thoughts from people at our events and adapt resources to the individual. For AED service, I’d apply this ability to be flexible when our members are going through busy times in their lives. Finding alternative events and ways for members to get their service points or for committee members to meet their event goals will be an important focus for me, as service shouldn’t be a stressful burden but an opportunity to connect with others. Having to deal with last-minute chaos with events is a challenge for the committee as well, and having learned to adapt around it myself over the last two years, I’d be able to mentor new committee members to handle these challenges and still run successful service events. This balance of both support and direction will allow our committee members to create service opportunities that fit the needs of AED while avoiding burnout or placing the burden on a few members. \n     Finally, I’d be a good fit for Service Chair due to the organization contacts I’ve been able to build through my time here at USC. From Run Your City to Harvest Hope, I’ve run events for many of both the long-standing and new organizations that AED has partnered with for our service events. Through this I’ve learned to build connections with each organization and have them excited about AED groups volunteering with them. This has come from consistency and communication, abilities that I will look for as we choose committee members. Furthermore, I’d like to build on these bonds to expand the types of events and partners we work with. This semester while leading an event, I got to meet the philanthropy director of Harvest Hope, and with just a quick conversation, he gave me his contact to discuss AED events that are more involved than just packing boxes. I’d like to capitalize on connections like this as Service Chair and further them by actively reaching out to inquire about new opportunities and other organizations our service partners work with. This lets us expand the offerings we have for our members to ensure even older organizations have fresh activities that make members want to come back. \n     All in all, I’d be a good fit for Service Chair because my experiences in college have given me a passion for service and an understanding of what it takes to run the variety of service events that AED does. By being clear and communicative, I hope to set high goals for AED service while expanding our offerings in order to keep members wanting and not just needing to go to service events. By being flexible and understanding, I can ensure that the committee has the resources and support they need to achieve these goals. Most importantly, service in AED has made a massive impact on my life by helping me create bonds with members and our community. I’ve gotten to make amazing friends and gain strong experiences that stem from service, and this is an experience that I hope to protect and give to more AED members if I can lead AED service as a Service Chair.", "time": "This summer, I will be applying for medical school. This means that by the end of July, the large brunt of work on my career path will be done. Additionally, I will be a senior and have completed 90% of my credit hours, meaning that a lot of my time will be freed up. While I will still work for Student Health and Wellbeing and continue my position in HOPE, I want to use the time that I will gain from being done with medical school applications and classes to help AED service become more impactful. By showing up to every Sunday chapter to give essential announcements and answer questions for our members, having regular check-ins with the committee and exec, and continuing to run my own service events while helping the committee navigate holding their own,  I will be able to increase the amount of time I spend in AED working in the area I am most passionate about. I want to prioritize AED to maximize the impact I have on the continuation of service as a pillar of the organizations, and I will have the time to do so in my senior year.", "impact": "One piece of feedback I’ve often gotten from AED members when I ask them for what they want to see in service events is ones that fit with their schedules more. What this looks like for many is more weekend events, but one thing I’d like to implement is an optional survey at the beginning of each semester asking our members what days and times they are free. While many members will not fill it out, I think that the ones who know they have busy schedules in the upcoming semester will be inclined to let us know when they would have the time to attend a service commitment. Combining this with more flexible organizations like the Carolina Wildlife Center can ensure that we have events that are at times that don’t force members to choose between AED service and their other commitments. Additionally, having led Run Your City through this year, I’ve noticed that many members are thankful for the weekend event at the same time each week. This lets them plan ahead and reliably know that they can attend on a day they tend to have fewer commitments. I’d love to continue Run Your City in this upcoming year and implement something similar with Harvest Hope. Organizations like Harvest Hope can take a lot of volunteers in a single event, and we can use our connection with them to have consistent events each week that our members can rely on in order to get their points. Combining the flexibility offered by the schedule form along with the consistency of weekend events, I believe AED service can be less of a stressful dash for points and more accessible for members with every type of schedule. \n\tAdditionally, the switch to Luma has been a solid addition in making event registration and check-ins more seamless. One change I’d like to make to our current service Luma process is adding the events to the calendar as they are approved by exec. Since many of our events are planned months out, opening these events will let members also plan months ahead to get their points while not waiting on the hook to see what may be coming up in the next week. This would also help the committee, as they can check in on their event sign-ups in the weeks leading up to the event and make adjustments if they need to based on interest or capacity. While it is true that this could lead to events being signed up for en masse early on, many service events currently have many unregistrations in the day or days before an event. People on the waitlist don’t have the time to check events they are waiting on, and so spots at service events go unfilled, which leads to the events not getting as much of an impact as they could have. By lengthening the time frame that events are open, people would have more time to unregister as conflicts come up and for those on the waitlist to see openings and register. Of course this means more bulk work in opening Luma events from the chairs, but having an abundance of time next year I would be happy to put in the work to make service more convenient for both the committee and AED members. \n\tLastly, I’d like to focus on the committee itself. With Brynne and Sarah graduating, they had essential organization partnerships that I want to keep for AED. So, finding capable committee members who have time to commit to both leading regular service events and actively communicating with their organizations will be important in going into this new year. I’d like to place more emphasis on the time availability of applicants and past experiences they have in maintaining connections. With this foundation, our committee would be more capable of maintaining relationships and leading consistent events, which we can then expand on by looking at new partner organizations that come from the established ones. This will also allow new committee members to get their footing in environments AED is familiar with before they expand, meaning as a chair I could be more able to mentor them on struggles they face and then help them find new opportunities they are excited about for our members. Adding monthly check-ins will help with this mentoring and ensure that the committee has the support they need in running their events. Finally, as I mentioned before, I also want to expand the event offerings we have with new and old organizations, and this would be better achieved with a more available committee to adapt these events. \n\tOverall, my ideas for Service Chair would revolve around making service more consistent and accessible for AED members while making it easier to plan for committee members. This will let service be seen as less of a burden and more of an opportunity to be engaged with and enjoy.", "extra": "Thank you for considering me! I have a lot of time next year, and I love service and what AED can do with it, so I'd love to spend my time working on expanding the impact the Service Chairs have had so far.", "transport": true}, {"name": "Rylen Witherspoon", "year": "Junior", "track": "Pre-Dental", "positions": "Service Chair (2 spots), Diversity, Equity & Inclusion Chair (1 spot)", "fit": "I am applying for Service Chair and DEI Chair because both roles align closely with my core values of service, access, and meaningful impact in pre-health.\n\nAs a new member, I have made a strong effort to be actively involved, and I quickly found that service is what drew me most to AED. In particular, my experiences with Share One Love and the Department of Mental Health have been the most impactful. Being able to return and see familiar faces, whether it’s individuals remembering you, opening up more each time, or simply feeling comfortable enough to relax and enjoy themselves, has been incredibly meaningful. Those moments reinforced for me that service is not just about showing up, but about building trust, offering encouragement, and creating a space where people feel seen and supported without judgment. That is something I am truly grateful AED has given me the opportunity to experience, and it is what motivates me to continue serving.\n\nThe current Service Chairs have done an excellent job establishing a strong foundation, and I would be excited to build on that by introducing initiatives that expand both engagement and impact. One idea I am especially passionate about is organizing fundraising efforts to help offset the cost of professional exams such as the DAT, MCAT, and GRE for members who demonstrate both commitment and financial need. I believe this is a meaningful way to connect service not only to the community, but also directly to supporting our members’ futures.\n\nIn addition, I am passionate about DEI because I view it as expanding access and opportunity within pre-health. Growing up in Lancaster County, South Carolina, an area with a dental health professional shortage score of 25 out of 26, I saw firsthand how limited access to care can impact a community. That experience shaped my understanding that DEI is not only about race or ethnicity, but also about financial barriers, background, and access to resources.\nDEI, to me, is about creating both representation and opportunity. It is not just about having someone in leadership who looks like you, but also someone who understands your experiences and background. As DEI Chair, I would work to bring in speakers who reflect a wide range of paths into healthcare, including Black female physicians, first-generation students, immigrants, and professionals who have navigated financial barriers. These are important conversations, especially in a time when financial challenges in pre-health are increasing.\n\nI also want to create initiatives that directly support members, such as fundraising efforts to help cover the cost of exams like the DAT, MCAT, or GRE. Because financial hardship can be a sensitive topic, I would ensure that any support offered is handled with discretion and respect. My goal is to create an environment where members feel supported, not singled out, and where these challenges can be acknowledged without stigma.\n\nAlthough I am a newer member, I bring a fresh perspective, strong dedication, and a clear vision for how these roles can continue to grow. I am committed to being actively involved, following through on my ideas, and helping AED expand both its impact and its inclusivity.", "time": "Serving on cabinet is a significant time commitment, and I have already made intentional decisions to ensure that I can fully prioritize AED.\n\nI am planning ahead by taking my DAT early in the fall semester, with the majority of my preparation completed over the summer. By doing this, I am removing a major time commitment from the academic year so that I can be fully present and focused on my responsibilities within AED.\n\nI have also structured my academic schedule in advance to support this role. I do not have classes past 4 p.m., and my Fridays are largely open, which gives me consistent availability for meetings, events, and planning. I am very intentional with my time, and I make it a priority to plan ahead so I can meet my commitments fully.\n\nIn addition, while I am involved in other organizations such as Delta Delta Sigma, I have made the conscious decision to limit my involvement to a general member role. I believe that strong leadership requires focus, and I am willing to make those adjustments so that I can give AED my full attention and energy.\n\nTo me, prioritizing AED is not just a statement, it is something I have already acted on. I understand that leadership requires commitment and trade-offs, and I have taken those steps to ensure that I can be reliable, present, and fully invested in this role.", "impact": "If selected, I would focus on creating initiatives that strengthen both AED’s impact through service and its commitment to access and inclusivity.\n\nAs Service Chair, I would build on AED’s strong foundation by introducing opportunities that not only serve the community, but also directly support our members. One of my primary goals is to develop a fundraising initiative that helps offset the cost of professional exams such as the DAT, MCAT, or GRE. Members would be able to apply, and support would be awarded based on involvement and demonstrated need. This allows service to go beyond volunteering and instead create a direct, lasting impact within our organization.\n\nI would also work to expand service opportunities that align with members’ professional interests, including healthcare-focused outreach such as oral health education, community engagement, and working with underserved populations. My goal is to create service experiences that are both meaningful and relevant to our future careers in healthcare.\n\nAs DEI Chair, I would focus on expanding access to resources and representation within AED. One way I would do this is by creating a centralized system for scholarships, grants, fee assistance programs, and other financial resources so members can more easily navigate the financial side of pre-health pathways.\n\nI would also bring in speakers who represent a wider range of experiences within healthcare, including Black female physicians, first-generation students, immigrants, and professionals who have navigated financial or systemic barriers. These perspectives are important because they highlight multiple pathways to success and help make the field of healthcare feel more accessible.\n\nAdditionally, I would introduce community-building initiatives such as a cultural night where members can share aspects of their identity through food, traditions, or personal experiences. This would help foster a more inclusive and connected environment within AED.\n\nOverall, my goal is to help AED continue growing as an organization that not only provides opportunities, but actively supports its members in reaching them. I want to contribute ideas that are both impactful and sustainable, while strengthening both service and inclusivity within the organization.", "extra": "I understand that I am a newer member, and I also see that as an opportunity to grow. I am ambitious, and I am willing to learn, adapt, and develop within this role. This is not something I want to simply talk about. It is something I genuinely want to build and follow through on.\n\nOne of the most important qualities I value in leadership is approachability. I want every member, regardless of their track or background, to feel comfortable coming to me. Whether it is about something related to my position or something more personal, I want to be someone people feel they can talk to. Creating that sense of comfort and trust is something I would be very intentional about, because I believe strong organizations are built on connection as much as structure.\n\nI also view service and inclusion as something that extends beyond external events. While serving the community is essential, I believe it is just as important to support the people within AED. Sometimes the most meaningful impact comes from being present, encouraging others, and creating an environment where people feel valued and supported in their own journeys.\n\nOverall
