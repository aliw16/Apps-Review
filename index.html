er connections within big/little families while still providing some sort of activity for the pairs to do together so it is not too awkward. I believe this would help improve attendance and the number of people who cook interesting foods. Overall, this is a super fun and unique event. My priority would be to increase attendance while trying to minimize the intimidation felt by some members about it. \n\nFinally, I will address what is probably the most important event the Event Coordinators put on, the Health Professionals Mixer. I have very little to say about ways to improve this event. I attended for the first time last semester and was incredibly impressed by it. I would like to keep the event in the same place in the Capstone building with very similar catering to what has been done in the past and with a very similar array of health professionals from all different fields. It is a wonderful event that I intend to continue pretty much unchanged. The only idea that I have for some improvement is a sperate event to prepare people for the health professionals mixer and other formal dining networking events like it. I would try to reserve a room like Russell 322, set up the round tables, and line up plates and silverware to review how to be respectful and have formal table manners during a dinner. I think a review of formal dinner edict would be beneficial for many members for their future in the professional world, and it would be good to brush up on before the AED event with the largest number of non-university personnel present. Once again, this is an incredible event and my primary directive would be to maintain the quality and success this event has had in the past.\n\nAs I hope is clear, I have thoroughly considered what I would like to do with this position. Event Coordinators have been incredibly successful in the past at putting on large, important events for the sake of the AED members. I plan on continuing that tradition while implementing some small adjustments that I believe would improve the quality events so that every member can get as much out of them as possible.", "extra": "One of the unique things about the Event Coordinator position that I have not addressed in any of the other questions is the fact that it is a two person position. This is one of the aspects of the role that I am most looking forward to. I am very excited about the prospect of having another person to bounce ideas off of or split work with. Having twice the people to communicate with health professionals or hearing another perspective on what foods to buy for chapter is definitely necessary for the position and, if offered the position, I am excited to see who I would be working with. I believe this makes the Event Coordinator position a more interesting and unique role that I would love to fill.\n\nOverall, I am excited at the prospect of serving on AED's leadership team again. I loved my time  over the last year and I have learned so much that I believe will help me in my future career. I think my specific history and skills make me a great candidate for this position and I would like to thank you guys for giving me the opportunity to run for it.", "transport": true}, {"name": "Khadijah Kumte", "year": "Senior", "track": "Pre-PA", "positions": "Event Coordinator (2 spots)", "fit": "I am a strong fit for the Event Coordinator position because of my experience planning well-organized events and building partnerships to support them. Over the past two years, I have served as Vice President of the Muslim Students Association, where I have developed strong communication and organizational skills. Because our organization is smaller and often faces delays in receiving school funding, I have learned how to be resourceful and proactive in ensuring our events are both successful and accessible to members.\nOne of the main ways I have done this is by securing sponsorships and donations. I have reached out to companies and built relationships that directly supported our events. For example, I contacted Poppi and secured five cases of drinks for our Ramadan potluck. For our annual World Hijab Day tabling event, I coordinated with a company that donated over $300 worth of scarves, making the event more interactive. More recently, I worked with local directors from Dave’s Hot Chicken to sponsor our iftar potluck, where they provided food for attendees, free of cost. These experiences have strengthened my ability to coordinate food and manage logistics with a team, which are skills that directly apply to planning AED events and ordering food for chapter meetings.\n\nIn addition, I have experience organizing fundraising and large-scale events. This past year, we hosted two bake sales, including one at the Ramadan Night Market at the Art Museum, where my board and I sold out of baked goods and raised enough funds to support our organization. I have also been involved in planning collaborative events, including an upcoming trip to Carowinds with Clemson University’s MSA. Coordinating events of this scale requires consistent communication, attention to detail, and strong organization, and I have used tools like Excel to track attendance, payments, and logistics.\n\nAs an involved member of AED, I truly value the sense of collaboration within the organization and with other professional groups. I would bring that same energy into planning events such as the Winter Social, Semi-Formal, Health Professionals Mixer, and semesterly potlucks. Overall, my leadership experience, ability to secure resources, and strong organizational skills make me confident in my ability to create engaging, well-executed events that strengthen AED’s community.", "time": "As mentioned prior, I have been an active board member of the Muslim Students Association, which is the main organization I am involved in outside of AED. I also work as a medical assistant part time. Over the past year, I have successfully balanced these commitments without missing responsibilities, which has strengthened my time management and prioritization skills. While it was challenging at first, I developed effective systems to stay organized, such as planning ahead, using Notion, and setting clear priorities with myself and my board members.\n\nAdditionally, as a rising senior, my course load will be lighter, allowing me to dedicate more time and energy to my commitments. I understand that serving in the Cabinet requires a higher level of responsibility, and I am prepared to prioritize AED, especially during busy periods such as rush. Through conversations with past and current board members, I am aware that the two weeks of rush are the most demanding, and I am ready to meet those expectations. I am intentional about the commitments I take on and hold myself accountable to the roles I accept. If selected for Cabinet, I am committed to being reliable and actively contributing to AED.", "impact": "Being a part of AED for the past two years has allowed me to witness many improvements as well as consistent traditions that help shape our organization’s community. One of those consistent elements is the food provided at chapter meetings. While we regularly enjoy staples like Pub Subs, donuts, and pizza, I would love to build on this tradition by introducing more variety and highlighting local restaurants around Columbia. As someone who was born and raised here and who genuinely enjoys trying new food, I have discovered many local spots that I believe members would love. AED brings together students from all over, many of whom are new to Columbia. Incorporating local restaurants into chapter meetings is a simple but impactful way to help members feel more connected to the city and its culture.\n\nAED is also an organization made up of individuals from a wide range of backgrounds, cultures, and religions, all of which include different dietary needs and preferences. For example, many members only eat halal food, others may follow kosher guidelines, and some may be vegetarian or have other dietary restrictions. I want to ensure that chapter meals consistently reflect this diversity so that no member ever feels excluded. At election chapter, our VPOs mentioned the idea of adding a short rating or feedback section after events. I would love to extend that idea to chapter food as well, so we can better understand what members enjoy and continue improving food selections in a way that reflects the preferences of our organization.\n\n I would also love to work with other cabinet members to highlight cultural and religious traditions throughout the year. For instance, celebrations such as Lunar New Year, Holi, Ramadan, Lent, Diwali, Christmas, and Hanukkah often occur during the academic year, many at the same time. I believe AED can use both food and programming to recognize and celebrate these traditions in a way that fosters learning and connection among members. As future healthcare professionals, even small events like these help us build cultural awareness and interpersonal skills that will allow us to better connect with and understand the diverse patients we will serve in our careers.\n\nThis past year, AED has had companies like Bubblr and LMNT send items for us to share with our members. Having also worked with both of these brands personally, I would love to continue building on that momentum by seeking out additional brand partnerships for AED. I have already begun compiling a spreadsheet of companies I have seen collaborate with other organizations as a starting point for outreach and ideas. In addition, I would like to expand our outreach specifically to healthcare-related brands. As college students, many of us are budgeting carefully, and even small benefits like student discounts or personalized codes from companies such as FIGS could make healthcare-related resources more accessible while also strengthening AED’s professional development aspect.\n\nThrough conversations with this year’s past Event Coordinator, Matthew, I have also gained a better understanding of the effort and planning that goes into Health Professional Mixers. I feel fortunate to have connections with many healthcare professionals in the Columbia area, many of whom are early in their careers but already have valuable insight to share. If selected, I would love to help expand and diversify our network of professionals by inviting more local providers from a variety of healthcare fields. \n\nAdditionally, one of the most successful events this year was the picnic at Sesquicentennial Park. Building on that idea, I would love to introduce a similar outdoor social at the newly renovated Finlay Park. With features like pickleball courts, soccer fields, and skating areas, it provides an engaging environment that encourages members to interact in a more relaxed and active setting. Events like these help strengthen friendships within AED while also creating lasting memories outside of traditional chapter meetings.\n\nOverall, my goal is to help AED continue growing into an inclusive, engaging community where every member feels represented and connected.", "extra": "Having the opportunity to apply for this position means a great deal to me. One thing I would like to share is that I naturally tend to be more introverted, so applying for a leadership role like Event Coordinator has pushed me outside of my comfort zone. However, I see that as a positive challenge rather than a limitation. I also know that my past experiences have prepared me for this role and shown me that I am fully capable of fulfilling its responsibilities. I believe growth comes from taking on opportunities that feel unfamiliar, and I am confident this position would help me continue developing my communication and leadership skills. If selected, I am excited for the chance to contribute to AED while also learning and growing from the experience.", "transport": true}, {"name": "Vianne Phan", "year": "Sophomore", "track": "Pre-Med", "positions": "Marketing Director (1 spot)", "fit": "I am applying for the marketing director position, and I am well-suited for this role because of my communication skills, experience in social media management, and commitment to AED. As an assistant instructor for martial arts at Yim’s Tiger Taekwondo, I have learned to effectively communicate with a wide range of students, ages 3-50+, with varying athletic abilities and some with learning disabilities. My role as an assistant instructor has strengthened my ability to take initiative and productively tailor my communication style to best teach my students, which are skills essential for communicating with the diverse community of AED. Additionally, I serve as a social media manager for my Taekwondo school, designing graphics to convey important information to parents and filming light-hearted content for the students on Instagram, Facebook, and YouTube, with views reaching up to 196,000. My ability to edit hours of film in a few days shows my passion for marketing and promotion, and I look forward to utilizing my experience in athletic outreach to support a professional online presence for AED. Because AED is an accepting environment, I have been an involved member, especially with social and academic events, even helping set up events. I hope to showcase this great community with the AED Instagram account to support and serve the people who create this welcoming environment.", "time": "Although I am handling positions as a martial arts assistant instructor and undergraduate research assistant, I understand that serving as marketing director requires time commitment, and I am prepared to prioritize this position as one of my main responsibilities. Although research takes up some of my afternoons and taekwondo takes up my weekends, I have already started to manage my time to make it to AED events, even if it means giving up some time in other activities. I maintain a consistent and written schedule to balance my commitments, plan deadlines ahead of time, and collaborate with other members on their responsibilities and mine. As an assistant instructor, I am in charge of both my commitment and the students’, exhibiting high organizational skills necessary to keep a functioning team. I am also involved in a neuroscience research lab, which I treat as a part-time job, strengthening my attention to detail and ability to commit long-term to extended projects. Though I am involved in multiple extracurricular activities, I have still been able to meet my requirements as an AED member. As a marketing director, my work would mostly be behind the scenes, fitting into my schedule well while also still having a meaningful impact on AED. My other commitments do not serve as distractions from my involvement with AED but rather taught me time management in preparation for large positions such as marketing director, and I will be sure to be responsible for my role and go above what is required for AED.", "impact": "If selected as marketing director, I plan to follow my requirements as well as take a few initiatives to make AED’s marketing better. For example, I hope to upgrade outreach and member engagement by making more visually appealing posts and reels. Though the posts now are clear and informative, I would use my experience with graphic design to create posts that creatively display our members and promote our events with a greater focus on what our members do outside of AED (such as research and clinical opportunities). To make an incentive for people to reach out and want to be featured on Instagram, I hope to reward the person most highlighted at the end of the semester or year with a gift card. As marketing director, I will allow everyone to share their achievements, keeping it unbiased and fully representative of AED to make a better connected community, giving members the chance to help one another. As for reels, I would like to use this tool to engage with our generation while also communicating the executives’ and cabinet’s messages and event highlights. I also want to be more active on LinkedIn, reposting members' achievements and announcing important events. This would be helpful for events such as the Health Professionals Mixer and chapter meetings, as it would be easier to reach out to healthcare workers so that they may interact with our organization, keeping our professional touch. Additionally, it would strengthen member interaction and alumni networking because of the increased number of college students using LinkedIn. Specifically with posts on both Instagram and LinkedIn, I want to put a greater emphasis on our drives by also including public health campaigns that align with our service. For example, for the professional clothes drive, I would want to use AED’s platform and collaborate with AED’s DEI chair to inform people of the common issue of health professionals or aspiring professionals with low income who cannot afford durable clothing and scrubs, necessary to work. I also want to campaign for women's health, mental health awareness, the history of African Americans in medicine, etc., during the months when they are celebrated, because it is important as health professionals to be aware and sensitive to the issues we have overcome and the barriers that we will still face. I would also like to increase the diversity of our merchandise. For example, I would like to add car decals, bows, rally towels, quarter zips, and bomber jackets. Additionally, after getting into AED last semester, I noticed that one of the shirts had an image of health professionals, all with white features. Although the design was great, I want to take merchandise a step further and fully represent the people of color who both make up AED and healthcare, and highlight different pre-health tracks. If selected as marketing chair, I hope to create merchandise that all members will be proud to wear and faithfully represent AED.", "extra": "With my background as a social media manager, I have strong experience with applications such as Canva, Adobe Illustrator, Clip Studio Paint, Photoshop, and Capcut that have given me insight into simple animation, unique designs, and video editing. I hope to apply the skills I have learned and utilize these apps to make an effective and professional social media platform for AED. By representing a business with my taekwondo school,  I have also gained an understanding of what posts are appropriate based on the content, intended audience, and overall way the represented people should be perceived. If selected as marketing director, I will keep the professionalism of the organization and ensure our online presence represents AED in a polished and positive light.", "transport": true}, {"name": "Khufu Holly", "year": "Junior", "track": "Pre-Med", "positions": "Marketing Director (1 spot)", "fit": "I served as Marketing Director and PR Chair for the National Society of Black Engineers (NSBE) and the Q+ Honors Caucus (QHC) throughout my freshman and sophomore years of college. Through these positions, I became proficient in graphic design through Canva and social media marketing. Through Instagram marketing, I was able to double the QHC Instagram following during my time as PR Chair and helped increase the number of NSBE members by keeping the general body well-informed of events and opportunities happening around campus. Though I did not hold any marketing or PR positions during my junior year, I have continued to cultivate my graphic design skills by designing flyers and graphics for the Caroliniana Undergraduate Research Journal (CURJ). Through CURJ, I have also gained experience developing brand kits and Social Media content calendars, allowing me to develop an effective social media plan for the semester. These experiences allowed me to get recruited to the Membership and Engagement Committee of the Pediatric Infectious Disease Society (PIDS) to help them develop a better social media plan in alignment with their goals as an organization. As one of the only undergraduate students in PIDS, this opportunity has helped me grow professionally by connecting with physicians while also helping me develop unique and creative ways to engage doctors and specialists in between their busy schedules. Similarly, I hope to utilize my skills to build upon the social media presence AED currently has and uplift the members of the organization.", "time": "Throughout college, I have had to learn to manage my time very wisely. As a biomedical engineering major, I have very time-intensive courses that require a lot of work outside the classroom. However, every year, I have managed to excel in my executive board positions spanning four to six organizations per semester. As I approach my senior year, I plan to step back from some of the organizations I love dearly, including the Black Honors Caucus and the Minority Association of Pre-Health Students, to pursue activities I am truly passionate about. Marketing Chair of AED is one of these activities. Since my freshman year, I have been excited by the opportunity to contribute to AED positively through this position. Though I understand that it may be a large time commitment, I am a firm believer that I can make time for the things I am passionate about. I have illustrated this principle throughout college, and I will continue to be committed to it as Marketing Chair of AED.", "impact": "Since my freshman year, AED’s marketing has continued to get better and better as new Marketing Directors mold the organization’s social media into what they want it to be. Through cultivating social media to be an inclusive place for AED members to uplift one another and share each other’s accomplishments, I believe that marketing can help accomplish Aleena’s goals of making AED a more diverse and inclusive organization. In addition to the information included on Instagram currently, such as the weekly updates of events and membership shoutouts, students could also benefit from short infographics of different topics relevant to AED. These topics could span from engaging with diverse patient populations to short recaps of speaker presentations. This would also help promote the new databases of speaker information and encourage more members to engage with our speakers on a regular basis. Additionally, I’d like to bring more personality to AED’s socials by bringing back short-form content from the AED executive board. Getting to hear the executive board’s advice for rush and engaging with current members is incredibly helpful for PNMs and everyone else involved. By including short-form content in the AED content lineup, I hope to reach a wider audience of pre-health students and encourage more students to join the organization. Similarly, I hope to post more frequently on the AED LinkedIn page to engage students on a professional platform. Finally, I have many ideas for cute and professional merch that AED will be able to capitalize on. By making hand-drawn designs for AED, I hope to bring to life new and unique merch ideas that help the organization flourish.", "extra": "As the only black and queer biomedical engineering major in my year in the Honors College, I distinctly understand how it feels to be the only person of my identity in a room. Though AED is an incredible organization, it does distinctly lack diversity at times in its roles and leadership. At times, this can be a self-fulfilling prophecy: Black students who know that I am in AED have expressed to me that they didn’t feel like it was “for them” during the rush process. This inadvertently leads to fewer Black students rushing to AED, creating an even greater deficit. However, by working as a visible member of the executive board, I will have the opportunity to encourage other students to get involved and complete the rush process. I will also have the opportunity to uplift other students of marginalized identities by celebrating them and their incredible work throughout the year as Marketing Director. Through this position, I hope to also positively contribute to creating a more diverse AED, as well as cultivating an inclusive atmosphere for all students.", "transport": true}, {"name": "Rohan Patel", "year": "Sophomore", "track": "Pre-Med", "positions": "Marketing Director (1 spot)", "fit": "With a variety of marketing experiences, I would be the best fit for Marketing Director because I know how to interact with a large-scale audience with both empathy and clarity.\n \nAs a founder and current Vice President of A Moment of Magic (AMOM) at UofSC, I have built a national nonprofit chapter that works to provide joy to medically vulnerable children. In this process, growing our membership and managing a leadership have been tough challenges. They have taught me how to create structure, delegate among others, and to lead with empathy and reason. My partner and I spoke with Shyam on how to better manage my team and lead with both flexibility and seriousness. He provided wonderful insight on marketing approaches like targeting open chapters at other organizations to speak and advertise AMOM at. \n\nBut Marketing and growth is where I believe I bring the most value. I have tons of experience managing social media pages, especially Instagram and TikTok. Previously, I managed my HOSA chapter’s Instagram page with over 700 followers and 250 members in the chapter. Additionally, I run a TikTok account with over 240,000 followers. Through these platforms, I have gained experience in styling content, applying posting strategies (like timing), and how to overall organize a page effectively. Posts should be something people engage with and are informed about, not something they quickly glance and ignore.\n\nIn addition, I am highly experienced with design platforms like Canva and have used it to create flyers, advertisements, and other promos for multiple organizations. I like to make my designs nicely themed, simple, and clear to avoid any miscommunication. I also created t-shirts for my HOSA chapter and wholesaled them to our entire chapter for free using sponsorships. \n\nOverall, I have a ton of relevant leadership experience, as well as practical marketing skills. I understand how to create content that represents AED in a way students will notice. \n\nHere are some attached handouts and flyers I have created for AMOM as an example:\n\nhttps://snipboard.io/3vQwim.jpg - pass out during club fair\n\nhttps://snipboard.io/5tIaTf.jpg - slip under doors (with permission of RA)", "time": "My best friend is literally google calendar. As crazy as this sounds, I update my google calendar at least three times a day to track all of may commitments. It helps me stay organized and allows me to plan ahead weeks at a time. I have it synced to my phone with reminders two hours before a commitment/event and again thirty minutes before, which helps me stay alert and avoid missing anything. I also have my calendar color-coded depending on extracurriculars, school assignments, and any personal/miscellaneous commitments. \n\nMy schedule next semester is very manageable and I will have a solid amount of free time. I prefer staying busy and I find it very rewarding to work on something consistently and see it come together over time. It is motivating and helps drive me forward—I  care a LOT about staying productive.  \n\nI also take attendance seriously and make it a priority to be present. Showing up means a lot to me, so I do not miss commitments unless it is something unavoidable, like illness or a family matter. I do not take on more responsibilities than I can manage, so it feels like the Marketing Director position is a perfect amount of time commitment for my schedule.\n\nOutside of AED, my only major time commitment is A Moment of Magic, where I serve as the Founder/VP. Though, there is another Founder/President who I work with to split our workload, along with 13 other people on leadership. It is very manageable and will not interfere with my ability to fully contribute to AED. Overall, I have time, structure, and a proper mindset to stay organized, present, and fully take on the role as Marketing Director.", "impact": "Marketing is one of the most important tasks of an organization. It requires a focus on making information clear and consistent across all platforms of AED, while maintaining engagement and consistency with merchandise. I believe I can uphold all of those standards while bringing new ideas to the table to that can revolutionize how we deal with merchandise and points.\n\nFirst goal: Improve merchandise to increase representation and sales.\nI plan to redesign AED merchandise to make it more appealing and wearable on a daily basis. This includes adding items like quarterzips, tote bags, hoodies, and incorporating a cleaner, simple design to our apparel. I want to create merch that AED members would choose to wear on campus and during the 400+ events we hold. Additionally, I intend to explore providing free (or paid) rush t-shirts for accepted members to immediately build identity and visibility of our organization. It may require a small dues increase for free (around $8-10), but it would translate into stronger branding and provide higher engagement/incentive to rush AED. \n\nSecond goal: Create an open, year-round merchandise system.\nWith the increase of items, it would be harder to purchase items in bulk. That leads me onto my next idea of moving away from limited merch drops with a crammed timeline. Instead, I can work with Ali, our new historian who has experience in website development, to create a online website/store that stays open throughout the year. Members would be able to purchase items at any time, with designated chapter dates they can pick it up (2-4 times a semester). Payment and order tracking would be fully automated, with a live spreadsheet system linked to the site to keep everything organized and reduce manual labor.\n\nThird goal: Introduce a “battlepass” rewards system with the Historian.\nTo increase participation in our events, I want to almost “gamify” involvement. AED members who go beyond required points can earn rewards at different tiers:\n\n-\t+3 points: small item (ex. pen) \n-\t+5 points: rubber bracelet with AED motto “Truth I pursue” \n-\t+10 points: lanyard \n-\t+15 points: t-shirt \n-\t+20-25 points: store coupon\n\nThis tier system can help with engagement and incentivize participation. They can also be available for purchase in the online store.\n\nOverall, my focus is straightforward. I want to automate our merchandise system and increase engagement with our social media platforms by building stronger representation of AED, higher standards of posts, and offering more incentives. Below, I have linked a few designs with pricing for 200 medium items each for some merchandise including a bracelet, quarterzip, tote bag, and a rush t-shirt (tax and shipping included in everything).\n\nBracelet - $0.69 a piece, $138 total. https://snipboard.io/AQaSxg.jpg\n\nQuarterzip - $18.50 a piece, $3,702 total (even if individual order = $20, so not huge difference in wholesale) https://snipboard.io/b7A0wI.jpg\n\nTote bag - $17.12 a piece, 50 units at a time – through Canva. Very , very rough design. Had to use AI to recorrect the image because it was messy and not of great quality. https://snipboard.io/QAgJVL.jpg\n\nRush t-shirt - $14.10 a piece, $2,820 total \n\n- Front: https://snipboard.io/WGeZAR.jpg\n- Back Option #1: https://snipboard.io/qbVSw6.jpg\n- Back Option #2: https://snipboard.io/FX2xI9.jpg", "extra": "A little bit more information about who I am if you don’t know me personally!\n-\tI am from Concord, North Carolina and recently changed my major to Exercise Science.\n-\tI have a golden retriever puppy back home\n-\tI have a younger sister who is in 8th grade\n-\tIn my free time, I like to play video games, workout, cook, and research cars. \n-\tI plan on buying a new car later this year! (I love cars)\n-\tI have the worst seasonal pollen allergies out of everyone you will ever meet…\n\nI am really looking forward to hearing back and cannot wait to be part of an organization so amazing! I want to create new relationships from the leadership and continue to find my sense of belonging here at USC through AED.", "transport": true}, {"name": "Shayan Hussain", "year": "Sophmore", "track": "Pre-Med", "positions": "Marketing Director (1 spot)", "fit": "Throughout my two semesters as a member in AED, I have not only met my point requirements, but attended far more events than necessary. I look forward to refreshing Luma and planning out my next two weeks, and letting my friends know what events I would love for them to come to. Additionally, I enjoy attending chapter and listening to the speakers, as well as spending time with fellow AED members afterwards. I love participating wherever I can in AED, and I believe that as Marketing Director, I would be able to share this love with everyone, members and non-members alike. I managed the social media of my High-School's multicultural club, which contributed to 150+ attendees and $700+ raised at our annual International Festival. Additionally, I managed the social media of my High-School's Muslim Students Association, bringing awareness to monthly meetings through reminders and recaps, as well as developing a sense of community and identity through celebratory story posts and event highlights. Throughout my time in these roles, as well as my role of secretary in our High-School's HOSA chapter, I developed skills in media creation and member engagement, which are crucial to the Marketing Director role. Currently, I am serving as a Tabling Manager for UofSC's Muslim Students Association, which has taught me more about bringing awareness to an organization through communication and engagement. As a person, I am organized and dedicated. I am able to communicate with others effectively, as well as take and learn from feedback and criticism. I've spent a lot of my life online, and understand how people perceive and interact with social media. I want nothing more than for more people to appreciate all that goes on in AED, and there is no better role for me to start work on this goal than as Marketing Director.", "time": "Next semester, I will continue serving as a Tabling Manager for UofSC's Muslim Students Association, which is currently not a large time commitment. I have started preparations to join a research lab at UofSCSOM, as well as applied for a Medical Assistant position downtown. I believe that these will in no way negatively affect my availability to be present and serve AED as Marketing Director. Regarding commitments, I have always been attentive to dates and responsibilities, managing my time well and effectively. My largest commitment throughout my freshman year has been AED itself, and I am confident that I would be able to carry this prioritization into my sophomore year. I keep a detailed calendar as well as a robust task list that ensures I am on top of everything I am responsible for, which would be critical to ensure that I fulfill the responsibilities of Marketing Director effectively.", "impact": "The AED Instagram is an amazing tool for members and non-members to know what is going on in AED, as well as what to look forward to in the future. Instagram is centered around sharing activity and developing a strong community around what you share. For reminders and information, we have the GroupMe, so I feel that the Instagram should be focused on sharing everything AED has to offer, from now and the past. As Marketing Director, I plan to elevate the strong community that makes up AED by building upon the already great Instagram and merchandise. \n\nTo start, I believe that what makes the sense of community in AED so strong is the consistency. Emails are sent weekly, chapter is held bi-weekly, and members know what to expect every time. One area I feel this concept could be applied effectively would be the AED Instagram. The current Instagram is made up of many useful and encouraging posts, ranging from weekly event schedules and week-in-review posts, to member/committee highlights and awareness posts such as the recent Black History Month post. However, these posts don't seem to follow a consistent schedule or priority. As Marketing Director, I would initiate posts that follow a schedule/quota, so that the Instagram meets the same level of consistency as the various other forms of communication that AED utilizes. These would include weekly event schedules, week-in-review posts, member highlights, etc. I would also like to collaborate with the future DEI chair in order to bring more awareness to AED, through posts that focus on highlighting DEI within AED. One major addition to the Instagram within the post categories would be point specific recap posts. I would initiate weekly posts showcasing the accomplishments and events put on in PA-CT, MedConnect, service, social, and academic events, as well as continue chapter recaps. Having specific recap posts would allow members who might usually not attend many of a specific point type event view and experience what AED is contributing in all aspects. This is especially true for programs AED works with, such as the MedConnect program. Many people, especially underclassmen, are unaware of what is accomplished through these programs. By displaying these on the Instagram, members would not only be aware of what AED is doing, but also be incentivized to participate in more of what AED has to offer. The respective chairs and committees work hard to put on these events, and everything should be showcased on the Instagram, so that members are more likely to participate. I plan to have these posts follow a centralized theme, in accordance with the website, chapter slideshows, and weekly announcements, in order to contribute to the strong sense of community that AED holds. \n\nAnother key aspect of an Instagram profile is the highlights present on the profile. Currently, the AED Instagram's highlights are extremely outdated. As Marketing Director, I plan to work to update the highlights. This way, members will be able to look through past AED events and memories, and strengthen their sense of community, by having a method to access what members across AED are doing. By updating members on what is happening in AED through the previously mentioned specific weekly recap posts and sharing them to the story, members can have a digital archive of everything AED has accomplished. Because non-members are able to view the Instagram as well, information tied to AED and access links would remain in the GroupMe, but the highlights would focus more on AED's accomplishments and spread awareness on everything the organization entails. \n\nTo build onto this, I would create a new highlight focused on Takeover Tuesdays. The highlight would include one story from every past and future person who has taken over the Instagram, in order to provide members with a simple way of finding contact information and reaching out. There have been so many instances where someone on a Takeover Tuesday has provided great information that I would love to speak to them about, but never get the chance to. A highlight would provide an easy method for anyone to reach out, and I plan to require whoever takes part in Takeover Tuesday to include a link to a Takeover Tuesday document that I would manage. The document would keep track of people who do the takeover, as well as opportunities or contact information they list during their time on the Instagram. This way, members have access to key information from other members, such as research, shadowing, volunteering, and work opportunities.\n\nWhile the Instagram is a large responsibility for the Marketing Director, the merchandise is another key aspect of the role. Looking at AED's merchandise, and speaking with fellow members, everyone can only think one thing, \"we want more.\" I plan to learn about and understand AED's logistics and resource management in order to expand the merchandise offered to members. I have heard many people speak about designs, colors, or items they would like to see, and as Marketing Director, I would love to take this feedback into consideration and expand the incredible merchandise that is currently offered. \n\nMerchandise is so successful because it is a physical representation of a commitment that members make. AED is a large part of people's lives, and people love to have a physical representation of that commitment. Walking around campus, I feel that outside of events and chapter, AED does not have a strong physical representation on campus. One way I would like to develop this presence is through more tabling events. Last week, AED provided a service opportunity through a spring refresher tabling for Relay for Life. I would like to partner with other board members within and outside of AED to bring more AED tables to Davis Field / Greene Street. This would not only provide more opportunities for AED members to participate and contribute while spending time in the community, it would also provide a strong physical presence for AED on campus, which would further develop AED's strong sense of community. \n\nWhile these ideas might not all be realistic or achievable, I believe that my understanding of social media, AED, and my determination towards the role will result in big steps towards expanding AED's presence and member engagement.", "extra": "", "transport": true}, {"name": "Kayla Ross", "year": "Senior", "track": "Pre-Med", "positions": "New Member Director (2 spots), Marketing Director (1 spot), Wellness Chair (1 spot)", "fit": "Marketing Chair \nI think I would be a great fit for the Marketing Chair position because I am really passionate about spreading awareness about AED and everything it has to offer. AED has been such an important part of my college experience, not only because of the opportunities it has given me in healthcare and service, but also because of the friendships I have made through it. Because of that, I want to help more people get involved and see how impactful this organization really is. I have been an involved member of AED, especially when it comes to social events, and I try to show up and participate as much as I can. Being so involved has helped me understand what people enjoy and what gets them interested, and I would love to work with different chairs to help coordinate and make sure events are being advertised in a way that actually reaches people. I also love anything creative. I really enjoy photography and have my own camera that I would use to capture events and highlight members throughout the year. I also like using Canva to make posts, and I have experience helping run Instagram pages for my high school sports teams, so I understand what kind of content people actually engage with. I would definitely keep the Instagram active and organized, but I would also love to build on it and maybe even introduce TikTok to reach a bigger audience. I feel like a lot of people still do not realize how big AED is or how much it offers, and I would love to help change that.\nWellness Chair\nI think I would be a great fit for this position because I really care about mental health and creating a supportive environment, especially for students in high-pressure paths like pre-med. I was part of the mental health club in high school, and since coming to USC I have been wanting to find a way to get involved again, especially in a way that supports students who are dealing with a lot of pressure but don’t always show it. I have also gone through my own mental health challenges, especially in high school, and that has shaped the way I see things now. It made me realize how important it is to have a support system and people around you who understand what you are going through. That is something AED has given me, and I would love to be able to give that back and be that kind of resource for other members. I would really love to work with a committee that is just as passionate about this and plan events that give people a chance to step away from the stress and pressure for a little. Even just having a space where people can relax, connect, and feel supported can make such a difference. I also want to make sure people know they are not alone, especially in an environment where it can feel like everyone has everything together. Something I always remind myself is that you cannot do your best if you are not taking care of yourself, and I think that is especially important in a field like healthcare. I would love to bring that mindset into this role and help create a stronger, more supportive community within AED while also continuing to open up the conversation around mental health.\nNMD\nI think I would be a great fit for the New Member Director position because I have really enjoyed my time in AED, and I care a lot about making sure new members feel welcomed and supported from the very beginning. AED has already given me a really strong community, and I would love to help create that same experience for incoming members. I see myself as someone who could be a first point of contact for new members and a resource for them not only within AED but for anything else they might need as they are adjusting. I would also love to work alongside another NMD to help guide new members through the rush process and make sure they feel included and not overwhelmed. I am also really grateful for the big/little process because it has been such an important part of my own experience. I met two of my closest friends through my big and little, and it really made me feel more at home in AED. Because of that, I would love to be part of the matching process and help make sure it feels thoughtful and intentional, since I know how much it can shape someone’s experience. I also really enjoy organizing events and would love planning new member events like meet and greets and simple bonding activities that help people feel comfortable with each other early on. Overall, I really care about building a strong, connected new member class so people feel like they have a support system as they go through the pre-health path they chose.", "time": "I will manage my time well because I have done it successfully in the past. Last year, I balanced very difficult pre-req classes while also being heavily involved in AED, Women in Healthcare, working as an undergraduate research assistant in an exercise oncology lab, and working as a pediatric patient care technician at Prisma Children’s Hospital about 24 hours a week. It was not easy, but I learned how to prioritize what needed my attention most and make sure I followed through on every commitment I made. A big part of how I stay organized is using my Google Calendar, which helps me plan my week and allocate time for each responsibility so nothing gets overlooked. I know next semester will also be busy, especially as most AED members are involved in multiple things, but I am very intentional about how I manage my schedule. Most importantly, I always follow through on what I commit to, and AED will be at the top of my priorities. It has been one of the most impactful organizations I have joined, and I am very passionate about giving back to it in any way I can while making sure I am fully present and reliable in the role.", "impact": "AED has been one of the most impactful organizations in my college experience, and I really want to give back in a way that helps it grow and feel even more connected for members. Depending on the role I am in, I have a few specific ideas I would love to bring to the organization. If I am in Marketing, I would love to introduce AED to TikTok as a new platform. I think it is one of the main ways people engage with content daily, and it often grabs attention in a way that Instagram posts sometimes do not. I would also make it a priority to take photos at every event and keep the photo circle updated so members can always have memories to look back on. Another idea I have is starting a Q and A day on Instagram where different members or committees can take over the story to answer questions, share what they do, and also highlight upcoming events so members feel more informed and connected. If I were in Wellness, I would want to introduce a consistent monthly wellness event. For example, something like weekly sunset yoga on the Horseshoe for a month could be a simple but meaningful way for members to decompress, move their bodies, and spend time together. If something like that is well received, it could become a recurring tradition. I would also like to create an anonymous forum or email where members can reach out if they are struggling, whether they need resources or just someone to listen. Sometimes having a space to simply talk things out can make a big difference. If I were New Member Director, I would focus on really getting to know new members on a personal level and helping them feel comfortable early on. I would love the idea of smaller bonding opportunities or “hangouts” with new members so they can feel more connected to both the organization and each other. I would also want to implement weekly new member activities that encourage teamwork and interaction, so people naturally build friendships and feel like they are part of a close community right away. Overall, I want to impact AED by helping strengthen connection, communication, and support across the organization. AED has given me so much, and I would love to give back by making it even more engaging, welcoming, and meaningful for everyone involved.", "extra": "Honestly, I just want to say how much AED has meant to me. It has been one of the most meaningful parts of my college experience and has given me a sense of community that I really value. A lot of the friendships and experiences I have had through AED are things I am genuinely really grateful for, and that is a big reason why I want to be more involved in leadership. I am also someone who really cares about the people around me. Whether it is making sure people feel included at events, checking in on friends, or just trying to make spaces feel more comfortable, I naturally gravitate toward that role. I think that is something I would bring into any position I am in within AED. At the end of the day, I just want to contribute in a way that feels meaningful and helpful. I really want to help improve the experience for both current and new members and give back to an organization that has already given me so much.", "transport": true}, {"name": "Boris Kolesnikov", "year": "Junior (graduating May 2027)", "track": "Pre-Med", "positions": "MedConnect Director (1 spot) -- Pre-Med applicants only", "fit": "I believe I am a natural fit for MedConnect Director because of my proven track record of organizing events for AED and my existing integration into USCSOM. As a member of the Academics Committee, I have been heavily involved in putting together events like the Interventional Cardiology Case Study Night, Time Management and Study Methods Workshop, Healthcare Taboo, and many others. That experience taught me the logistics required to run clinical workshops that are both useful and actually keep members engaged.\n\nAs a BARSC-MD student, my connection to the medical school goes even deeper. I am going to be on this campus for the next five years, which means I am deeply invested in building a long-term, sustainable pipeline between AED and the medical school. I already have working relationships with their administration. Recently, I collaborated with the Associate Dean of Admissions to design and host the Medical Admissions Mystery Case. I handled the logistics between the Dean's office and AED, and helped translate the complex admissions criteria into an engaging and accessible format for attendees. Since MedConnect involves working closely with the MedConnect President at USCSOM to oversee clinical skill workshops, AMCAS prep, and mock interviews, I am ready to leverage my AED event-planning experience and my existing faculty connections to deliver valuable, engaging events from the start.", "time": "My current schedule is actually built perfectly for a role that requires substantial planning and coordination. I am currently planning my senior honors thesis in the College of Pharmacy, which analyzes patient adherence to GLP-1 agonists, and because this research is virtual and asynchronous, I am not chained to rigid, in-person hours. This means I actually have the availability to schedule daytime meetings, take planning calls, or handle any last-minute troubleshooting during normal business hours, when USCSOM staff are actually in their offices. I am a big believer in strict time-blocking, meaning AED responsibilities get treated as fixed, high-priority blocks in my day rather than tasks I just try to squeeze in late at night.", "impact": "Because medical students have incredibly limited schedules, I want to move away from hosting numerous low-attendance events and instead focus on a few high-yield, tactical experiences. To do this, I have three ideas that I would love to implement.\n\nAn improved matching system: Building on the success of this semester's casual social at Savage Craft, I want to keep the initial pairing events relaxed but highly intentional. I will use a targeted intake form to pair students by highly specific paths like non-traditional timelines, heavy research focus, or specific majors. But more importantly, rather than just setting up the matches and doing little to nurture the relationships, I will implement checks throughout the semester to ensure these relationships stay active and provide actionable advice throughout the year.\n\nExpanded events utilizing the USCSOM resources: The cadaver lab tour we had this semester was great because it gave members a tangible look at the actual curriculum. I want to build heavily on that. Rather than repeating the same standard campus or ultrasound tours that suffer from low attendance, I plan to introduce new, hands-on twists. I plan to fully utilize USCSOM’s resources and hear from the MD students themselves. I will coordinate with USCSOM to have MD students run live demonstrations where our members can actually see how probes are used and get hands-on time in the simulation labs. Having observed advanced clinical procedures like robotic surgeries myself, I know how critical that early hands-on exposure is. I also want to move away from general Q&A panels. I will use the MD mentor network to host more specific and targeted sessions, like an M1 breaking down the reality of surviving the gross anatomy lab, or an M3 explaining the day-to-day of clinical rotations.\n\nA live AMCAS review board: To elevate our AMCAS workshops, I want to build directly on the success of the Medical Admissions Mystery Case I recently hosted with Dr. Rhinehart, the Dean of Admissions at the USCSOM. I will use that existing relationship along with others to coordinate a session where USCSOM admissions reps and current MD students conduct live, blind reviews of anonymized personal statements. It gives everyone an unfiltered look at what actually gets an applicant accepted and would prove incredibly useful to members.", "extra": "Beyond my experience hosting events and working with the USCSOM, I have real logistical experience managing large-scale mentorship programs. Before coming to USC, I worked as a Summer Teen Lead volunteer at UVA Health, where I accumulated over 680 hours in the Emergency Department and managed over 90 high school volunteers. I was responsible for conducting performance evaluations on the volunteers and discussing their behavior and engagement in daily meetings with the volunteer coordinator. That experience translates directly to MedConnect, as I know how to spot when someone is checking out, track actual engagement, and intervene to prevent members’ excitement from fading. To that end, I plan to continue and refine the point requirements implemented this year to ensure the program remains mutually beneficial and respects everyone’s time.\n\nAdditionally, I already know what a successful peer-to-peer mentorship looks like. Within the BARSC-MD program, undergraduates are paired with current USCSOM medical students who previously went through the program. Experiencing that relationship firsthand has shown me what valuable mentorship actually requires. I know that a successful relationship requires the mentee to drive the momentum. However, I also know undergraduates don’t necessarily know how medical professionals want to be approached. To fix this, I plan to collaborate directly with my own BARSC-MD mentors and our USCSOM network to compile a \"Mentee Toolkit,\" a simple guide from current MD students on how they prefer undergrads to request shadowing hours, prep for coffee chats, or send professional follow-ups. Because I will be at the USCSOM for the next five years, I am highly invested in making sure these initiatives become a permanent, functioning part of AED.", "transport": true}, {"name": "Alina Tofiqul", "year": "Senior", "track": "Pre-Med", "positions": "MedConnect Director (1 spot) -- Pre-Med applicants only", "fit": "As a third year AED member, one of the most valuable things I’ve learned has been the impact of experience. The culmination of leadership and educational experiences I have had in AED have constantly reaffirmed my strong belief in positively impacting those around me through making those same opportunities equally as accessible. I believe I would be a strong candidate for the MedConnect Director position as I channel my commitment to guide others combined with my previous leadership experiences as both wellness chair and vice president of operations into supporting our pre-med community. As wellness chair, I had the opportunity to strengthen my program planning skills through initiating close to 40 events throughout the year with the help of my committee. I intentionally worked to create a more structured approach to wellness through implementing social, academic/educational and professional events with the specific goal of improving accessibility to mental health and wellness resources. Working closely with the center for student health and well-being, where I currently serve as a Mental Health ambassador, allowed me to host multiple cooking classes for nutritional education and stress/burnout reduction workshops for personal development. Additionally, I utilized the workout classes offered at strom and crossfit to promote physical wellness on and off campus. Serving as wellness chair allowed me to develop a deeper understanding of the inner workings of event planning and hosting while working to accommodate the busy schedules of AED members, both important skills that are essential for organizing large-scale events and maintaining meaningful connections between MD students and AED members. In the past year, my time serving as one of the vice presidents of operation has given me an even greater opportunity to serve our community of students through ensuring efficiency of ongoing logistic processes while working with our leadership team on a personal level. As VPO, one of my main goals for AED was to create a closer community of students who feel supported and comfortable with leadership. In doing so, I oversaw both cabinet and their respective committee members’ dedicated work to upholding my personal sentiment come to life. By maintaining open lines of communication and being readily available as a resource, I was able to help streamline processes and ensure that each member felt supported in their role. Creating an encouraging and collaborative environment within the cabinet through the use of both my communication and organizational skills led to the formation of stronger working relationships and a more cohesive team overall. I aspire to bring these valuable skills to the medconnect director position, to not only develop genuine relationships between the medical students and our members, but to also create a more unified pre-medical student community within AED that uplifts each other. Lastly, my occupation as a Mental Health ambassador for the past two years has granted me insight on ways to connect with students of all groups with varying backgrounds. As an ambassador, I’ve had the opportunity to advocate for student well-being across differing student groups, promote and host campus-wide tabling and social events, and work with the substance abuse prevention and education department to promote healthy behaviors in college students. This role has strengthened my ability to communicate effectively with different audiences, plan engaging initiatives, and create spaces where students feel supported and heard. At the same time, this position has shown me the clear need for new, innovative student initiatives that reflect the realities of pursuing a career in healthcare, rather than relying on recycled or surface-level programming. Many students are looking for more transparent conversations about burnout, application challenges, and the day-to-day experiences of being in medicine. Recognizing this gap has motivated me to reshape how medconnect approaches events to create more opportunities that are both relevant and impactful. It has inspired me to prioritize initiatives that are more  interactive and tailored to the evolving needs of pre-health students. By combining my experience in leadership and event planning, I am confident in my ability to contribute meaningfully to this position and help cultivate a MedConnect community that prioritizes connection, growth, and accessibility for all members.", "time": "While I am involved in research as a lead undergraduate research assistant and on the executive board for the Network of Opportunities Towards Elderly Service, my dedication and commitment to providing quality leadership to AED remains unwavered. Over the past two years serving apart of both cabinet and the executive team for AED, I have had the opportunity to strengthen my time commitment skills and organizational to accomplish the necessary tasks at hand. I have utilized calendar scheduling to ensure my availability remains consistent with the time commitments at hand, and this has allowed me to maintain the tasks I prioritize in both my academic and personal life. Wether that be balancing studying for anatomy exam, attending an AED event, or completing a meeting online, I have remained dedicated to ensuring that I am able to reach these important deadlines. As a senior, I look forward to dedicating the necessary time and effort needed to create a valuable experience for all medconnect members.", "impact": "The MedConnect Director position is a highly valuable position that can offer AED members wide-ranging insight on their futures through giving them the opportunity to interact directly with MD students, and I intend to expand on that range of these opportunities if selected, with my main goal revolving around increasing member engagement through creating a closer pre-med student community. Much of the existing feedback for the MedCconnect program has shown that many ideas on both the behalf of the medconnect program at the school of medicine as well as in AED have been recycled, therefore leading to a decrease in engagement and interest on both ends. As a current member of the MedConnect program, I believe that overall AED member engagement can be strengthened through developing a more continuous mentor/mentee program with a more interactive-styled approach to events. I would create two events for mentor/mentee mixers per semester, each with a different engaging activity. The first would be a case study night with the medical students, set up similarly to the current case study nights in AED. Mentors and mentees would have the chance to complete a challenging but humorous case study alongside other mentor mentee duos in a competitive setting, potentially to win a prize. This will create positive relationships among the AED  cohort as well as among the medical students, with hopes of increasing their personal engagement with their program. The second event would be focused on a social outing or a non-academic event. Mentor mentee social events could include Soda City over the weekend, football watch parties, or a wellness walk at the riverwalk. By promoting the development of a tighter knit community, mentors and mentees will have the chance to interact in a non-academic environment that is more relaxed and welcoming. Additionally, I plan on solidifying the current flexibility of the point system that was previously implemented in the second semester. I would allow program members to receive either of the two required points from attending a program event or meeting with their mentor to substitute for the second point. Based on member feedback, this requirement allowed for ample engagement with the program without allocating too much stress. To build on the theme of increased engagement, I plan on working with the various student interest groups at the SOM to help introduce med-connect members to specific programs that exist within the SOM and the stories of the students who chose to participate in them and why. This would be in the form of a zoom call or interactive panel event based on the availability of the interested student groups. For eligibility, it would also be an open event to all members of AED who are interested. Engaging students with the ongoing efforts done at the SOM to gauge interests in future specialties would be beneficial for students deciding on their current pre-health track, as well as students committed to pursuing medicine but are looking to explore their future options in different specialities including OBGYN, Family Medicine, and Anthesiology. To improve the structure of current existing events, I would also redesign the clinical skills workshop to include various skills at different stations around the room. These numbered stations would include differing stations with short but informative stops, including pulse monitoring and patient history reports. This allows members to rotate through different topics in small groups, ensuring hands-on experience and personalized feedback. With the current success of the event, I hope to implement at least one skills workshop per semester to increase member engagement as well as accounting for potential scheduling conflicts for members interested in attending. Lastly, for member preparation and increased interactions, I plan on expanding on the invaluable resource of mock interviews to include mock mini multiple interviews such as those done for medical schools across the country. These MMI’s would be done over zoom with the help of around 5-6 medical students who have gone through similar experiences with this format to help guide students on the structure of online interviewing. It would include varying ethical scenarios, experiential questions and communication tasks similar to those done in a real interview. Medical students will be able to provide immediate feedback to students who are actively preparing for application within that cycle, creating an interactive space for students to improve their interview skills. Ultimately, my goal is to lead with understanding and flexibility on both the behalf of the medical students and our members. I hope by offering a wider variation of high-impact events, I will make a meaningful difference by ensuring every AED member feels clinically prepared and supported.", "extra": "", "transport": true}, {"name": "Arnav Jani", "year": "Sophomore", "track": "Pre-Med", "positions": "Event Coordinator (2 spots), MedConnect Director (1 spot) -- Pre-Med applicants only, Diversity, Equity & Inclusion Chair (1 spot)", "fit": "believe I would be a strong fit for the MedConnect Director position because of my commitment to the pre-med path, my ability to connect with others, and my experience in both leadership and service-oriented roles.\n\nAs a liaison for the UCB-Zahant Bollywood dance-fusion team, I was responsible for communicating between executive members of the Indian Cultural Organization and members of Zahant. This role helped me strengthen my communication skills and taught me how important clear and consistent communication is when coordinating between different groups. I believe this is especially important for MedConnect, since building relationships and organizing opportunities depends on strong communication.\n\nIn addition, I am currently interning at a clinic where I work and shadow under a physician who has provided me with meaningful mentorship. Through this experience, I have seen firsthand how valuable mentorship can be for someone on the pre-med track. Many students feel unsure or overwhelmed during this process, and having guidance can make a huge difference. As MedConnect Director, I would want to help create opportunities, such as a “big-little” mentorship system, that connect undergraduate students with medical students or professionals who can offer support and insight.\n\nOverall, my experiences have shown me the impact that strong communication and mentorship can have, and I would be excited to bring that into this role. I want to help create opportunities that give other pre-med students the same sense of clarity and direction that I have gained through my own experiences.", "time": "For on-campus organizations, I am a part of the Indian Cultural Organization, the National Marrow Donor Program, A Moment of Magic, intramural/club ultimate frisbee, and served as liaison for the Aaj Ki Raat, a dance competition run by ICO here at UofSC. These commits consist of organizations related to volunteering, athletics, and getting closer to my culture. Among these organizations I am the operations manager and fundraiser director of A Moment of Magic. Off-campus and during my free time I intern and shadow at WeCare Urgent and primary care in Columbia.\n\nAs operations manager and fundraiser director of A Moment of Magic I facilitate meetings by creating games for members at the meetings and also helping other cabinet/executive members when needed. Furthermore, I plan on campus fundraising events such as tabling events on davis-field. \n\nAs an intern and someone who shadows at WeCare Urgent and primary care, I manage the reception desk which includes taking phone calls and managing patients' insurances. Alongside this, I take patients vitals, conduct x-rays, examine how the physician interacts and diagnose patients. \n\nDespite my involvement with other organizations on and off campus, I am someone who effectively manages their time. I am someone who does not let other commitments or tasks interfere with one another and allocate enough time to each of my responsibilities to make sure the task at hand is not only completed but also executed well. When I say I am going to do something, I am going to do it and I am going to do it well. I am someone who does not shy away from adversity or pressure. The responsibility of being able to serve on AED’s cabinet will not be any different, every task, assignment, or responsibility given to me will be completed at a high level.\n\nIf selected to serve on cabinet for AED, I will start by creating a schedule for all my tasks to ensure that none of my duties fall through the cracks because, even though AED is a priority to me, I want to make it clear to other executive members and cabinet members how serious I take my role.", "impact": "If selected as MedConnect Director, I would focus on expanding mentorship opportunities and making the pre-med path feel more structured and accessible for members. I would like to strengthen the mentor-mentee relationship between undergraduate pre-med students and current medical students. Having this in place would allow undergraduate students to receive firsthand guidance that can point them in the right direction.\n\nTo build on this, I would focus on creating more intentional matches by pairing undergraduate students with medical students who are interested in or currently pursuing specific specialties. This would give students more personalized insight into different fields of medicine and help them make more informed decisions about their own paths.\n\nIn addition, I would like to organize more targeted events such as AMCAS workshops, personal statement review sessions, and Q&A panels with medical students and physicians. I also want to improve communication about opportunities by sharing information about shadowing, volunteering, and research in a more consistent and organized way so members can easily access these resources.\n\nI would also incorporate more social events to create a more casual and welcoming environment. This would help members build connections with each other, making the organization feel more supportive and less intimidating.\nOverall, my goal is to create a more supportive and informative environment where pre-med students feel confident in their path and have access to the guidance they need to succeed.", "extra": "Ever since I joined AED in the spring of my freshman year, I have felt like I have been a part of a community that has given so much to me. I have felt like I am not alone during this long and never-ending journey of being on a pre-health professional track. Whether that be through conversations with other members and receiving advice or attending events that open my mind to various opportunities that are out there, I no longer feel alone.\n\nI want to be able to give back to this community now. I believe that no one deserves to feel alone because at the end of the day everyone should be supporting and lifting each other up. I want to be able to continue to build that environment within AED, even if I am not selected as a cabinet member.\n\nI would also say that I am an extremely out-going individual. I love being able to meet and have conversations with new people. Getting the opportunity to do that during the rush was one of my favorite aspects about the whole process. Being able to connect with someone beyond surface level is very gratifying for me because I believe that you can always learn something new from anyone you meet.\n\nFinally, I am someone who never gives up and this drives my work ethic. I strive to be perfect and will never do the bare minimum. Although I want to be perfect, I also realize that I make mistakes as well. But, whenever I face a failure or criticism, I don't just take it in a negative manner, I look at it as a chance to grow as a person. I live by the motto “the comeback is always bigger than the setback.”", "transport": true}, {"name": "Zahi Siddique", "year": "Sophomore", "track": "Pre-Med", "positions": "Service Chair (2 spots)", "fit": "I am applying for Service Chair because it is an area I am extremely passionate about, through my own observations and experiences. One of the events in my weekly routine that I have most consistently done is feeding the homeless every Saturday morning. With a group of other undergrad and grad students, we buy, pack, and distribute breakfast to the homeless around downtown, and this has been one of the most rewarding parts of my week since I first started in 9th grade. I believe service is one of our duties as community members, especially when we realize the privileges we have compared to others. As a junior and senior in high school, I served as the co-director for our “Winter Days Assembly,” a massive project that involved multiple committees with various community service responsibilities, like clothing and toiletry drives, collecting books/workbooks for underprivileged kids, and canned donations. My main role was to ensure each committee accomplished their given goals and to record progress, which involved communication and coordination with all the leaders. It was amazing to see the impact we had on the entire community, from children to the elderly. In AED, I have been involved in these events as well, and have found them to be some of the most meaningful opportunities to connect with both the community and other members. While I was not able to attend as many events this semester as I had hoped due to scheduling and personal reasons, I am committed to being significantly more involved moving forward. I believe I am well suited for this position because service has been a major part of my life, and is something I truly find happiness in. I also believe my previous experience helping direct community-wide service committees in high school will translate well in terms of communication with the historian and treasurer. I am confident that my ability to organize and lead service events will have a positive impact on AED members and the surrounding community.", "time": "I am currently involved in a research lab, intramural sports, and tabling for another organization (only once every few weeks), so I will be intentional about my schedule and prioritize my responsibilities. If selected for this role, AED would be my top commitment, and I would plan my extracurricular schedule around my responsibilities. This semester, my research hours were scheduled in the late afternoons, which conflicted with my ability to attend many AED events. However, with my class schedule next semester, I will be able to change my hours and consistently organize and attend AED events. I understand the time commitment that this position requires, which is why I am prepared to adjust and limit other activities in order to make sure I am available. I believe that if I am part of an organization, especially in a leadership position, one of my primary duties is to be present and demonstrate reliability. Because of this and my desire to be more involved with AED and service, I am fully committed to being present and proactive in fulfilling this role.", "impact": "I will positively impact AED by continuing the strong foundation of service already present while bringing new ideas and increasing involvement of members. Specifically, I have ideas that will increase the variety of events and give members more opportunities to earn points. Events could mostly be categorized into 3 main groups: homeless, underprivileged children, and the elderly. In my experience talking with homeless people almost every weekend, they are most content when either given clothing or food/drinks. Our current event at Transitions involves helping with job applications, but we could expand into food/drink packing and distributing as well. Before winter, we could also host a clothing drive; members can earn points for bringing certain amounts of winter clothes, and can help pass them out around the area. We could also get involved with the children’s hospital. While direct hospital volunteering might need individual certification, we could organize hospital-approved initiatives like making activity kits, card-making, and toy/book drives that give member multiple ways to get involved. Another aspect I may add would be more cross-organization service events. At my high school, I was involved in Harvest Pack, a massive 2 hour event where over 100 volunteers helped make 50,000 oatmeal packs for the local community. The local organizer mentioned to me that he’d like to bring it to USC, so this would require multiple organizations to collaborate and make it a reality. Other ideas include working with the organization that connects with the elderly through dancing to music, and working with A Moment of Magic, which could help with any children’s hospital related events we do since their members are trained to volunteer there.\nOverall, I plan to increase the types of events of
