fered, strengthen partnerships with other organizations, and create more engaging opportunities for members to get involved.", "extra": "Beyond my love for service, I want to emphasize my reliability. I understand this role requires me to not only plan ideas but to follow through and make sure it gets done. I believe that if I am part of an organization, it is my job to fulfill any expectations and be fully involved. That’s why even with personal struggles the past few months (resolved now), I have still stayed strong academically, consistently logged my research hours 3 times a week, fulfilled AED requirements, and participated in intramural matches 3 times a week. I also am someone who values initiative and communication. I am comfortable communicating my thoughts directly and coordinating with people to get things done. Lastly, I am drawn to being part of the team itself. I regret not applying to be on the committee last semester in fear of being “too busy,” but I have since realized the importance of taking initiative and getting involved. Seeing the impact that the leadership team has had on the organization has motivated me to step forward, and I am confident that I can execute the responsibilities of this role.", "transport": true}, {"name": "Avery Labaska", "year": "Junior", "track": "Pre-Med", "positions": "New Member Director (2 spots)", "fit": "Every organization is a reflection of its members. I believe I would be a strong fit for a New Member Educator because I see the importance of fostering involvement, excellence, and tradition within new member classes in Alpha Epsilon Delta. I am motivated to create an ongoing cycle of mentorship that extends beyond my own pre-health experience, which begins with building each new member class. \nAs someone who recently went through the new member experience, I have a clear and relevant understanding of what works well, what could be strengthened, and what could be implemented to improve the process. This perspective allows me to approach the role with fresh insight and a strong desire to enhance the experience for incoming members. During my rush experience, I heard countless potential new members say they wanted to join AED for a sense of community. Because of this, I want to enhance the sense of community by intentionally creating opportunities for connection, mentorship, and involvement from the beginning.\n\nWithin my panhellenic sorority I applied and was selected to be on the New Member Committee. Through this role I have learned how important it is to create a structured and welcoming environment where connections can be built early and foster long-term involvement. I have seen firsthand how intentional planning and mentorship can shape how the new members engage with an organization. Alongside this role, I underwent extensive training on how to recruit new members to ensure their values align with the organization's core pillars.\n\nIn addition to the New Member Committee, I was selected to be on Zeta Tau Alpha’s Programs Council where my co-chair and I collaborated with a council of 30 girls to enhance the member experience. This role strengthened my ability to work as part of a leadership team and coordinate ideas with others. I work very well collaboratively and look forward to the opportunity to work with a co-director again to further develop ideas for the new member experience. \n\nI also intend to work closely with the other cabinet members to encourage new members to attend events and become involved early. By doing this, we can help the new members feel more integrated into AED, more comfortable to try new things, and strengthen overall engagement within the organization. \n\nI strongly value tradition, engagement, and community, and I would love the opportunity to help build and strengthen these aspects within AED. I believe that members get back as much as they invest in the organization, and I would work to ensure that the new members fulfill their desire for community and get back as much as possible from their experience.", "time": "I understand that serving on a cabinet requires a significant time commitment, and I am prepared to prioritize my responsibilities in order to be fully present and contribute effectively to Alpha Epsilon Delta. I am involved in several other organizations which have strengthened my time management skills and taught me how to balance commitments while remaining dependable in each role.\n\nI stay organized by planning ahead and maintaining a structured schedule that supports my academic, work, and extracurricular involvement. Over the past year I have successfully balanced leadership and involvement in several areas. Within Zeta Tau Alpha, I held both a leadership position and two committee positions during 2025 while also participating in various clubs, managing a rigorous academic schedule, playing a travel club sport, and working as a pharmacy technician. Throughout these experiences, I have learned how to prioritize responsibilities and ensure that I am giving my full effort to the commitments I take on without spreading myself too thin. \n\nIf selected for New Member Director, I will make AED a priority by setting aside time for cabinet responsibilities, planning new initiatives, and enhancing new member engagement. I will also prioritize constant communication with my co-director and cabinet members, as I believe it is an important part of managing responsibilities effectively and ensuring expectations are met smoothly. I am committed to being reliable, present, and supportive of the organization, and I take leadership roles seriously. I want to ensure that I am actively contributing to the success of AED and a position that I am truly passionate about.", "impact": "If selected, I would focus on enhancing the new member experience in Alpha Epsilon Delta by strengthening the aspect that many potential new members are seeking: a sense of community. During my own rush experience, I noticed that many fellow potential new members expressed a desire to find community within AED, something I was also looking for. While I was able to find that sense of belonging, I believe there are meaningful opportunities to strengthen and expand the sense of community for future members.\nOne of my main goals would be to improve the structure of new member education by making it more interactive. I would assign small groups at the beginning of the first new member education meeting so members can sit together and begin forming connections immediately. Throughout the presentation, I would incorporate opportunities for small group discussions so that members are actively engaging with both the material and each other. This would help break the ice early and foster stronger connections before individual small group meetings. During the second new member education, I would build on the current social format by incorporating additional interactive games that encourage members to meet more people, rather than remaining within the same group for the duration of the event.\n\nTo further strengthen engagement, I would implement a small group incentive system where members earn points for their small group by attending events and participating in AED activities. Groups would be able to track their progress throughout the semester, and the group with the most points by induction would win the prize. This would create a sense of accountability and friendly competition while encouraging consistent involvement and helping members get the most out of their experience in AED.\n\nIn addition, I would introduce a new member class project in collaboration with the Service Chairs and Philanthropy Director. Each new member class would work together to create a small service project or philanthropy event that will represent their class. This will not only promote teamwork, but also establish a meaningful tradition that connects members to AED’s pillars of service and philanthropy. This project would provide new members with the opportunity to earn their first service point while also encouraging participation from the entire chapter, helping to further integrate new members into the organization. I believe this initiative would make philanthropy more prominent in AED which I believe can be strengthened. To further encourage involvement, I would also introduce short-term leadership roles within this new member project, allowing members to feel connected to the chapter and build confidence in pursuing future leadership positions within AED.\n\nFinally, I would incorporate a reflective component into the new member experience that will make the process meaningful and memorable. At the end of each interview, potential new members would be asked to write what they hope to gain from AED. The very card that each new member wrote on will be returned to them during induction, allowing members to reflect on the accomplishment of getting inducted and set intentions for fulfilling the wishes they had as a potential new member. \n\nOverall, my goal would be to create a new member experience that is engaging, supportive, and, most of all, rooted in community. I hope to establish traditions and opportunities that extend beyond my time in AED and continue to positively impact the organization as a New Member Director.", "extra": "Outside of my leadership experiences, something that is very important to me is building meaningful connections with others, especially within the pre-health community.Through my role as a pharmacy technician, I have seen firsthand how important communication, teamwork, and trust are in a healthcare setting, especially when working with patients and ensuring their needs are met. This has reinforced my desire to create environments where individuals feel supported, comfortable, and encouraged to grow.\n\nI have also always valued tradition and the role it plays in shaping an organization. I believe that the most impactful organizations are those that create experiences and traditions that members carry with them beyond their time as members. This is something I have seen in my other involvements, and it has motivated me to contribute to building traditions that foster connection, engagement, and a lasting sense of community within Alpha Epsilon Delta.\n\nI am someone who is dependable, approachable, and committed to the roles I take on. I value collaboration and enjoy working with others to bring ideas to life, which I believe is essential in a leadership position like New Member Director. Although I am a newer member of AED, I see that as a strength. I bring a fresh perspective, strong motivation, and a genuine desire to enhance the new member experience.\n\nI would be honored to bring my ideas to life within AED and create meaningful experiences for members that leave a lasting impact.", "transport": true}, {"name": "Merelin Polanco", "year": "Senior", "track": "Pre-Med", "positions": "New Member Director (2 spots)", "fit": "I would be a good fit for this position because of my commitment I have shown to AED, my adaptability, and reliability. As a member of the pre-med committee, I have shown leadership skills through the planning and execution of events. I have communicated greatly with my pre-med chair and my other pre-med committee peers. Not too long ago, we had a couple of last minute changes, and I, as well as my committee peers, managed it well under pressure. I understand New Member Directors must work well under pressure, especially during rush season. Additionally, I have shown to work excellent with others. As one of the two NM Directors, I must be able to communicate with not only the other director, but also the committee and all the members. Lastly, when I commit to something I give it my all. If I cannot make it to an event or last-minute events happen, I will communicate it quickly. If I cannot do it at all, I will let my other peers know as I know it can affect everyone.", "time": "I survive because of my calendars. I am a Google Calendar freak. I put everything on my Google Calendar and I also write it down on my physical calendar to cross things out. I understand all the work that it takes to serve AED. Although I am a member of two other organizations, I have managed to balanced out all of them pretty well- mainly because the chapters and a lot of the events do not overlap. If I could not be available to serve AED, I would not be giving it a try. As a member, I have demonstrated my commitment by attending nearly all meetings this semester, aside from a few unavoidable personal conflicts.", "impact": "I want to bring in more diversity into AED. As a first-generation Hispanic, I feel like I do not have a lot of representation in AED. I have had a couple of OSP (first-gen program) students that have been terrified to rush AED since they think they would not make it since there is not a lot of us in it. From when I rush, I would change some of the requirements like the minimum number of bigs little must meet. I would also keep adding more onto the big/little events. I have found that really can keep me close with my little. Overall, I want to make it seem more inclusive and especially fun for the new members joining us!", "extra": "", "transport": true}, {"name": "Omar Rahman", "year": "Sophomore", "track": "Pre-Med", "positions": "New Member Director (2 spots)", "fit": "Being an active member in AED for almost a year now, and having the privilege to be part of this wonderful community of dedicated students, I’ve realized what it takes to truly run an organization of this size.\n\nServing on AED’s academic committee, I’ve had the unique opportunity to witness the inner workings of the organization, and to serve the members in our society. Although shifting from Academics to New Member Director may seem like a drastic change, both roles in leadership are grounded in the same practices. In any leadership role, you need to be versatile and able to think quickly for alternatives in case things go south. I have had the chance to practice this at a small scale, such as sudden room changes, and on a large scale, such as the date of the job fair being changed last second. Despite these changes, my fellow committee members and I were able to adapt, and make the situation work. To add to this, my motivation for applying for the New Member Director position lies in the impact you can leave on the potential new members of our society. I vividly recall during my rush process the way Tyler and Andrew would handle the events, and it was truly inspiring. I want to reach students the way they reached out to me, and to help them on their journey into rushing AED.\n\n Additionally, for the New Member Director position, you must be social. I’ve had the chance to practice this as a committee member by hosting, headlining, and helping create multiple events for our organization. To add to this, I was also able to hone my teamwork and collaboration skills with my fellow committee members, as we created the 25+ events we had for this semester. Through this, I’ve learned how crucial it is to collaborate with other committees, such as social, and new members, in order to provide our members with the best event experience possible. \n \nMy time on the academics committee has laid the foundation to pursue greater opportunities within AED. My involvement with other committee teams, event planning, and versatility is a testimony that I know what it takes to be in a bigger leadership role in AED. I plan to bring the same dedication to the New Member Director position, because I truly want to leave a mark on the future members of our society who may consider rushing.", "time": "Since I arrived at USC, the very first organization I heard about was AED. It was also the very first organization I joined, and I plan to make it my last during my time at USC. Prior to rushing, and to the present day, I’ve grown to love this organization. From the amazing community to the unique events we plan, we are truly one of a kind on campus. With the current points system, members are required to accumulate 25 points through various events and chapter meetings in their first year. Currently, I have a total of 45. Being top 5 in points in AED proves that this is not just another organization to me, but a commitment. Granted, attending events and gathering points is not a competition whatsoever, but it does demonstrate my willingness to be present for AED, even when I don’t need to. Being involved in AED is something personal, and it means more to me than just holding the title of “AED Member”. \n\nThrough my involvement with the academics committee, I’ve already committed more time to the organization than others. My motivation for joining the committee was to serve our community with events that they deserve, and through communication and coordination with my peers, I believe we have done that. Although my time in the committee is ending this semester, I plan on continuing my dedication to the members through other leadership roles in AED.\n\nFinally, although I am a part of other organizations on campus such as “A Moment of Magic” “Asian Barbell Association” and “MedElem” next semester, AED will always remain my primary focus. As an academic committee member, I have never been on probation, or received a formal warning, while still being able to balance other extracurriculars. This proves that through time management in the proper way, I can maintain a healthy balance while still keeping AED as my top priority. As a future New Member Director, my commitment to AED will be no different. I plan on allocating more time to this position than my current one, to truly serve those who make our society what it is.", "impact": "Throughout my first year in AED, I’ve had the unique opportunity to be both a regular member, and hold a leadership position in the society. Having experienced this, it allowed me to see the changes that can be implemented to make AED better. Additionally, after communicating with my rush class, and the one following it, coupled with talking to current leaders in AED, this has offered me the chance to have a broad view on what we truly want to see a change in, and how we can do so.\n\nFor starters, something that was a common complaint from both rush classes was the Big Little Mingle. The cramped room mixed with the loudness and difficulty in communicating with others definitely made the event rough, and many members would lose their voice the day after. For an event that is so crucial to the AED Big Little program, it needs to work properly. A solution to the problem is that the Mingle can be separated out into different days for the tracks. AED is a pre-health society, but the majority of our members are Pre-Med. What I suggest is we hold two Big Little Mingles, one for the Pre-Meds, and one for the other tracks. This way, the mingle will not be as cramped as before, and it allows for easier conversation between potential bigs and littles. Additionally, this further ensures that members are paired with the same respective track as their little or big. Granted, members are allowed to go on dates with anyone, but they are less likely to meet with those who they haven’t met in person. \n\nTo add onto this, many new members have reported that they have problems assimilating into AED. After the rush process, many new members feel isolated because everyone in AED already knows one another, making it difficult to form connections early on. To fix this, I propose an additional New Member Education day called “New Member Mingle”. Current AED members can come and speak to the rush class about their experience in AED and what they can expect as new members moving forward. Members can also stick around to chat and connect with the new rush class, and with snacks and drinks provided, it can make for a promising social event worth one social/professional point.\n\n\nFinally, AED would not be what it is without the feedback from its members. Knowing what changes need to be made and why from the people who make our organization is crucial for success. I suggest adding a specific question to the flex point form for the new rush class. We can ask them about their rush process and what went wrong for them. Asking this on the flex point form forces members to give an honest and thorough answer, reducing the chances of having any bias in their response. This way, we can improve ourselves as the leadership team, and pass this information along to the next directors.\n\n\nMy plans as New Member Director are not to make drastic changes to the process, but to fix the small imperfections. The members of AED are what make our society what it is, and I believe with these changes, we can improve the event process for the future members of our society.", "extra": "Applying for any position in AED leadership requires a huge time commitment, but New Member Director is a position that's slightly different. I’m aware and understand that a lot of the groundwork for this position starts early on in the summer, and I want to assure the Executive Board that I will have the availability and dedication to start working as soon as summer begins. Additionally, I look forward to collaborating with whoever joins the new Cabinet Team. Having had the privilege of meeting so many AED members this year, I'm excited to strengthen those relationships even more and work together as a team.", "transport": false}, {"name": "Kaniya McDonald", "year": "Junior", "track": "Pre-Med", "positions": "New Member Director (2 spots), Diversity, Equity & Inclusion Chair (1 spot)", "fit": "I believe I would be a strong fit for both the New Member Director and DEI Chair positions because I am passionate about building community, supporting others, and creating welcoming environments where people feel comfortable getting involved. I want to contribute to AED in ways that strengthen member connections, encourage engagement, and make sure every member feels valued and included.\n\nNew Member Director:\nAs a New Member Director, I would focus on creating a welcoming and organized experience for new members, especially during rush and big/little events. I believe first impressions are extremely important, and I would work to make sure that new members feel excited about joining AED from the very beginning. I would aim to promote AED in a way that highlights not only the professional opportunities we offer, but also the strong sense of community within the organization. I would also make sure communication stays clear and consistent, whether that is through email, promotions, or helping potential members better understand what AED has to offer. \n\nI believe my personality makes me well-suited for this role. I am naturally approachable, organized, and attentive to detail. I enjoy meeting new people, listening to their needs, and helping them feel comfortable in new environments. I am also dependable and able to manage multiple responsibilities at once, which is important when planning events and keeping track of timelines.\n\nA relevant experience that supports my fit for this position is my time working as a Call Center Representative in the sales department at Spectrum. In this role, I worked over 40 hours a week communicating with customers, listening carefully to their needs, and matching them with the services that best fit them. I did this multiple times a day, which strengthened my communication skills and taught me how to build connections quickly and professionally. I was also responsible for effectively advertising Spectrum’s products, making sure customers understood their options and felt confident in their decisions. Additionally, I managed a high volume of emails daily and worked toward meeting performance targets, which helped me develop strong time-management and organizational skills. This experience directly connects to the responsibilities of New Member Director, especially when it comes to promoting AED, preparing for rush week, and communicating with new members. I believe my background in communication, promotion, and organization would allow me to help increase interest in AED, encourage more students to apply, and create a smooth and positive experience for new members throughout the process.\n\nDEI Chair:\nAs DEI Chair, I would work to help create an environment where all members feel respected, supported, and comfortable participating in conversations. I would aim to organize events and discussions that educate members on the importance of diversity, equity, and inclusion, especially in the medical field where understanding different backgrounds and perspectives is essential. I would also focus on building partnerships with other organizations and encouraging open conversations that allow members to learn from one another in a respectful and meaningful way. My goal would be to help create a safe space where everyone feels heard and valued.\n\nA major reason I believe I would be a strong fit for this role is because of my personal experiences and my commitment to inclusivity. As a person of color, I have experienced and witnessed disparities and false narratives in both professional and non-professional settings. These experiences have shaped my understanding of how important representation, empathy, and education are in creating inclusive environments. I would bring an open mind, empathy, and a willingness to listen to others’ perspectives while helping guide meaningful conversations.\n\nOne experience that reflects my interest in building inclusive communities was creating a book club during my sophomore year with the goal of bringing people from different backgrounds together. We hosted monthly book hangouts that allowed individuals from different schools and communities to connect and share their views. Our goal was to create a welcoming environment where people felt comfortable expressing their thoughts and engaging in open discussions. Since starting the club, it has grown to 45 members, which shows the value of creating spaces where people feel included and supported.\n\nOverall, I believe my experiences, personality, and dedication to building strong communities would allow me to positively contribute to AED in both the New Member Director and DEI Chair roles. I am committed to helping AED continue to grow, support its members, and maintain an environment where everyone feels encouraged to participate and succeed.", "time": "I am currently involved in Kappa Mu (a service sorority), Young Life Fam (a religious organization), and I also work part-time. Through these commitments, along with my academic responsibilities, I’ve had to learn how to balance multiple priorities at once and manage my time in a way that allows me to stay consistent and dependable in everything I’m involved in.\n\nTaking a semester off also significantly strengthened my time management skills. When I returned, I had to quickly adjust to being back on track academically while also catching up on credits I had missed. At the same time, I was working part-time to save for a car and actively involved myself in organizations and opportunities that would help build my medical school application. Managing all of these responsibilities together taught me how to be intentional with my schedule, prioritize what needed my attention first, and avoid overcommitting in ways that would affect my performance. Through that experience, I really learned how important it is to be realistic about my limits while still holding myself accountable. I had to plan ahead, stay organized, and make sure I was fully present in whatever I was doing at the time instead of just trying to multitask everything at once. It helped me understand the importance of consistency, because even small responsibilities add up when they are all being balanced at the same time.\n\nBecause of these experiences, I’ve learned that when I commit to something, I fully commit. I make sure I can give my time, energy, and attention in a meaningful way. I also believe that if you cannot fully invest in something, then you shouldn’t take it on. Overall, these experiences have made me confident that I would be reliable, present, and fully dedicated to serving AED.", "impact": "If selected as New Member Director, I would focus on strengthening connections within AED, improving the new member experience, and increasing inclusivity and representation.\nOne area I think could be improved is the big/little process. While AED has made immense progress with rush and big/little events, I believe we can make them more intentional. Right now, there often isn’t enough time for everyone to truly meet and connect with each other, especially during big/little meet and greets. Pre-med members in particular make up such a large portion of participants that it becomes difficult for everyone in that field to fully go around the circle and have meaningful conversations with each person. Because of this, interactions can feel rushed, and people don’t always get the chance to speak with individuals who would actually be beneficial or compatible connections for them. I’ve also noticed that when people are going around the circle, they don’t always have enough time to properly engage, which can lead to surface-level conversations or missed opportunities to connect. For example, there are often situations where new members end up mainly speaking with potential bigs that are younger than them and vice versa, simply because of timing and how crowded the event becomes. In addition, I’ve noticed that when members set up big/little dates afterward, they are often reaching out to people they never actually met in person and are choosing based mainly on slides, which doesn’t always reflect real compatibility.\n\nTo address this, I would propose separating pre-med members into their own dedicated meet and greet day. This would still take the same amount of time as the current structure, but it would allow for better structured pairings. It would also allow me to organize potential bigs by grade level without the event becoming too chaotic. That way, new members can focus on having real conversations with people who are either in their same year or one year above or below them, which leads to more meaningful and relevant connections. I believe this would help members make more informed decisions when choosing bigs and littles, since they would be basing it on actual interactions rather than just slides or brief encounters. I would still keep the slideshow of all potential bigs and littles across all fields so that members have access to the full pool and can reach out to anyone they may not have spoken to. However, this structure would make the in-person portion more intentional and increase the likelihood of members forming connections through real conversations, ultimately leading to stronger and more compatible big/little pairings.\n\nIn addition, I would want to strengthen the overall sense of community between new and existing members. I’ve noticed there can sometimes be a disconnect between incoming classes and current members, and I think AED would benefit from more deliberate bonding opportunities. I would introduce a social event early in the semester where both new and existing members can interact through games, food, and lighthearted activities. New members would be required to attend, while returning members could be encouraged through incentives such as social points. The goal would be to help members connect beyond academics and professional interests and actually get to know each other’s personalities.\n\nFor big/little bonding specifically, I would also encourage more interactive and creative events, such as bowling nights or collaborative activities like painting together, where partners switch every few minutes and build off each other’s work. Icebreaker-based events could also help pairs form stronger connections in a more natural way.\n \nIn terms of DEI, I would work to increase representation and visibility within AED. From my experience, there are very few Black and Hispanic members in the organization, which can unintentionally make it feel less accessible to students from those backgrounds. I want to help address this by increasing outreach in spaces where underrepresented students are already present, such as collaborating with cultural organizations and tabling at events like Hip Hop Wednesdays. I would also aim to have AED members from underrepresented backgrounds involved in outreach efforts and tabling, so students can see representation directly within the organization. Through conversations I’ve had with students, many shared that they either had never heard of AED or didn’t feel like they would truly fit in, which highlights a clear gap in awareness and accessibility.\n\nAdditionally, I think AED should continue emphasizing that it supports a wide range of healthcare paths beyond pre-med. Many students in pre-dental, PA, and allied health tracks may not realize they are equally welcome. I would collaborate more closely with the Pre-Dental, PA, and allied health chairs to ensure we are actively reaching those students through targeted tabling, classroom outreach when possible, and clearer promotion of opportunities within those tracks. I would work to bring in speakers from a variety of healthcare professions and diverse backgrounds so members can see themselves represented across different paths in healthcare. Hearing from individuals in different specialties and lived experiences would help members better understand the range of opportunities AED supports and feel more included within the organization.\nI would also want to strengthen collaboration with the DEI committee by working more closely with them throughout the semester. This would allow for more consistent communication and idea-sharing. Ultimately leading to more meaningful DEI-focused initiatives and events that reflect the needs of the organization as a whole.\n\nOverall, regardless of the role I am selected for, my main goal is to strengthen connections, increase inclusivity, and create a more welcoming and engaged AED community.", "extra": "During the previous semester, I chose not to join a committee because I wanted to be intentional about the commitments I was taking on and ensure that I could give my full effort to everything already on my plate. At that time, I was adjusting to transferring schools, taking a heavier course load to get back on track for my graduation timeline because of my gap semester, working part-time, and saving for a car. I also wanted to make sure I was being thoughtful about how I was building my involvement, rather than spreading myself too thin across too many responsibilities. \n\nFor me, involvement is not something I want to do just to be present in a space, I want to be fully engaged and genuinely contribute in a meaningful way. I realized that if I had joined a committee during that semester, I would not have been able to show up with the level of energy, consistency, and creativity that I expect from myself when I commit to something. Instead of forcing involvement for the sake of it, I chose to focus on stabilizing my academic transition and making sure I was setting myself up to be successful long-term.\nThat decision also helped me become more intentional about how I approach leadership opportunities now. It gave me perspective on timing, priorities, and reinforced the importance of only stepping into roles where I know I can be fully present and contribute at a high level. Now that I am more adjusted and in a stronger position with my academics and responsibilities, I feel confident and ready to take on a leadership role in AED where I can dedicate my full effort and make a meaningful impact.", "transport": false}, {"name": "Stephen Bravata", "year": "Junior", "track": "Pre-PA", "positions": "Event Coordinator (2 spots), New Member Director (2 spots), Wellness Chair (1 spot)", "fit": "I would be a great fit for the new member director position because I have always been a leader who works tirelessly to help others achieve their goals and feel included. From being a captain of my football team to sitting in a lecture hall, I feel I have the ability to bring people together and foster an environment where people exceed their goals and expectations for themselves. I believe this is an amazing quality to have, especially in the case of being a new member director, as rushing and pledging can be an extremely stressful and scary time. My main goal of new member director is to make this process not only less daunting, but a fun and rewarding time where potential new members and pledges will feel connected with AED and all of our members. Additionally, I aim to make big/little relationships even stronger with more events catered to getting to know one another in fun environments. I hope to have people attending these events not just to fulfill a point requirement, but to spend time with their AED family.\n         I would be a great fit for the event coordinator position because I am a very thoughtful, organized and sociable person. Thoughtfulness and organization will allow me to plan events that are well-planned and carried out where people feel they get meaningful experiences, instead of filling point requirements or building their resume. This is important to me because I have been in many organizations where events feel forced or unorganized which makes me personally feel as if I am not getting anything out of my time spent there. I want to work as an event coordinator to prevent this feeling in any event carried out by myself or others in AED, to provide our members with worthwhile events they are happy they went to.\n         I would be a great fit for the wellness chair because I believe mental, physical, and social well-being are vital aspects of success and life in general, that are massively overlooked, especially in college. Healthcare is a very stressful and time-consuming career to work towards as graduate schools may require research, extra curriculars, clinical hours, etc. not to mention needing to maintain a very high G.P.A. on top of this. I personally have seen myself not making enough time for my own wellness because of this and have made it my priority to change this despite how much stress or work is in my life. This has made a monumental difference in my life, and I want to make it not just my goal as the wellness chair, but throughout my career and life going forward to prioritize wellness and help others to do the same. Wellness issues are a big issue, and I want to ensure that everyone knows they are not alone and make them not just aware of available resources but show them the importance of taking care of their well-being. Ultimately, AED is a family who helps each other towards their goals, and I will make it my goal to allow my family and all of the new members to come to live their physically, mentally, and socially best lives.\n         While I have not been in any AED positions in the past, I am a very active member who has stayed late after chapter to help clean up and introduces myself to members I have not met. This is important to me because I want to be able to be someone they can not only talk to at chapter or events, but a friend they can rely on for help and reach out to with questions.", "time": "I will manage my time commitments by prioritizing my duties as an AED cabinet member, while also keeping my schedule very organized to ensure I make time for my other commitments such as research and shadowing. Additionally, each position I am applying for will be a very rewarding experience for me. I personally feel that AED is a family, and through the hard work I put forward as a cabinet position, I will foster an inviting and comfortable environment for others to find their sense of family within AED. This is not work to me, this is a privilege that I can't wait to put my full effort and time into so that other members can feel that they are a part of this amazing family.", "impact": "As a new member director, I plan on creating several different ideas and innovations to create a more interconnected and inclusive environment in our organization. Firstly, I want to change the pledging process to include more events as a pledge class, where new members can get to know one another and feel more comfortable going through this process with others going through the same thing. This will also allow new members to be more involved in AED as they know more people and feel part of it, instead of doing the bare minimum each semester just to put it on their resume. This would include a variety of events ranging from sports with their class to barbeques where the class can get to know one another in a fun environment outside of all of the stress of school and rushing. Another big change I would like to implement is to change the big/little interviewing process. I feel that big/little interviews during the pledging process feel like another requirement to check off, when it should be a break from the stressful time where meaningful connections can be made. I want to have interviews be done during events, where potential bigs and potential littles will pair up for a big/little event and that will count as one interview. By doing this, I think bigs and littles will create closer relationships and feel more connected to one another before they choose their bigs and littles. Additionally, by making these events flexible and plentiful, I believe littles will see it as a break from stress, where they can celebrate getting past rush and make friends while doing it. \n         As an event coordinator, I plan on changing the ways events are organized and planned to ensure they run smoothly, and members get the most out of attending them. Firstly, I would create overviews of timing of events and resources that go into making the events to allow for better structure and organization during events. This would include timeframes with estimated length segments of events to ensure time conflicts are avoided and events run smoothly while ensuring the intended outcome of the event was provided in the given time. Additionally, by having resources such as food and activity materials accounted for and properly managed, every event will have sufficient resources to provide meaningful experiences without being underprepared. Another implementation I will make is to create more events similar to health professionals mixer to allow more members to attend networking events. By doing this, people will be able to attend these selective events if they could not make the first one, allowing members to not miss out on important events due to limited capacity and availability issues. \n        As the wellness chair, I plan on changing the way wellness is viewed amongst our members and create events that allow members to decompress and manage their wellness. Firstly, I want to create an anonymous form where members with any issues can reach out and get help or advice without feeling uncomfortable sharing information. This would allow me to help our members and connect them with resources that will benefit them, without worrying about any judgement or issues with reaching out directly. Another change I would make is to create more events that directly deal with mental wellness and stress management. Events that inform people of resources and provide ways to positively relieve stress and prevent it in the future are one of my main priorities to benefit members through their stressful career journeys. By doing this, I think AED will prosper physically, socially, and mentally as a group that is very aware of their wellness and how to live their best lives going forward in life.", "extra": "I want to work my hardest to make a lasting impact on AED and implement positive changes to make this organization the best it can be. Throughout the last year of being a member in AED, I have been given so much guidance and meaningful experiences that have not only prepared me for my career goals but have made me a better person in so many ways too. My college experience has been so impactful on my life, and it is largely due to AED and the many people who make up this organization. Now that I am older, I want to be a leader to others and provide everything AED has provided me and more to all of the new members to come. Thank you for making this organization a fulfilling and amazing environment to be a part of, and I promise to continue positively impacting this organization in any of these cabinet positions.", "transport": true}, {"name": "Viona Su", "year": "Junior", "track": "Pre-Med", "positions": "New Member Director (2 spots), Marketing Director (1 spot)", "fit": "For New Member Director, I would be a strong fit because of my direct experience on the New Member Committee and my involvement with the New Member process. Over the past semester, I worked closely with the New Member Directors and committee members, which gave me a clear understanding of both rush and the New Member experience. I was involved in rush by attending both Meet and Greets. I was able to meet many PNMs and focused on getting to know them while also being a warm presence during a stressful process. Throughout the New Member process, I helped facilitate the New Member Educations and supported my mentee group by answering any questions, providing resources, and being a friendly face at events. I was able to put on events such as Vision Board Night, Crafting with Clay Night, and a Medical Trivia Event. Seeing big/little relationships grow has been very rewarding and I would love to continue fostering these connections. One of my greatest strengths is my empathy and compassion, and I want to bring that into every aspect of this role. Whether it’s representing AED to hundreds of potential members during rush, guiding new members through a challenging transition, or supporting my committee and fellow cabinet members, I understand how important this position is for shaping the new member experience, and I’m committed to approaching it with warmth and organization.\n\nFor Marketing Director, I would be a good fit because I’m creative, organized, and comfortable managing responsibilities that require consistency. I understand how to use Instagram and social media effectively, and I know how important cohesive branding and regular posting are for representing AED. I also have an artistic background in sketching and painting, which translates well into designing posts, graphics, and merch. I understand the importance of engaging posts on social media for our organization, and would be dedicated to putting the best content forward in an organized manner. The Marketing Director role has many different responsibilities that require ongoing work throughout the year and I would prioritize it daily. The role also involves significant collaboration with other Cabinet members, something I have much experience with through the New Member Committee within AED and through my position as Vice President of Finance for Gamecocks UAEM, an essential medicines and health policy organization. My ability to collaborate, stay organized, and plan ahead are all essential skills that I would bring to this position.", "time": "In general, I manage my time by keeping a detailed calendar, creating daily and weekly to-do lists, and setting personal deadlines to stay ahead of my responsibilities. I’m intentional about setting aside specific times for different tasks which helps me stay organized and prevents responsibilities from piling up. These habits allow me to balance multiple commitments effectively and maintain consistency throughout the year. Currently, I serve in a leadership role for Gamecocks UAEM and am an undergraduate research assistant. However, I prioritize AED on a daily basis and hope to put in the work as a member of Cabinet.\n\nAs New Member Director, I plan to complete a significant portion of the work over the summer. This includes planning the logistics of rush, streamlining the New Member process, and outlining all the big/little events (including what each event will be, the materials needed, and the Luma descriptions). By planning everything before the semester starts, we can create more meaningful events, fix small issues in advance, and take a lot of unnecessary stress off the school year. During the school year, I would focus on maintaining consistent communication with my committee and staying organized with a clear timeline of tasks.\n\nAs Marketing Director, I would set aside specific times each week dedicated solely to posting on Instagram. This ensures consistency and helps me prioritize the role on a regular basis. Over the summer, I would also develop a cohesive theme that would be maintained throughout the semester or year. Pre‑planning recurring content like weekly recaps, a week at a glance, and member highlights would help ensure that AED’s social media remains active, organized, and visually consistent.", "impact": "For New Member Director, I want to create a welcoming, supportive, and organized experience for everyone. If selected, I would hope to positively impact AED in three main areas: rush, the new member process, and big/little relationships. Rush can be overwhelming and stressful for both potential members and the organization, so I want to make it as smooth and straightforward as possible. For potential members, I would prioritize clear communication to make sure every step of the process is easy to understand and transparent. For the Executive Board and other Cabinet Members, I will emphasize planning ahead and ensuring that rush is a well‑structured, efficient process that transitions potential members into active AED members. Throughout the New Member Process, I will work closely with new members to make certain they feel supported by me, the New Member mentors, and the resources AED offers. My goal is to help new members feel connected, supported, and excited to be a part of AED, while also maintaining a balance of support and accountability by being understanding of new members’ needs while ensuring that requirements are met for induction. I want to reformat the New Member Education Quiz to make sure new members know essential information and improve the big/little matching to foster better connections. Additionally, I hope to strengthen big/little relationships by planning thoughtful events and guiding my committee members using the experience I gained from planning events this past semester.\n\nFor Marketing Director, I want to elevate AED’s visibility and engagement by keeping our social media active, cohesive, and representative of our community. Instagram is one of the main ways people learn about AED, so I would prioritize posting regularly. I would emphasize weekly recaps, event previews, and more consistent member recognition by highlighting competitive social event winners and accomplishments outside of our AED. This would help showcase exactly what AED is all about: community and uplifting one other. AED hosted over 500 events this past year, and I would love to highlight more of them and provide more detailed captions describing these events. I also hope to expand the merchandise options so there is something for everyone, whether that means more design options or different types of merch such as bags, hats, or quarter zips. If selected, I would work to create an online platform that truly reflects everything AED has to offer and accomplishes.", "extra": "Ever since I joined AED this past fall, I have loved every aspect of it. I look forward to the unique events, any opportunities to connect with others, and the countless resources and workshops AED provides. AED has been such a formative part of my college experience and I am thrilled for the opportunity to give back to an organization that has already given me so much.", "transport": true}, {"name": "Layla Foster", "year": "Senior", "track": "Pre-med", "positions": "New Member Director (2 spots), Pre-Med Chair (1 spot) -- Pre-Med applicants only", "fit": "Some things never change and something for me that has proven this true is my love for people and meeting new people. Serving on the hospitality team for Carolina BCM has proven to be one of my most meaningful experiences in college. But what makes it meaningful is the amount of people from so many different walks of life that I have got to meet. Through this position I have been privileged to be the first smiling face that people see as they enter our building and noticing when someone is new and giving them a tour of our building. It is through this role that I have been able to connect with and share tips and tricks to so many underclassman because they look for information from people who have been there longer. Additionally, through this role I have been able to help new students get acclimated to our organization and see all that it has to offer. I say all of that to show that I would be more than ready to serve as New Member Director. I think that this is such a special role because I love to see people grow and as New Member Director you get a front row seat to the lives of new members. If selected for this role, I would be able to promote AED because even in the few short months that I have been a part of AED, it has proved to be so meaningful and I want others to be able to experience that. I also think that I am a good fit for the position because I am an email warrior, constantly checking my email so I would be willing and able to respond to any questions sent to the email. For the second position I selected Pre-Med Chair. As someone who is first-generation and has no family in medicine, sometimes throughout my college career I have felt underprepared or lost on next steps. But while I have been in AED I have had members give me extremely crucial advice and I want to give back in that same way. I will have also taken the MCAT by the time I would start in this role I could help with questions in regard to that and I do plan on applying to medical school this cycle. In the pre-health field there can be a lot of cutthroat environments and gatekeeping but I have learned AED is the furthest thing from that and I would like to also share resources I have just as others have done for me. Furthermore, I am involved in a research lab and work as a CNA so I can speak to those experiences as well.", "time": "As previously stated in another question, I do serve on the leadership team with Carolina BCM, a lead ambassador for the Arnold School of Public Health, and am in Women in Healthcare. Over the past two years of being in college I have learned how to effectively use my time and manage my schedule because it can be busy. I will make the time commitment necessary and beyond for either of the roles that I am interested in. My dad has instilled in me since I was a little girl to not halfway do things and finish things that you start. If selected for the roles I would not put in the bare minimum time required but would do would best interest the organization. Furthermore, in the fall I will have a lighter course load as I will be entering my senior year and will not be studying for the MCAT. I will have a lot more time to dedicate to either of these roles.", "impact": "If selected as New Member Director, I would keep the drop in hours for potential new members just as Andrew and Tyler did because I think this allows potential new members to ask any questions in a more stress-free environment. I would like to add on to this by after delegations are made to have more drop-in hours to help new members understand all that AED has to offer because there is a lot in the presentation and sometimes it is just easier to ask in person. I also would like to host more events for new members so that they can begin forming connections within their new class. As pre-med chair I would like to bring representatives from schools like VCOM to speak about the DO pathway and how that looks. Additionally, I would like to have students speak about that application process. Furthermore, I would like to have an informational session that informs students about different scholarship opportunities for medical school. This is not an exhaustive list, but in either role I would constantly pursue ways to make AED more accommodating for every member!", "extra": "I know that there will be many competitive applicants who have been in AED longer or served on a committee previously but I will not be any less dedicated to any roles that I would be selected for. I also want to say that even though this was my first semester in AED and my schedule prevented me from going to all of the events that I wanted to go to, that I have gotten so much from these experiences and have already created many lasting friendships. I've learned how to ask academic questions to professionals through the health professionals mixer and how to develop my application for medical school. I want to make my last year at USC count by serving in a cabinet position and giving back to an organization that has already given me so much.", "transport": true}, {"name": "Makensie McGee", "year": "Sophomore", "track": "Pre-Med", "positions": "Philanthropy Director (1 spot)", "fit": "In joining AED last semester as a freshmen, I knew I wanted it to be one of the organizations I poured a lot of my time and effort into hoping to get the equivalent out. In being involved with Dance Marathon prior to joining AED, I saw the importance of philanthropy and supporting causes bigger than oneself. I decided to dive into these passions and join the philanthropy committee, under Mohin and with Gavin. Together, we have been able to accomplish so much: percent nights (such as Rita’s, JJ’s Tea House, Sweetwaters, etc.), various fundraising events (such as the Spring Refresher table), and even attend Main Event together, all to raise money and awareness for causes benefiting others and not ourselves, that being Dance Marathon and Relay for Life. In addition to helping plan each of these events and work through the logistics, I also designed the graphics to post on Instagram in promotion, helped lead our table at Spookathon and Relay for Life, and took the lead on designing/executing the banner for the DM Main Event. \nTo say I have gotten a lot out of this organization and the opportunities it has given me would be an understatement. It has allowed me to strengthen my personal passions, such as designing graphics and posters for promotion, but also shared passions with my committee members, such as giving back and being an encouragement for others to do the same. Not only that, but being in AED itself has allowed me to meet so many other driven individuals and gain incomparable experience. One of the challenges I set for myself this semester was to go to as many events as possible that fits in my schedule, even if I don’t need the point. From professional, to social, to service, these events (even participating in them for a second time) never cease to teach me something new. I am incredibly excited for the future of AED and to be a part of it, hopefully as a cabinet member, as I am passionate for others to join and enjoy all that it has to offer.", "time": "Time commitments have been something that I have been familiar with since high school, as serving as the president of student council, FCA, and DeSaussure Tri-Hi-Y at the same time required me to have to learn how to manage and delegate my time well. I was able to maintain these positions while achieving valedictorian, showcasing my academic drive in addition to other roles and responsibilities. Since coming to USC, I have had the opportunity to serve in various organizations and positions, some of which include Head of Communications for the Spur Retreat, Chi Alpha ministry, Tri Beta Honors Society, and volunteering at Prisma Richland (Dance Marathon has ended for the year, but I also participated in Morale for that). Despite being a part of these other organizations, I ensure that I will be available and present to serve AED, as for me it is my top priority. In my opinion, we make time for what is important to us, and AED is one of the most important organizations for me. From the service opportunities allowing for local outreach, to gaining advice and knowledge from people who have amazing experiences/journeys, to building a community with other like-minded individuals, who may be on a different pre-health track but offer equally important collaboration, AED is an unparalleled organization. It is one I am always willing to sacrifice time and effort for, as its importance for both me as an individual but as an organization is unceasingly evident. In addition, I have already been making AED a priority, as I set aside time to commit to my philanthropy committee so it can run smoothly. I hope to have the ability to commit even more time to AED and pour my passion out as the Philanthropy Director for the 2026-2027 school year.", "impact": "As Philanthropy Director, my main goal is to get more interaction and engagement with all things philanthropy. Whether that be the main event for Dance Marathon or Relay for Life, various percent nights, or even just tabling events, my hope is for more members to be involved with and support these causes that are so important to our founding pillar of philanthropy. One of my favorite events the philanthropy committee hosted was Spookathon, however only a few members participated. I think it would be amazing to get engagement with Dance Marathon events leading up to the Main Event, and I think I would be a great candidate for communication with Dance Marathon executives, as I was on Morale for this year. Even in serving as Head of Communications for the Spur Retreat, leading other incoming students to find their community and place in college, involvement and networking is incredibly important to me and the success of an organization. I believe that every member has the ability to give back, not just monetarily but with their time and commitment. I also think it would be worth brainstorming the idea of bringing the philanthropy point back, as obtaining it does not only have to be by means of participating in a percent night. My goal would be to hone in on at least two fundraising events per month, and the more promotion the better (even something like a tabling event). \nThese events would be planned well in advance and sign-ups would be in Luma in an adequate amount of time.\nThrough an effort of collaborative work with different parts of the organization as well as intentional effort from the philanthropy committee, some specific ideas I have are:\nPie a committee/cabinet member at the first part of September (right after new members get accepted to allow for them to support/get involved), supports Dance Marathon; Hot chocolate tabling fundraiser during finals week (December 7th), supports Dance Marathon; Week of events leading up to Main Event (was February 21st this year) such as a percent night, tabling fundraiser (a bake sale, possibly themed such as childhood favorites to support the children hospital), Digital Dozens, banner painting (promote it to members as a social point as well), etc.; Push for members to join the DonorDrive and/or sign up to  be a hero and attend the Main Event.\n In January, start promoting and fundraising for the Relay for Life main event (first part of April) through more percent nights (Rita’s, JJ’s Tea House, Cool Beans, and 16 Handles), more tabling fundraisers (refreshers and/or dirty energy drinks).\nSelling stuff at chapters during the week leading up to the Main Event for both organizations could also be beneficial. Partnering with other committees (like DEI) would also elicit more support and participation. Additionally, we would join and support the actual Dance Marathon organization when they table as well as their events (such as Spookathon) and promote it to our members. I hope to raise the amount of people who join DonorDrive and possibly even have an incentive (maybe a raffle for joining and a prize for the person who raises the most money).", "extra": "The board and executive members forever stay encouraging me and I look up to them more than anything. I remember when I was rushing I had a conversation with Aleena about her creative writing minor, as I was on the fence about adding one despite being super passionate about it. I decided to listen to her encouragement and I am so excited to have classes I don’t necessarily need, but that I truly enjoy. With that being said, I truly take what the board and cabinet members take to heart. With the encouragement of Tim-George, whose support has been felt since I first rushed, and Mohin, who instilled my initial passion to run for philanthropy director, I am beyond excited to put myself out there and run for this position. I have truly enjoyed being on the philanthropy committee and I think it has taught me some invaluable lessons. Additionally, joining AED was the best decision I have made since coming here and I hope I can use what I am passionate about to better the organization.", "transport": true}, {"name": "Sara Holden", "year": "Senior", "track": "Pre-Dental", "positions": "Pre-Dental Chair (1 spot) -- Pre-Dental applicants only", "fit": "I believe that I would be the perfect fit for pre-dental chair because of my strong passion for dentistry. When I was twelve, I found out that I had a peg tooth, and that's when my fascination with teeth began. My general dentist told me I would start my dental journey by having a few teeth extracted, braces to make space for an impacted canine (which was close to knocking out my peg tooth), and finally a crown to fix the size of my peg incisor. At the time, I was frustrated that I had been born with a peg tooth, especially since none of my other friends had any problems with their teeth. I found myself constantly feeling self-conscious and uncomfortable with the way my teeth looked when I would talk or smile. However, what I once looked at as a catastrophe has now become one of the most important things to have ever happened to me. The countless hours I spent at the dentist not only fixed my teeth, but also led me to know exactly what I want to do for the rest of my life. I believe that some of my greatest strengths that will make me an asset to AED’s cabinet are my organization and time management skills, my positivity and friendliness, and my leadership skills. Organizing manual dexterity events where pre-dental students can hone their fine motor skills along with fostering an environment where students can build connections with other pre-dental members are my two primary goals. A couple of leadership roles that I have had which will help me excel as pre-dental chair are being on the board of Pancakes for Parkinson's along with my time on the AED Service Committee. I am a part of the organization Pancakes for Parkinson’s, and as a member of the board, I help with planning various events and fundraisers to promote research for Parkinson’s disease and support the Michael J. Fox Foundation. Serving on this board has helped me gain valuable skills that I can use if I am selected as pre-dental chair such as planning events, sending out announcements via GroupMe, and booking spaces to host them. I have truly cherished my time this past year on the AED Service Committee and it has given me a chance to consider what it would be like if I were a member of the cabinet. I have gotten to build connections with various service organizations, plan and take the lead in countless events, and also communicate with fellow AED members about information pertaining to rides or event details. I believe that both of my past leadership experiences will aid me with planning manual dexterity and social events for pre-dental students, while also assisting me with other responsibilities as pre-dental chair, like contacting dental professionals to come and speak. I have truly loved the countless opportunities AED has to offer, which is why I am passionate about giving back to this organization and building an even stronger community between the pre-dental and other pre-health students. I am honored to be considered for the role of pre-dental chair for this invaluable organization.", "time": "If I am selected as AED’s pre-dental chair, I will be sure to make plenty of time for all of my responsibilities within this role. I believe that I am an expert at time management, and I know that I will be able to balance my time as pre-dental chair along with my other organizations. In addition to AED, I am a member of Delta Delta Sigma, which is a pre-dental honor society. I am a member of Pancakes for Parkinson’s, where I have served as both president and vice president, and I am also involved in research as a two-time Magellan Grant awardee at the SCROLL Lab, which focuses on linguistics and speech. I am also a member of the Carolina Basketball Band, which I have been involved in every year since I came to USC. For the past three years, I have been able to use my time management and organization skills to manage a rigorous course schedule, multiple extracurriculars, shadowing, service opportunities, and social activities. I have found that as long as I organize my time correctly and save plenty of time for each extracurricular I am involved in, I am able to thrive both academically and socially. Being a part of AED’s cabinet will come with a great amount of responsibility and dedication, and I believe that I would excel in this role because of my strong work ethic and organization skills. I will be fully committed to AED’s high demands and serve this organization to the best of my ability if I am selected as pre-dental chair.", "impact": "I believe that I will be able to positively impact AED because of my uplifting passion for dentistry, and my multiple new ideas that I believe will greatly benefit AED’s pre-dental students. My first goal if I am selected as pre-dental chair is to provide countless opportunities for pre-dental students to practice their manual dexterity by working on dentistry-related tasks. Some examples include mirror coloring, suture practice, a dentistry related jeopardy game, soap carving, pottery painting, and several other ideas. I have heard from students who are at MUSC that dental school is 50 percent studying and 50 percent hands-on manual dexterity. It is extremely important that pre-dental students start practicing their fine motor skills now so that they are prepared for dental school. My second goal is to increase involvement in the pre-dental events. I know that in the past there has been trouble getting a vast majority of pre-dental students to come to the pre-dental-only planned events, so I believe I have an idea that could solve this. I propose that for both social and professional point categories, we could require 1 out of the 3 social and/or 1 out of the 2 professional points to be from attending a pre-dental-only event for our pre-dental members. This could also be applied to pre-med students, pre-PA students, and so on for their respective pre-health tracks if desired. By doing this, the attendance will increase for the pre-dental-only related events while also helping to foster a closer pre-dental community in AED. My third goal is to host two milestone events that will greatly help pre-dental students have an easier time on their journey to dental school. These two events are a mock DAT and several mock interviews. The DAT and interviews for dental school are two of the most important factors when it comes to getting accepted. I believe that by hosting a mock DAT, like the pre-med chair has done in the past, that AED’s pre-dental members will have an easier time when it comes to taking the real DAT and hopefully ease their stress when it comes to test day. For the mock interviews, I believe that having a couple of these throughout the semester would be very beneficial for students applying to the upcoming cycle as well as for members to get practice for future interviews. Also, this event could be opened up to all pre-health tracks, and the interviewers could have different questions to ask pertaining to an individual's track. I believe that I will be able to positively impact AED if I am selected as pre-dental chair by creating new resources and incorporating additional manual dexterity and other dental-related opportunities that will better aid our members on their journey to dental school.", "extra": "I am very grateful to have this opportunity to apply to AED’s pre-dental chair position, and I greatly appreciate the entire executive board for taking the time to read over my responses and consider me for this role. Coming into my senior year, I am certain that AED has been the organization that has made the greatest impact on my college experience. From the moment I joined AED, I knew that I would make lifelong friendships with hardworking, driven, and like-minded students who share the same passion for their pre-health tracks. This past year serving on the Service Committee has been truly amazing, and I am very thankful that I have had this opportunity to give back to AED. Because of how much I cherished my time serving on this committee, I want to become even more involved in this organization, which is why I believe I would be a perfect fit as AED’s pre-dental chair. Ever since I was twelve years old, I have always known that I wanted to become a dentist, and with this role, I would love to help other pre-dental members, just like myself, on the journey to getting accepted into dental school. Thank you so much!", "transport": true}, {"name": "Julia de Jong", "year": "Junior", "track": "Pre-Dental", "positions": "Pre-Dental Chair (1 spot) -- Pre-Dental applicants only", "fit": "I think I would be a good fit for the position of Dental Chair because of a combination of my love for dentistry and my leadership skills. Throughout my life I have had my fair share of dental procedures and by being in the perspective of a patient so often, I have learned how important it is to feel safe, seen, and understood. My love for dentistry has only grown during my time in college. This past winter break, I fully experienced what it was like to be in the role of a dentist. I spent over two weeks in Cusco, Peru providing comprehensive dental care. Whether I was assisting in a regular cleaning or even wisdom tooth extractions, I was able to learn so much about what makes a good dentist. This experience not only taught me so much but also deepened my passion for dentistry. It was so amazing waking up every day and being able to do what I love. I have also taken a position this summer to be a Sterilization Technician at a dental office, on my days off from studying for the DAT. This experience will give me so much insight into the ins and outs of working in an office. I believe my passion for dentistry would make me a good fit because it gives me an opportunity to bring together a community of like-minded people. As a committed member of AED, I have communicated with so many pre-dental members and become close friends with many of them. I know that by being open to communication and approachable, I will be able to fulfill the role of the Dental Chair very well. I want to be able to share my passions and interests with others in AED. I know I would be able to foster a fun, encouraging, and tight-knit community of pre-dental students within AED. I am motivated to organize local services and workshops that emphasize the importance of patient-centered care. I want to ensure every pre-dental member of AED feels as seen and understood as I did when I was a patient. I also want to share advice and plan workshops for the pre-dental members through my experience. I believe that since I will have taken most dental school prerequisites and the DAT, I could have so much advice to offer to members. As Dental Chair, I would use this experience to create study groups and resources, and opportunities. I understand the pressure of balancing hard STEM courses, shadowing, and volunteering all while trying to make the best of college. I want to be a resource for members who are navigating that same stress, offering them the organizational tools I’ve developed to stay on track.", "time": "I fully understand the time commitment and amount of effort that will be put into the position of Dental Chair. I have always been a student who has lots of things going on but I manage to successfully balance many responsibilities. I have purposefully stayed involved and busy within multiple organizations to help build time management skills early in my undergraduate career. Beyond my commitment to AED, I am also a member of Delta Delta Sigma, Chi Omega, I shadow at O'Neill Family Dentistry regularly, and volunteer regularly. I truly believe that being in these organizations will only help me succeed in the position as Dental Chair. For example, my involvement in Delta Delta Sigma keeps me constantly engaged with the pre-dental community as my participation in both organizations often overlaps in focus, allowing me to be more efficient and well-informed when planning. Although my other organizations do have time commitments, I have learned very quickly how to manage each organization. I know when I need to prioritize certain events over others. I am also lucky that none of the organizations have strenuous requirements, allowing me to have time for other things. I stay organized through writing daily To-Do lists, writing down all my classes and extracurriculars into Google Calendar at the beginning of the semester, and consistently checking for changes throughout the semester. As Dental Chair, I would put this position at the top of my list, not just another extracurricular but as a professional priority. I know that I would not just do the bare minimum for this position but instead fulfill the responsibilities and more. My goal is to treat this role with the same amount of effort that I put into school and other clubs. I also believe that holding this position requires lots of open communication and honesty with other members. If something were to come up in my schedule that stops me from doing the best I can, I know that I would communicate this well in advance to ensure that members are in the loop.", "impact": "The AED Dental Chair plays a crucial role in bridging the gap between undergraduate classes to dental school. I want to achieve this through clinical skill building, professional networking, and fostering community and mentorship. I want to give members resources that they find valuable and helpful to getting them to the shared goal of becoming a dentist. My goal is to hold events that are fun, engaging, and bring our community together. I have so many ideas to do as Dental Chair. To start, I would love to continue workshops that help pre-dental students through the key stages of applying. I want to have informative How-to DAT and How-to Apply workshops. I also want to integrate more hands-on events such as a suture class, impressions lab, soap carvings, clay building, and more. As a pre-dental member, I have noticed that not many of our events are as hands on as other tracks, and I would love to implement more of them. I would love to host more speakers whether it's over zoom or in person. I think having some moments to listen and speak with a dentist in the Columbia area can lead to professional opportunities, and you get so many of your questions answered. Something I am strongly motivated to do is give pre-dental members more
