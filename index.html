, I would bring a willingness to grow, a strong sense of responsibility, and a genuine investment in both AED and its members. If selected, I would make sure I am someone the organization can rely on.", "transport": true}, {"name": "Maisie King", "year": "Sophomore", "track": "Pre-Med", "positions": "Service Chair (2 spots), Wellness Chair (1 spot)", "fit": "I am excited to apply for leadership roles within AED because I care deeply about contributing to an organization that has already given me so many opportunities to grow, connect, and serve. I approach both service and wellness not as requirements, but as meaningful pillars of a strong and supportive community, and I would be honored to help strengthen those aspects within AED.\n\tI would be a strong fit for the role of Service Chair because I believe wholeheartedly in the value of service. I think that AED’s service requirement should not be something members simply complete, but something they look forward to. Service creates a direct connection to the community, and the access AED provides to those opportunities is something I believe should be fully embraced. Although I have not yet held a leadership role within AED, I bring valuable experience from other areas of my life. At home, I work at an ice cream shop on the beach, where I have developed leadership, communication, and teamwork skills. As a shift lead, I have managed teams of 4-5 people, ensuring that operations run smoothly while maintaining positive interactions with customers. These skills have been especially important during high-pressure shifts where we manage continuous lines of 20 or more people over several hours. In addition, I was honored to serve as team captain for both my high school varsity volleyball and basketball teams. In this position, I was responsible not only for serving as a leader on and off the court, but also for organizing and leading volunteer-run clinics for youth. Over the course of two years, I coordinated gym schedules, communicated with volunteers regarding their roles and responsibilities, and provided families with clear event details. During each clinic, I led activities to ensure that participants developed their skills while also creating an enjoyable and engaging experience for both the kids and the volunteers. These roles taught me that leadership is not just about making decisions, but about supporting others - whether that means having difficult conversations or simply listening when someone needs guidance. I have learned that effective leadership requires balancing responsibility with empathy, a lesson that has shaped my approach to service. This is the mindset I would bring to the role of Service Chair. I understand that successful service initiatives depend not only on organization, but on fostering an environment where members feel supported, motivated, and genuinely connected to the impact of their work. By prioritizing both structure and empathy, I would aim to increase engagement and ensure that our service efforts are meaningful for both our members and the community.\n\tI would also be a strong fit for the role of Wellness Chair because I consistently prioritize overall well-being in both my own life and the communities I am a part of. In high school, I served as the only student representative on our school’s wellness committee, working alongside parents, staff, and community members. Initially, I was hesitant to contribute, but I quickly realized that my perspective as a student was essential in identifying the challenges my peers were facing. For example, I raised concerns about vaping in the school, which led to initiatives such as bringing in guest speakers and collaborating with the art club to create awareness campaigns. Over time, our committee addressed broader issues including student anxiety, bullying, and ways to promote positive engagement. This experience showed me how meaningful it is to advocate for the physical, emotional, and mental well-being of others, and it left me motivated to continue that work in every community I join. In the role of Wellness Chair, I would bring that same passion, along with ideas and student-centered initiatives aimed at supporting the health of AED members. To me, wellness means caring for the whole person and creating balance so individuals can truly thrive. I view wellness as a daily practice rather than a one-time achievement. Physically, I prioritize staying active through athletics and regular movement. Through high school sports, I learned that fitness is not only about strength and endurance, but also about teamwork, discipline, and shared purpose. I have continued that here through hobbies like weight-lifting, yoga, and going for wellness walks. Emotionally, I focus on maintaining perspective, supporting those around me, and fostering environments where people feel encouraged and valued. One of the experiences that best reflects my commitment to wellness was receiving the Massachusetts Interscholastic Athletic Association’s Wellness Pillar Award. This recognition has been one of the most meaningful for me because I feel it represents who I am as a whole person - someone who is committed to making healthy choices, leading by example, and empowering others to do the same. For me, wellness is not just about avoiding stress or unhealthy habits, but about resilience, balance, and consistently showing up for both myself and my community here in AED.\n\tI hold my role as a member of AED in high regard, consistently attending events not out of obligation, but out of a genuine desire to be involved, build connections, and contribute to the organization in any way I can. I would be honored to take on either of these roles and contribute to AED in a more meaningful way. I am eager to bring my experiences, perspective, and dedication to both service and wellness, and to help foster a community where members feel engaged, supported, and inspired.", "time": "I am very intentional about how I commit my time, and I prioritize depth of involvement over spreading myself too thin. While I am not involved in any other organizations on campus, this is a conscious decision that allows me to be fully present and reliable in the commitments I do take on. In addition, it has given me the ability to embrace spontaneity and be able to engage in opportunities as they arise. AED has been a major focus for me, and I consistently choose to invest my time in attending events, building connections, and contributing meaningfully to the organization.\n\tI fully understand the amount of time and responsibility required of both the Wellness Chair and Service Chair, and I am ready to embrace those commitments. I have intentionally structured my schedule for next semester to ensure that I can be available and fully engaged. In particular, I have arranged my classes so that my afternoons are free, allowing me to attend and lead more AED events. I recognize that these roles require reliability and a strong presence, and I am prepared to meet those expectations. I would approach these positions with a high level of dedication, ensuring that I am not only able to manage the responsibilities, but to contribute meaningfully and consistently to AED.", "impact": "I plan to approach both the role of Service Chair and Wellness Chair with a genuine commitment to contributing in a way that strengthens both the organization and the experience of its members. I am motivated to be someone who is not only dependable and dedicated, but also thoughtful in how I support the growth and success of AED. If selected for either position, I would strive to contribute in a way that is meaningful and reflective of the values that make AED such a strong and impactful community.\n\tAs Service Chair, I would focus on both strengthening relationships with our current partners and developing new ones. One potential opportunity for expansion is collaboration with March of Dimes, a nonprofit organization dedicated to improving maternal and infant health outcomes. South Carolina received an “F” on the national prematurity report card, with 11.2% of births occurring before 37 weeks of pregnancy, while Richland County’s rate is even higher at 11.8%. Partnering with March of Dimes would allow AED to contribute to addressing a significant local public health concern through volunteering at awareness events they host throughout the year. An example of this is a recurring event they host called March for Babies which is taking place at the Riverwalk on April 25. This type of collaboration would not only strengthen AED’s connection to the Columbia community, but also provide valuable exposure for members interested in fields such as pediatrics, obstetrics, and gynecology. What’s more, this event would not have a cap on volunteers. This ensures that any member interested is more than welcome to go, while also addressing concerns that have been brought up about event participation being restricted to only a small number of members. In addition to expanding partnerships, I would work to deepen engagement with our existing ones. For example, AED volunteers every other week at the Psychiatric Institute Division of the Department of Mental Health, where our presence is clearly meaningful to the children we serve. However, I believe there are opportunities to expand our impact. One initiative I would propose is organizing a donation drive for clothing, games, and recreational equipment. While AED already hosts several donation drives throughout the semester, this effort would be especially meaningful because it directly supports a partner we already work with. Strengthening relationships with our existing partners is just as important as forming new ones, and this initiative would allow us to deepen those connections in a tangible way. It also creates an opportunity for continued impact. While the Department of Mental Health could serve as a starting point, this model could easily be expanded to support other partners such as Midlands Orphan Relief and Harvest Hope, further strengthening AED’s overall community engagement. Further, I would work to address areas that have been identified as challenges over the past two semesters. One key issue is the current carpool system. At present, the only point of contact provided for a service event is the event leader, which often makes them the default driver for members who need transportation. This can place a significant burden on the event leader, requiring them to coordinate and potentially travel across campus and surrounding areas to accommodate multiple individuals. To improve this process, I would propose a more structured system beginning at the point of registration. When members sign up for a service event through Luma, they would provide their phone number and respond to two prompts: “Do you need a ride to the event?” and “Are you available to drive others?” Then, approximately 72 hours before the event, the event leader would send a message to all participants sharing the names and contact information of those, including the event leader, who have indicated they are willing to drive. From there, members in need of transportation would be responsible for reaching out directly. To ensure fairness and proper planning, drivers would have the option to decline requests made within 24 hours of the event. This system would allow members to coordinate more efficiently while relieving event leaders of the responsibility of managing all transportation logistics. In addition, I believe it is important to reinforce expectations around punctuality and commitment. Consistent lateness and early departures have been recurring issues, and these behaviors can negatively impact AED’s relationships with its community partners. Professionalism and reliability are essential to maintaining these partnerships, and it is important that our members reflect those values. I would advocate for clear communication at the start of each semester regarding expectations, along with appropriate accountability measures, such as loss of service points or fines. Service is the foundation of healthcare, and members should strive to take it seriously now as it will lay the groundwork for their future careers.\n\tAs Wellness Chair, I would focus on strengthening both peer support within AED and connections to campus wellness resources. As pre-health students, we all understand the challenges of balancing academic, extracurricular, and personal responsibilities. I believe that one of the most valuable sources of support comes from peers who share similar experiences. To foster this, I would work to strengthen the connections between AED’s wellness initiatives and the Big/Little program, encouraging more intentional mentorship and open dialogue around mental and emotional well-being. I would also work to increase awareness and utilization of existing campus resources, particularly by leveraging our chapter mini speaker series. For example, the It’s On Us initiative offers programming focused on preventing sexual assault and promoting interpersonal respect through events such as bystander intervention and advocacy 101 workshops. I would propose inviting organizations like this to serve as mini speakers during chapter meetings, followed by an open event hosted the subsequent week that AED members could attend. This approach would serve multiple purposes: it would expand AED’s engagement with underutilized campus resources, introduce members to opportunities they may not have otherwise explored, and create pathways for greater involvement. Additionally, it opens the door for AED members who are already involved in these organizations to take on a more active role in facilitating connections and hosting events. Encouraging participation in these programs would not only enhance members’ understanding of wellness, but also strengthen their sense of community responsibility. Further, I would aim to expand opportunities for mind-body wellness within AED. Practices such as yoga, mindfulness sessions, and group activities like walking or active study breaks can provide effective ways for students to manage stress and reset. I would also support health-focused initiatives that promote the importance of sleep, nutrition, and stress management, while connecting members to resources such as the campus nutritionist. \n\tOverall, I would approach either role with a strong sense of responsibility and a commitment to creating meaningful, accessible, and engaging opportunities for AED members. I am eager to contribute in a way that supports both individual well-being and the collective impact of the organization.", "extra": "In just two semesters, AED has had a profound impact on my experience at USC. After being accepted, it took me some time to fully appreciate and take advantage of everything the organization had to offer. The first event I attended outside of a chapter meeting was a service event called Mano a Mano. I was able to register after a last-minute opening, but I did not have transportation. I reached out to the event leader, but was unable to find a ride, so I spent the rest of the day figuring out exactly what time I would need to order an Uber. Despite some logistical challenges, I made it to the event and that experience marked the beginning of my involvement in AED service. That event quickly gained a place in my heart and since then I have gone every week, not as a member of AED, but as a committed volunteer. Through this experience, I have gained a deeper understanding of both AED and the true meaning of service. One of the first things I learned is that service events are one of the most meaningful ways to connect with other members. Even something as simple as the five minute car ride from campus to Transitions Homeless Shelter creates space for conversations and relationships that might not otherwise happen. These small moments help build a stronger sense of community within AED. More importantly, however, Mano a Mano taught me that service is not about fulfilling a requirement, it is about creating meaningful connections with the community. Moving from Massachusetts to South Carolina was a significant transition, and service became the way I was able to truly connect with Columbia. Through these experiences, I have gained a deeper understanding of the community and its culture in a way that goes far beyond superficial interaction. Service has allowed me to feel rooted in a new environment and to engage with it in a meaningful and personal way. This is the perspective I hope to share with other AED members. Service events are not simply a way to earn points, but a chance to make a tangible impact. Mano a Mano is an opportunity to support and empower children from Hispanic families. Volunteering at the Department of Mental Health is a chance to bring light to children navigating incredibly dark circumstances. Unified Gamecocks provides an opportunity to foster inclusion and create a sense of belonging. MIRCI allows us to bring joy to youth in a transitional housing facility who are facing challenges that many of us will never fully understand. The three point service requirement is not a burden, it is a privilege. It is an opportunity to engage with and give back to the community we are fortunate to be a part of.", "transport": true}, {"name": "Srihith Chada", "year": "Junior", "track": "Pre-Med", "positions": "MedConnect Director (1 spot) -- Pre-Med applicants only, Social Chair (1 spot)", "fit": "I believe I would be a strong fit for Social Chair because I’ve been consistently involved in AED’s social events this year, both through the Social Committee and by regularly attending events. Being present has given me a strong understanding of what works well, what people enjoy, and how events run behind the scenes.\n\nI was drawn to the Social Committee because of the opportunity to work with different groups and meet people with diverse interests that are not necessarily all on the same pre health track or same year. Through that experience, I’ve seen that AED already does a great job offering a variety of social events. I would build on that by focusing more on how events are structured, making them more interactive so members are encouraged to meet new people rather than staying within their usual groups.\n\nBeing on the Social Committee has also given me experience with the behind-the-scenes side of events, including coordinating with others, helping run activities, and making sure everything stays organized and consistent week to week.\n\nI also really value the direction AED is moving in, particularly the focus on improving member experience and accessibility. As Social Chair, I would support that by planning events that are not only consistent, but also intentional in helping members feel more connected and included.\n\nOverall, I would bring consistency, organization, and a strong understanding of AED’s social environment, along with ideas to make events more engaging and meaningful for members.\n\nI am also interested in MedConnect because I value mentorship and understand how important exposure to medicine can be. I would want to help organize events like mock interviews, mentor matching, and “day in the life” sessions so members can build meaningful connections with medical students.", "time": "Compared to when I first joined the Social Committee last semester, I’ve taken on a more active role this semester by helping run and assist in over 50% of the social events. This experience has given me a realistic understanding of the time and effort required, so I know what to expect and how to plan accordingly.\n\nWhile I do have other commitments, I stay organized by planning ahead and maintaining a structured schedule. I also make it a point to communicate early if anything comes up. If selected, I would continue to build my schedule around AED responsibilities to ensure I am consistently present, prepared, and reliable.\n\nAdditionally, my involvement in AED reflects my commitment to the organization. Across this semester and the last, I have earned 64 points (and counting), which represents consistent attendance and engagement across a wide range of events. Through this, I’ve become not only more involved, but also more invested in the community AED builds.\n\nOverall, I’m confident in my ability to manage my time effectively and remain fully engaged in this role.", "impact": "As Social Chair, I would focus on making events more interactive and something members genuinely look forward to. I want to place more emphasis on events that naturally encourage people to meet and talk to each other, especially across different grades and committees.\n\nOne way I would do this is by incorporating more structured but low-pressure formats. For example, I would plan events like rotating group activities, such as a Medical Charades night where teams are regularly switched, or themed events like a throwback night that include built-in group interaction. These types of formats make it easier for members to engage with people outside of their usual circles. From attending events this year, I’ve noticed that many people tend to stay within their friend groups unless there is something intentionally built into the event that encourages interaction, and even small structural changes can significantly improve engagement.\n\nI would also prioritize consistently gathering feedback from members and using that to adjust events throughout the semester. This could include quick polls or monthly input on what types of events members want to see, so they feel more involved in shaping AED’s social environment.\n\nAnother goal would be to introduce a few new ideas each semester while still maintaining the events that members already enjoy. For example, I would consider adding events like Pictionary nights, poker nights, or an open-mingle style Strom fitness session, depending on member interest. I want to build on what AED already does well while making events feel more intentional and inclusive.\n\nOverall, my goal is to create a social environment where members feel comfortable, connected, and excited to show up.", "extra": "One thing I would add is that I’ve grown a lot in terms of stepping out of my comfort zone. Being part of AED, especially through the Social Committee, has pushed me to be more involved, take initiative, and contribute rather than just show up. Over time, I’ve become more confident working with others and putting myself in positions where I can help lead and organize.\n\nI also genuinely care about creating an environment where people feel included and comfortable showing up. From my experience attending events, I’ve seen how much of a difference it makes when people feel welcomed and able to connect with others, and that’s something I would want to continue building as Social Chair.\n\nIf selected, I would take the role seriously and be consistent in the effort I put in, not just in planning events, but in making sure they are meaningful and well-executed. I want to contribute in a way that strengthens AED’s community and gives members a reason to stay involved.", "transport": true}, {"name": "Abdullah Amir", "year": "Sophomore", "track": "Pre-Med", "positions": "Wellness Chair (1 spot)", "fit": "As a member of the Wellness Committee, I have worked closely alongside Emma and the rest of the committee to help promote wellness within our AED chapter. Through this role, I have hosted several events and gained hands-on experience in planning and executing wellness focused initiatives that encourage both physical and mental wellness. These events have allowed me to better understand what our members enjoy and what helps them de-stress. For example, I’ve learned that members really like events where they take something tangible home with them, like slime and mini first aid kits. In addition to event planning, I have become familiar with the health and wellness resources available across campus (through our promotion of these resources via the AED Instagram), which allows me to more effectively connect members to opportunities that support their well-being. I also value collaboration and communication, and I have worked to ensure that events are inclusive, well organized, and accessible to a wide range of members. I have always come to each of my events fully prepared and early every time to make sure everything is set up well in advance from the members' arrival. Also, in high school, I served as HOSA president for 2 consecutive years and led a team of 8 members both years. Through this experience, I have gained the skills necessary to lead and support a team and ensure our goals as an organization are met. This experience is important because with the responsibilities of hosting wellness events for AED members, the wellness chair will also have to manage a committee, which is something I already have experience of.", "time": "As an undergraduate student in the BARSC-MD program, my path to medical school is already structured through conditional admission, which is something I am so grateful for. This means I am not navigating the same level of uncertainty and pressure that comes with preparing for applications and standardized exams like the MCAT. As a result, my workload is more stable and allows me additional time and flexibility in my schedule. Rather than using that flexibility solely for myself, I want to intentionally use it to benefit other pre-health students who are balancing heavier academic and application-related pressures. AED has already been a meaningful part of my college experience, and I am fully committed to prioritizing my responsibilities within the organization. As of next year, beyond AED, the only organizations I plan to be a part of will be the Muslim Student Association and Crochet for Carolina, which are two clubs that do not have many requirements and are very low-commitment. Therefore, I will ensure to keep AED my #1 priority to ensure that I will uphold what is required of me as a cabinet member.", "impact": "My approach to this role is three-pronged. With the help of the Wellness Committee, I aim to support members’ wellness in a physical, mental and emotional, and community-based sense. Each of these areas plays an important role in the overall well-being of pre-health students, and I want AED to be a place where all three are actively supported.\nFor physical wellness, in addition to hosting more activity-based events at Strom, I want to introduce an exercise mentorship program. This program would connect members who have experience in different forms of fitness, such as running, weightlifting, pilates, or yoga, with those who are interested in getting started. The goal is to make fitness feel more approachable and sustainable by providing guidance and peer support. When I first joined the Wellness Committee, this was one of my main ideas, but I joined midway through the fall semester and there was not enough time to fully develop it. Moving forward, I would like to make this one of my primary goals for the year.\nFor mental and emotional wellness, I want to focus on increasing awareness of the resources already available on campus. I have already begun working toward this by creating informational graphics for our Instagram, but I believe we can take it further. One idea I have is to invite a representative from the Student Health and Wellness Center to present during a chapter meeting and walk members through the mental health and wellness resources available to them. We could even hold an event that takes a tour of the Health and Wellness Center just so that members are more aware of the resources UofSC has to offer. In addition to our usual de-stress events, I would also like to organize an off-campus event at a local rage room in Columbia. I had originally planned to pursue this idea this semester, but the facility is currently closed for renovations. I have already reached out to them for updates on their reopening timeline and am currently waiting for a response.\nFor community-based wellness, I want to introduce an anonymous discussion board system where members can share what they are struggling with or simply talk about anything on their minds. One of the most important parts of AED is the sense of community, and while the pre-health journey can be incredibly rigorous, it is not always easy or comfortable to openly share stressors with people you know personally. This system would provide a safe and low-pressure space for members to feel heard and supported, even anonymously.", "extra": "I am so grateful to have been given the opportunity to serve on the Wellness Committee this year! I have met so many new people through all the events that I have hosted. A big reason for why I am applying to be in leadership is not only because I want to get to know more of our members in a fun and light hearted setting. I think that in our undergraduate pre-professional journey, we sometimes get lost in the stress of everything and forget that we have a whole community around us. Through being Wellness Chair, I not only hope to bring members closer together, but to also become closer with my fellow members as well.", "transport": true}, {"name": "Sofia Sierra", "year": "Junior", "track": "Premed", "positions": "Wellness Chair (1 spot)", "fit": "While there are many qualities that I see in myself that would make me a good leader for the Wellness Chair position, first, I want to highlight two specific ones; companionability and ambition. First, I want to explain that although everyone in Alpha Epsilon Delta is friendly, I believe that being companionable is a step above friendliness. Companionability is to be sociable, friendly, and pleasant to be around. My past year as a member of AED has taught me to exemplify all of these qualities. My favorite part about going to AED events is that I can go by myself and ALWAYS have someone to sit and chat with. I love being sociable and friendly with my fellow members and I believe that this quality will allow them to be able to come to me with ideas and suggestions for wellness events. I want to make sure that I am listening to everyone’s wants and needs so that I can cater to them and ensure that our members are getting what they need out of their years as members of our organization. Secondly, I want to restate how driven I am for this position and beyond. I truly believe that this position is so very important because it helps build the stepping stones that our members will take once they graduate from USC. As Wellness chair, it would be my responsibility to provide our members with the resources that will help them be driven for their personal wellness and their professional development. I wholeheartedly want the best future for all of our members in AED; I want to see them excel in their classes, social lives, and in the lives beyond AED. The passion I hold for my friends is matched with my ambition to make this cabinet the best it can be. I hope that both of these qualities, companionability and ambition, demonstrate just how dedicated I am to be the best leader for this position as Wellness Chair.", "time": "If I am granted the opportunity to become the Wellness chair for our chapter of AED, I would continue to manage my time commitments as I do now. I manage everything with the respect that it deserves. I am well aware that as a premed student I have a busy schedule that needs to be balanced with a social life. I am a huge advocate for balancing professional responsibilities with social media responsibilities. One way I display responsibility is with being an active member of a social sorority on campus, Chi Omega. In Chi Omega, I serve as the Career and Personal Development chair. This role has shown me the importance of being able to balance all of my responsibilities. I ensure that everything is completed in a timely manner through spreadsheets, calendars, and to-do lists. As Wellness chair it would be of the utmost importance to ensure that I am giving the role the necessary time it needs. I would ensure that there are events available every week so that all members can prioritize their mental and physical health. I am hoping to convey the message that those who take care of others also need to be taken care of. As future healthcare professionals, burnout is such a real risk that we all will combat at some point in our careers. Having a foundation of mental and physical wellness ensures that we can build our healthy future efficiently. I am hoping that by creating events for our members to attend I can ensure that others understand that wellness is a commitment we must make now.", "impact": "If I was selected to be this upcoming school year’s Wellness chair, I would love to continue Emma‘s initiative. Her role this year has helped me to get out of my comfort zone and make more connections. Whether it be a workout class or a trivia night, I have had so many wonderful memories at the events that she has hosted. For new initiatives, I would be interested in hosting an event titled, “A letter to my future.” This event would consist of members writing letters to their future selves. They would write it to be opened at a specific point in time, for the younger members perhaps when they graduate, and for the older members perhaps in another four years. This event would help put everything into perspective for our members. They may be stressed and overwhelmed by the amount of responsibilities at this moment in time, but in two weeks, two years, or 10 years, those worries will not be important. We cannot stress ourselves out over something that can be fixed with time. I would also love to schedule an event that builds off of what has already been implemented in AED, a cooking workshop. I greatly appreciate the AED cookbook that features healthy and easy recipes for college students. I would love to take some of the recipes from this cookbook and host an event where members could come cook one of the meals in the kitchen. The event would demonstrate how simple and quick a healthy meal can be. This would reinforce that healthy does not have to mean overly complicated. I would also love to create an event where members would be able to interact with shelter dogs. So many college students enjoy interacting with animals and research shows that animal interaction is a great way to destress. I would love to invite students to take dogs from a shelter on a walk at the beautiful Saluda river walk. This event would benefit in two ways because it would focus on physical health (walking) and also positively impact the mental health of our members with animal support.", "extra": "I have been an active member of AED for the past three semesters, having rushed in the spring of my freshman year. These past three semesters have been an amazing experience because they have taught me to balance work with play. The pre-health world is such a competitive place because there is always something that needs to be done. There is always a test that needs to be studied for, an application to be filled out, or a shadowing email to be sent, etc. I understand that sometimes we are not just competing with others for spots in our future careers, we are also competing with ourselves. We are competing against our burnout and our stress. Through being a member of AED, I have been taught how to prioritize my academic career, GPA, and future while simultaneously making lasting friendships and even future roommates. The academic, service, and professional events all benefit my future career, but the people I do these events with benefit my future LIFE. These people ensure that I have a much needed balance in my college career. We all need a social and academic life balance or else we risk burnout and depression. AED has prevented these setbacks for me. Being the Wellness chair for AED would ensure that I have the opportunity to continue helping our members be the best future healthcare providers that they can be. I know that our members have bright futures ahead of them, I want to ensure that they have the correct mentality to get there.", "transport": true}, {"name": "Rithi Ramamurthy", "year": "Junior", "track": "Pre-Med", "positions": "New Member Director (2 spots), Wellness Chair (1 spot), Diversity, Equity & Inclusion Chair (1 spot)", "fit": "If you have ever tried to assemble a 1,000-piece puzzle before, it can feel overwhelming, and the pieces look like random specks of dust that were simply bundled together into a box. However, a good leader can see how these so-called irregular pieces actually fit together to make a beautiful picture and, in doing so, encourage others to do the same—thinking outside the box and working together to create a final product. My leadership experiences in my other organizations have taught me the importance of being a leader who can bridge the gaps and find the missing pieces. They help others feel seen in a sea of pieces that don’t look like them; a leader highlights their value and finds the place where they fit and can shine.\n\nI believe I would be successful as Wellness Chair due to my experience as Secretary of Health and Wellbeing in the Executive Cabinet in Student Government. In this position, I led a social media campaign to advertise mental health resources to 40,000 students that are offered at the Center for Health and Wellbeing. Many of the resources offered are not well-known, such as counseling services or blood work appointments, and my committee and I created graphics and utilized social media to highlight these resources during finals week. Additionally, in order to increase morale levels before spring break, I facilitated a Power Puppies event where students could take a break from studying and spend time in the sun with the puppies. In this position, I was able to learn the importance of advocacy and how to be a leader who collaborates with their team to produce tangible change. I was able to delegate tasks effectively when creating social media posts and discuss with administration the importance of wellness, which I will take into my role as Wellness Chair. In college, it can feel that we are constantly trying to catch up with other people and trying to fit into new puzzles every day, finding our place. Burnout is something that is very common, and as Wellness Chair, I want to allow AED members to take breaks in between their busy schedules and foster connection, helping them find someone to build their puzzles with at events, because we are not alone in feeling this way.\n\nAdditionally, as DEI Chair, my goal is to create an environment where everyone feels seen and their perspectives are advocated for. In high school, I had the opportunity to work with the Michigan Department of Civil Rights and speak with stakeholders on the detrimental effects of book banning. This experience has provided the foundation in college for how to organize collective change in systems that are often built with gaps for our communities. I currently conduct public health research that discusses the barriers that exist for rural maternal communities to access healthcare via telehealth. I have had the opportunity to present this research at multiple conferences and advocate for policy changes and variation in clinical practices to make healthcare more equitable for birthing individuals. These experiences have highlighted the importance of advocacy in the role of DEI Chair and education as a primary pillar in allowing members to see where they fit into the bigger picture of AED as a whole. As DEI Chair, it is essential that everyone can see that their piece is valued, and these experiences will allow me to advocate for every member in AED in this position.\n\nFinally, as New Member Director, I will ensure that I am a reliable source of connection for both prospective and new members. As Treasurer for the Wellness Society chapter at UofSC, I have been able to gain organizational skills through managing finances, which will help when running rush and monitoring the NMD email, as well as the importance of being approachable. In an organization like the Wellness Society, we have been able to plan events that are accessible to college students and create lasting connections through exercise, cooking classes, and other wellness activities. I have been able to be someone people can reach out to when they need help which will be translated in this role so new members can feel comfortable joining our organization. There is always a spot for members in the AED puzzle, and I want everyone to feel that I am a guide who can help them find their place at UofSC as part of AED.\n\nIn my time in AED, I have attended numerous events, coordinated and led multiple events as part of the Wellness Committee. Being a part of this committee has provided me with an understanding of how to organize events effectively, as I have led over eight events this past year and communicated with the appropriate parties to ensure successful output. Whether it be planning a yoga class or collaborating with AED members on forensic psychiatry cases, AED has provided me with a community and the power of leadership that allows every puzzle piece to find its place. AED encourages everyone to pave their own path, creating their place in the puzzle and even leading the creation of their own puzzle. I am ready to give that opportunity to the members of AED.", "time": "My primary time commitments are my research involvement and my position as Deputy Research Coordinator for the President’s Staff this upcoming term. I have one-hour meetings on Mondays for my role in student government, but it is mostly individual research work and preparing briefs for the president and other cabinet secretaries in collaboration with the other research coordinator. Additionally, my research involvement is mostly virtual with flexible hours. I am able to adjust the times I go into the lab in person based on the AED event that week, allowing me to provide my full time commitment to this organization. Most of my research schedule is directed independently, which will allow me to plan my time effectively during busier rush weeks or if my committee needs support during certain events. My roles in various leadership positions have taught me that time management and organization are the backbone of effective change. My friends can attest to the fact that my calendar is often color-coded, my to-do list is frequently updated, and my Notion spreadsheet of assignments is regularly checked. This type of organization has allowed me to balance my previous time commitments and will grant me the ability to effectively manage this role in AED.\n\nI believe that passion fuels change, and the best leaders love the work that they do. AED has given me resources, a network, and friends that will last beyond my time in college. I am truly passionate about the work I have been able to do in the Wellness Committee and providing support to AED members. I want to be more than just a member of Cabinet, but a representative and advocate for those in AED. I will be involved, as well as spark collaboration and participation within the AED events I plan or collaborations with other Cabinet members. Furthermore, if any time conflicts arise, I will ensure that there is prompt and transparent communication between executive leadership and myself. I will also ensure that a proxy is present to provide updates, and that they have a clear list and plan before filling in for me when I am absent.\n\nIn my role as Wellness Chair, DEI Chair, or New Member Director, I will ensure that I am a leader who values organization and effective communication in order to give my all and showcase my passion to AED and its members.", "impact": "I want to bring new perspectives and ideas to each of the roles and be an advocate for all AED members, creating a support system through thoughtful events and speakers.\n\nIf I am given the privilege to serve as Wellness Chair, I will prioritize events that promote the wellbeing of all AED members, whether that be mentally, physically, or socially. According to a study done by the University of Michigan, over 60% of college students stated that they meet the criteria for at least one mental health issue. College students experience some of the highest rates of depression and anxiety, which makes this role as Wellness Chair especially important. It is essential that we take the time to fill our cup so we have the ability to help others, and through well-curated events, supporting AED members becomes possible. For example, I want to organize an Emotional First Aid Kit. This is a twist on the classic first aid kit that bandages physical wounds, because this one will bandage the wounds that we sometimes can’t see. This kit will be filled with things that can help when you are feeling stressed or overwhelmed. It will include things like affirmation notes, self-care items like face masks, and a squishy. These will also be decorated by members of AED to represent their personal style using stickers. I will also design a flyer to put in the kit with wellness resources that the Center for Health and Wellbeing provides. Additionally, it has been proven that being out in nature can help improve our cognitive ability and our mental health, so I propose we do a “Pause and Plant” event. This event will involve AED members planting flowers in a pot and then painting the pot on the outside. This event will ideally be held in the Horseshoe so students can sit in the sun while also connecting with other AED members socially. Members can also write kind words on their pot, so when they look at it from afar, it is a reminder that hard days pass. It is important that AED members never feel isolated in their struggles, and events like this can help promote friendship and improved wellness. Furthermore, I also propose having a “Wellness Week” where, on social media, we will have posts describing activities members should engage in and putting a spotlight on Wellness events members can attend that week. This can also act like a Wellness Bingo, with members attempting to fill their board that week. This will ideally be done before finals week, which will act as a break for members as they are studying for their exams. Finally, to promote physical wellness, I will have a Smoothie Night where members can try making five different smoothie recipes and then have a tasting. I think this is a fun way to show how physical wellness can be fun and engaging and could even be a partnership with Katie Graham (KG68@mailbox.sc.edu) at the Center for Health and Wellbeing, who is a registered dietitian and can provide a talk on how to balance busy college life with healthy eating.\n\nIf chosen to be DEI Chair, I will prioritize intentional events that promote visibility and inclusivity within the AED community to ensure that AED is prioritizing healthcare providers who practice patient-centric care. My committee will comprise of members from various backgrounds to ensure that the dialogue occurring in meetings is representative of all of AED. One idea I have is to bring DEI speakers specifically to AED chapter. DEI events are so essential to the future of healthcare workers, as we are a service specialty that works to improve the lives of the people we treat, and that means understanding the patients we see on a daily basis. I would like to have a panel called “Minorities in Medicine,” where I would have healthcare workers who treat underserved areas and historians like Dr. Yelena Sims at UofSC discuss the importance of understanding the systematic historical abuses certain races have faced in the United States and how we can improve our care for these populations. Additionally, I want to implement a social media campaign that does a “DEI spotlight” every month. This post will act as an educational initiative for the members of AED and our followers, and it would highlight a healthcare provider who is often forgotten in history books or an event that plays a key role in understanding the importance of representation and proper care in medicine. This can include figures like Dr. Sophie B. Jones, who was the first African American female to graduate from the University of Michigan’s Medical School and who published an article on African American public health, which was the first of its kind. It is also important to spotlight people who played a key role in medical advancement often because of systemtic abuse, like Henrietta Lacks, whose cancer cells were taken without her consent to become the first “immortal” cell line and who faced the atrocities of the system rather than the benefits of the medical field. These posts will also be paired with extra materials for reading to help provide a more in-depth education on these topics, like the book \"The Immortal Life of Henrietta Lacks.\" Furthermore, I want to ensure that AED members feel that they can lead and share their voices in DEI events. So, I propose we do a “Tour of the Globe” night, where AED members can sign up for their respective countries and bring food and music that they feel best represents their culture. AED’s diversity is a strength that should be celebrated, and each group will have a station for members to go around learning more about cultures and enjoying good company. Finally, in collaboration with the Wellness Committee, I suggest that we do a self-portrait night, but with a twist. Rather than do a typical self-portrait where members paint themselves, they will paint a person with all the things that make up who they are inside. This can be food, places, people, or even logos. We are all a product of our experiences, and I think understanding where we have all been can help foster empathy within AED. I will also have a portion of the event where people switch their portraits with a person at the event and talk about why they painted certain things. This will help AED members get to know each other while also understanding the power of diversity.\n\nIf given the honor to be New Member Director, I will ensure that I am an approachable source of information and that the transition into AED is both fun and seamless. When rushing, the process for PNMs can feel daunting and scary; however, I want to help ease nerves. I will establish office hours where all PNMs can stop by, but it will be in a place that feels casual and comfortable so that PNMs can raise any concerns or worries they have about rush. Reaching out to officers can feel intimidating, but doing it at a coffee shop can help ease nerves. During Rush Week, I want to spotlight why people chose AED as an  and what they love about it. Working with the Marketing Chair, this will be a “Why AED Wednesday” that will occur during the rush period and will include testimonials from both Exec/Cabinet and members of AED. I also propose creating a reel, which often allows more engagement on our Instagram, for PNMs to meet some of the faces they might see during rush. There can also be some helpful tips for rush behavior, including proper dress attire and what to review before coming to rush events. The rush process can feel monotonous, so to allow for some change and also better understanding of PNMs, I recommend including a game or teamwork event as part of rush. This is a fun way for PNMs to get to know each other, but it also provides observers with insight into how people interact in a team setting, especially considering all healthcare workers must work in synergy to provide the best care for patients. This can be a challenge like creating a spaghetti tower at one station and then Uno at another to provide perspective on how members act in less professional settings. Each of these tables will have an AED member and Exec present to observe and facilitate as they see fit. There can also be a curveball that occurs during the event to observe how members deal with surprises and pressure. Finally, the process of Big/Little matching is both exciting and overwhelming, so to help foster genuine connection, I will include three Big/Little events, with at least one being mandatory to attend, where there will be a fun activity to do. This can include a painting night where members will sit in an alternating patterns as bigs, littles, and so forth. For about three minutes, members will talk and get to know each other, and then a switch will occur. This is a twist on the typical speed dating and will allow for an activity to foster genuine conversation. I will also ensure that one-on-one conversation occurs rather than group settings, where it might be difficult for people to connect on a personal level.\n\nIt would be an honor to lead AED members in any of these three roles, and I am so excited to implement tangible change to help improve the AED experience through connection, fostering empathy, and building a community that lasts beyond their time in undergrad.", "extra": "For one day a month, nineteen individuals who would never interact, passing one another in a school hallway, are gathered in a room to make each other feel highly uncomfortable—our own little Breakfast Club of awkwardness. Aptly named Awkward Pause, this theatrical group quickly became a community that I would call home.\n\nAwkward Pause continues to puzzle the students at my old high school, as it consists of kids from every clique in school. While we were all originally there to perform skits ranging from satirical pieces on AP classes and their workload to the effect school shootings have on students, underneath the surface, we were there because we needed a community that would allow us to be heard in our own individual ways.\n\nIn my senior year of high school, I was co-student director of the troupe and grasped the importance of being a leader with empathy and providing a safe space for my teammates. I learned how to be a great listener, understanding the different masks people wear to survive their daily lives. As this was a social justice troupe, some of the pieces would be questioned by the administration, and therefore I learned the importance of advocacy and being a voice for the voiceless. We all came from different places but were gathered here for one sole goal: to help make the students and faculty more aware of the issues students face every day.\n\nThis experience in high school has followed me into my understanding of leadership in college. I learned the power of being able to empathize with people who have had different experiences than me and how to resolve conflict with an open ear and open heart. The lessons I learned in Awkward Pause will be brought into AED in the way I approach leadership and create connection. The ability to have genuine discourse with another human will allow me to take a pause, whether or not it’s awkward, before trying on someone else’s shoes.", "transport": true}, {"name": "Mia Moore", "year": "Junior", "track": "Pre-PA", "positions": "Marketing Director (1 spot), Wellness Chair (1 spot)", "fit": "I would be a good fit for either position due to my determination, organizational skills, and interpersonal skills. As a determined individual, I don’t stop until I achieve my goals and when I commit to something I give it my all. Though I have only been in AED for one semester and therefore have not been involved on any committees thus far, I believe that my previous leadership experiences in other organizations have prepared me to take a step up and apply for a leadership role. My organizational skills would be valuable in either position, as serving on Cabinet requires extensive planning, coordination, and attention to detail. Additionally, my interpersonal skills would help me thrive because I am a very authentic and outgoing individual who loves connecting with others. I believe that having role models who are unapologetically themselves can help other members feel more welcomed and comfortable. At times AED can be intimidating, especially when the Cabinet is so large. I believe that balancing a warm personality with professionalism would encourage involvement. \n          I am well suited for the role of Wellness Chair because I have a plethora of experience in supporting those in mental health crises. I have been a Crisis Counselor for the 988 Crisis Text Line for over a year, and through that experience I have learned key skills that would enable me to thrive in this role. Due to my experiences with texters, I am able to effectively de-escalate situations, make people feel valued and seen, be able to be someone for others to confide in, and be a person who gives honest and supportive advice. I also have been lucky enough to learn how to regulate my own emotions and have grown into a very emotionally intelligent individual. All of these factors would make me the perfect person for members of AED to rely on and come to in times of stress. \n          I also believe that I would be a strong choice for Marketing Director because I am very active on Instagram, so updating the AED social media would be more exciting for me than you would think. I also am very good at utilizing websites to make layouts and other formats for social media that are engaging and appealing to the eye. In my previous two jobs, I have created many different types of content, ranging from Instagram posts to TikTok videos with thousands of views. In addition, I feel as if I would be able to use my creativity to come up with many good merch ideas that fit the trends members would be interested in, such as mock neck sweatshirts, tank tops, and quarter-zips.", "time": "I will manage my time commitments by keeping my role in AED as a top priority. I am involved in several other organizations on campus, such as APPAS and TriBeta, in addition to weekly volunteering at Prisma Health and with the Crisis Text Line. While I do have other commitments, balancing them would not be a challenge. From when I was 3 years old up until I graduated high school, I was a competitive dancer and on a club soccer team. Both of these commitments required weekly practices and involved out of state competitions and tournaments. I had a deep passion for both sports, and despite what my parents advised me, I told them I couldn’t give either one up. I gave my all to both of my teams and with that it taught me the importance of managing your time. If at any point I felt as if I was not giving 100% to either team, I don’t know what I would have done because quitting either wasn’t an option. That is why I made sure that every time I stepped on stage or on the field, I did my absolute best. Having serious commitments to both of these sports for the majority of my life taught me that if you are truly passionate about multiple things, you can make it work. I grew up extremely busy, but now I don’t think that I could live my life any other way. There is nothing I love more than having things to do and differences to make, no matter how small.\n          Although I am involved in other organizations, I can assure you that balancing them is something that I can handle with ease. I will be there to fulfill my role on the Cabinet because AED is something that I am extremely passionate about, as it provides me with opportunities that better prepare me for my future as a physician assistant. It is an organization that fosters a supportive, close-knit community like no other, and that is something I value more than anything. AED is already a priority for me as a general member, so I am certain that if I am selected for Cabinet, I will continue to prioritize it in my everyday life.", "impact": "I will positively impact AED if I am selected because I am the type of person who genuinely wants to be there for others. Being a part of Cabinet, members look to you as role models and support systems. I feel as if I can be a great representation of both because I am an extremely goal-oriented individual who wants to grow deeper connections with others in AED. I would consider myself to be an extremely outgoing, approachable, and personable individual, and I truly believe that being my authentic self could make a meaningful difference. When leaders are open and genuine, it can help create a more welcoming space, especially for members who may be quieter or more introverted, and encourage them to participate more confidently. By balancing my personal and professional skills, I will be able to form authentic connections with other members while also being a mentor for them to look up to for guidance. \n          Something new that I would implement as Wellness Chair would be drop-in style mental health hours. Sometimes people just need someone to go to who doesn’t really know much about their situation and just vent to them. This would give me the opportunity to better get to know so many members by being there to support them. These hours would take place with myself, meaning I would block off a certain number of hours each month to be able to meet for a coffee or just to meet up and talk about what’s going on. I may not be a mental health professional, but sometimes all people need is someone to listen to them and validate their feelings. Being pre-health students, we all have so much on our plate, and usually ranting about a difficult class is all we need to relax ourselves. I would also definitely want to host more frequent events centered around physical activity. I truly believe that mental and physical health go hand in hand, so by hosting more events such as weekly wellness walks and puppy or bunny yoga, members will have an outlet to let go of all of their stress. In addition, when I was rushing AED, most members talked about how much they enjoyed the pain const STORAGE_KEY = 'aed-cabinet-reviews-2026-v3';
let reviews = {};
let openCards = new Set();
let expandedSections = new Set();
const noteTimers = {};

function loadLS() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);

    if (p && typeof p === 'object' && p.reviews && !p.currentReviewer) {
      reviews = p.reviews || {};
      return;
    }
    if (p && p.reviews && typeof p.reviews === 'object') {
      const byReviewer = p.reviews;
      if (p.currentReviewer && byReviewer[p.currentReviewer]) {
        reviews = byReviewer[p.currentReviewer] || {};
      } else {
        const first = Object.keys(byReviewer)[0];
        reviews = first ? (byReviewer[first] || {}) : {};
      }
    }
  } catch (e) { reviews = {}; }
}
function saveLS() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ reviews })); } catch (e) {}
}

function getMyRV(name) {
  return reviews[name] || { decision: '', notes: '' };
}
function getOthers(name) { return []; }

function setDec(name, dec) {
  if (!reviews[name]) reviews[name] = { decision: '', notes: '' };
  reviews[name].decision = reviews[name].decision === dec ? '' : dec;
  reviews[name].updatedAt = new Date().toISOString();
  saveLS();
  render();
  updateSummary();
}

function saveNotes(name, val) {
  if (!reviews[name]) reviews[name] = { decision: '', notes: '' };
  reviews[name].notes = val;
  reviews[name].updatedAt = new Date().toISOString();
  saveLS();

  const btn = document.getElementById('sb-' + slug(name));
  if (btn) {
    btn.textContent = 'Saved ✓';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = 'Save notes';
      btn.classList.remove('saved');
    }, 1000);
  }

  const meta = document.getElementById('nm-' + slug(name));
  if (meta) meta.textContent = `Last saved ${new Date(reviews[name].updatedAt).toLocaleString()}`;
  updateSummary();
}

function queueAutosave(name, val) {
  const key = slug(name);
  clearTimeout(noteTimers[key]);
  noteTimers[key] = setTimeout(() => saveNotes(name, val), 300);
}

function exportNotes() {
  const payload = { exportedAt: new Date().toISOString(), tool: 'AED Cabinet Reviewer 2026-2027', reviews };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aed_notes.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Notes exported!');
}
function importNotes(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      let incoming = null;
      if (d && d.reviews && typeof d.reviews === 'object') incoming = d.reviews;
      else if (d && typeof d === 'object') incoming = d;
      if (!incoming) throw new Error('bad format');

      Object.keys(incoming).forEach(name => {
        const item = incoming[name] || {};
        if (!reviews[name]) reviews[name] = { decision: '', notes: '' };
        if (typeof item.decision === 'string') reviews[name].decision = item.decision;
        if (typeof item.notes === 'string') reviews[name].notes = item.notes;
        reviews[name].updatedAt = item.updatedAt || new Date().toISOString();
      });

      saveLS(); render(); updateSummary();
      toast('Imported notes');
    } catch { toast('Import failed: invalid file'); }
    e.target.value = '';
  };
  r.readAsText(file);
}
function exportCSV() {
  const rows = [['Name','Year','Track','Positions','My Decision','My Notes']];
  ALL.forEach(a => {
    const rv = getMyRV(a.name);
    rows.push([a.name, normY(a.year), normT(a.track), a.positions, rv.decision||'pending', (rv.notes||'').replace(/"/g,'""')]);
  });
  const blob = new Blob([rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='aed_reviews.csv'; a.click();
  URL.revokeObjectURL(url);
}

function slug(n) { return n.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,''); }
function initials(n) { return n.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function normY(y) { y=(y||'').trim(); if(y==='Sophmore') return 'Sophomore'; if(y==='Junior (graduating May 2027)') return 'Junior'; return y; }
function normT(t) { t=(t||'').trim(); if(['Pre PA ','Pre PA','Pre- PA','Pre-PA'].includes(t)) return 'Pre-PA'; if(['Pre-med','Premed'].includes(t)) return 'Pre-Med'; return t; }

const COLORS=[{bg:'#eef3fb',fg:'#2a4a8a'},{bg:'#eef7ee',fg:'#2d6e2d'},{bg:'#fdf0ed',fg:'#8b3a2a'},{bg:'#fdf8ec',fg:'#7a5a10'},{bg:'#f5eefb',fg:'#6a2a8a'},{bg:'#eef7f5',fg:'#1a6a5a'},{bg:'#fbeef5',fg:'#8a2a5a'},{bg:'#f0f5ee',fg:'#3a5a2a'}];
function colorFor(i){return COLORS[i%COLORS.length];}
function badgeSty(p){
  if(p.includes('Pre-Med')||p.includes('MedConnect')) return 'background:#eef3fb;color:#2a4a8a';
  if(p.includes('PA-CT')||p.includes('Pre PA')||p.includes('Pre-PA')) return 'background:#eef7f5;color:#1a6a5a';
  if(p.includes('Event')) return 'background:#fdf8ec;color:#7a5a10';
  if(p.includes('Marketing')) return 'background:#f5eefb;color:#6a2a8a';
  if(p.includes('New Member')) return 'background:#fbeef5;color:#8a2a5a';
  if(p.includes('Wellness')) return 'background:#eef7ee;color:#2d6e2d';
  if(p.includes('Service')) return 'background:#f0f5ee;color:#3a5a2a';
  if(p.includes('DEI')||p.includes('Diversity')) return 'background:#fff3e8;color:#7a4010';
  if(p.includes('Academics')) return 'background:#eef3fb;color:#2a4a8a';
  if(p.includes('Dental')) return 'background:#fdf0ed;color:#8b3a2a';
  if(p.includes('DPTMP')||p.includes('PT')) return 'background:#f5f0fb;color:#5a2a8a';
  return 'background:#f5f5f3;color:#6b6760';
}

const THRESH = 600;
function toggleSec(key) {
  if(expandedSections.has(key)) expandedSections.delete(key); else expandedSections.add(key);
  const wrap=document.getElementById('sw-'+key), btn=document.getElementById('eb-'+key);
  if(!wrap||!btn) return;
  const exp=expandedSections.has(key);
  wrap.classList.toggle('collapsed',!exp);
  btn.textContent=exp?'Show less ↑':'Show full response ↓';
}
function secHtml(label, text, key) {
  if(!text) return '';
  const long=text.length>THRESH, exp=expandedSections.has(key);
  return `<div class="section-label">${label}</div>
<div class="section-wrap${long&&!exp?' collapsed':''}" id="sw-${key}"><div class="section-text">${esc(text)}</div></div>
${long?`<button class="expand-btn" id="eb-${key}" onclick="toggleSec('${key}')">${exp?'Show less ↑':'Show full response ↓'}</button>`:''}`;
}

function populateFilters() {
  const posSet=new Set(), yrSet=new Set();
  ALL.forEach(a=>{ a.positions.split(',').forEach(p=>posSet.add(p.trim())); yrSet.add(normY(a.year)); });
  const ps=document.getElementById('posFilter');
  [...posSet].sort().forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p.replace(/ \(.*\)/,''); ps.appendChild(o); });
  const ys=document.getElementById('yearFilter');
  [...yrSet].sort().forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; ys.appendChild(o); });
}
function filtered() {
  const q=document.getElementById('search').value.toLowerCase();
  const pos=document.getElementById('posFilter').value;
  const yr=document.getElementById('yearFilter').value;
  const dec=document.getElementById('decFilter').value;
  return ALL.filter(a=>{
    const rv=getMyRV(a.name);
    const mQ=!q||[a.name,a.positions,normT(a.track),a.fit,a.impact,a.extra,a.time].some(f=>(f||'').toLowerCase().includes(q));
    const mP=!pos||a.positions.includes(pos);
    const mY=!yr||normY(a.year)===yr;
    const mD=!dec||(dec==='pending'?!rv.decision:rv.decision===dec);
    return mQ&&mP&&mY&&mD;
  });
}

function updateSummary() {
  const yes=ALL.filter(a=>getMyRV(a.name).decision==='yes').length;
  const no=ALL.filter(a=>getMyRV(a.name).decision==='no').length;
  const maybe=ALL.filter(a=>getMyRV(a.name).decision==='maybe').length;
  const pending=ALL.length-yes-no-maybe;
  document.getElementById('summaryBar').innerHTML=`
    <span class="summary-chip chip-yes">Yes: ${yes}</span>
    <span class="summary-chip chip-no">No: ${no}</span>
    <span class="summary-chip chip-maybe">Maybe: ${maybe}</span>
    <span class="summary-chip chip-pending">Pending: ${pending}</span>`;
  document.getElementById('mastheadSub').textContent = `${ALL.length} applicants`;
}

function toggleCard(idx) {
  if(openCards.has(idx)) openCards.delete(idx); else openCards.add(idx);
  render();
}

function render() {
  const apps=filtered();
  document.getElementById('countLabel').textContent=`${apps.length} / ${ALL.length}`;
  const container=document.getElementById('cards');
  if(!apps.length){ container.innerHTML='<div class="empty">No applicants match your filters.</div>'; return; }

  container.innerHTML=apps.map(a=>{
    const gi=ALL.indexOf(a);
    const isOpen=openCards.has(gi);
    const rv=getMyRV(a.name);
    const col=colorFor(gi);
    const sl=slug(a.name);
    const decCls=rv.decision?`decided-${rv.decision}`:'';
    const positions=a.positions.split(',').map(p=>p.trim()).filter(Boolean);
    const dmHtml=rv.decision?`<span class="decision-mini dm-${rv.decision}">${rv.decision[0].toUpperCase()+rv.decision.slice(1)}</span>`:'';
    const nameEsc=a.name.replace(/'/g,"\\'");

    const bodyHtml=isOpen?`<div class="card-body open" id="body-${gi}">
      ${secHtml('Why a good fit', a.fit, gi+'-fit')}
      ${secHtml('Time management', a.time, gi+'-time')}
      ${secHtml('Planned impact', a.impact, gi+'-impact')}
      ${a.extra?secHtml('Additional context', a.extra, gi+'-extra'):''}
      <div class="transport">${a.transport?'✓ Has transportation':'✗ No transportation noted'}</div>
      <div class="review-section">
        <div class="review-row">
          <div class="review-label">Decision</div>
          <div class="decision-btns">
            <button class="dec-btn ${rv.decision==='yes'?'active-yes':''}" onclick="setDec('${nameEsc}','yes')">Yes</button>
            <button class="dec-btn ${rv.decision==='maybe'?'active-maybe':''}" onclick="setDec('${nameEsc}','maybe')">Maybe</button>
            <button class="dec-btn ${rv.decision==='no'?'active-no':''}" onclick="setDec('${nameEsc}','no')">No</button>
          </div>
        </div>
        <div class="review-row">
          <div class="review-label">My notes</div>
          <div style="flex:1">
            <textarea class="notes-area" id="na-${sl}" placeholder="Add your notes, observations, concerns…" rows="3" oninput="queueAutosave('${nameEsc}', this.value)">${esc(rv.notes||'')}</textarea>
            <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
              <button class="save-btn" id="sb-${sl}" onclick="saveNotes('${nameEsc}',document.getElementById('na-${sl}').value)">Save notes</button>
              ${rv.updatedAt?`<span class="notes-meta" id="nm-${sl}">Last saved ${new Date(rv.updatedAt).toLocaleString()}</span>`:`<span class="notes-meta" id="nm-${sl}"></span>`}
            </div>
          </div>
        </div>
      </div>
    </div>`:`<div class="card-body" id="body-${gi}"></div>`;

    return `<div class="card ${decCls}" id="card-${gi}">
  <div class="card-header" onclick="toggleCard(${gi})">
    <div class="avatar" style="background:${col.bg};color:${col.fg}">${initials(a.name)}</div>
    <div class="card-meta">
      <div class="card-name">${esc(a.name)}</div>
      <div class="card-sub">${normY(a.year)} &middot; ${normT(a.track)}</div>
      <div class="badges">${positions.map(p=>`<span class="badge" style="${badgeSty(p)}">${esc(p.replace(/ \(.*\)/,'').replace(/-- .*/,'').trim())}</span>`).join('')}</div>
    </div>
    ${dmHtml}
    <div class="chevron ${isOpen?'open':''}">&#8250;</div>
  </div>
  ${bodyHtml}
</div>`;
  }).join('');
}

let _toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); if(_toastT)clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),2800); }

loadLS();
populateFilters();
render();
updateSummary();
</script>
